P1 and P3. P2 is Conditional because changes to qualification requirements (Sec 41) are not always community-driven and may favor incumbents or narrow the candidate pool. P5 is Conditional because any relaxation or modification of official qualifications should be paired with stronger post-election performance and disclosure obligations. P6 is Conditional because Sec 41 amendments must be carefully harmonized with the Constitution (Art X) and COMELEC regulations; any qualification that diverges from constitutional minima or conflicts with existing jurisprudence risks nullification. Revision should focus Sec 41 changes on clarifying residency and citizenship requirements rather than substantive eligibility changes, and should confirm constitutional conformity."}, {"mid": 181, "rep_title": "AN ACT INSTITUTING A SIX (6) YEAR TENURE FOR ALL BARANGAY OFFICIALS AMENDING FOR THE PURPOSE SECTION 43 OF REPUBLIC ACT", "n_bills": 1, "archetype": "Other / residual — Elections", "theme": "Elections & Terms", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 19, "number": 10346, "title": "AN ACT INSTITUTING A SIX (6) YEAR TENURE FOR ALL BARANGAY OFFICIALS AMENDING FOR THE PURPOSE SECTION 43 OF REPUBLIC ACT", "decision": "REVISE / CALIBRATE"}], "proposes": "Extends barangay officials' term from three to six years by amending Section 43 of RA 7160.", "scores": {"P1": "Conditional", "P2": "Fail", "P3": "N/A", "P4": "Conditional", "P5": "Fail", "P6": "Conditional"}, "decision": "REJECT / REFER", "rationale": "Fails P2 (no demonstrated grassroots demand; longer tenure without a mid-term recall mechanism reduces community leverage) and P5 (defers accountability to electorate for six years, weakening performance incentives). Longer terms also impose additional salary/benefit costs without identified funding, raising a P4 concern. The measure should be referred back until recall/performance mechanisms and fiscal impact are addressed."}, {"mid": 182, "rep_title": "AN ACT AMENDING SECTIONS 59, 188, and 511 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991", "n_bills": 9, "archetype": "Other / residual — Mandatory local officers", "theme": "Personnel & Mandatory Officers", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 1620, "title": "AN ACT AMENDING SECTIONS 284 AND 393 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE 'LOCAL GOVERNMENT CODE OF 1991'", "decision": "REVISE / CALIBRATE"}, {"congress": 20, "number": 4501, "title": "AN ACT AMENDING SECTIONS 284 AND 393 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS \"THE LOCAL GOVERNMENT CODE OF 1991\"", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "number": 8667, "title": "AN ACT AMENDING SECTIONS 59, 188, and 511 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "number": 8665, "title": "AN ACT AMENDING SECTIONS 443, 454, AND 463 OF REPUBLIC ACT NO. 7160 OTHERWISE KNOWN AS THE “LOCAL GOVERNMENT CODE OF 199", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 1761, "title": "AN ACT AMENDING SECTION 443, 454, AND 463 OF REPUBLIC ACT NO. 7160 OTHERWISE KNOWN AS THE “LOCAL GOVERNMENT CODE OF 1991", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 1820, "title": "AN ACT AMENDING SECTIONS 443,454, AND 463 OF REPUBLIC ACT NO. 7160 OTHERWISE KNOWN AS THE “LOCAL GOVERNMENT CODE OF 1991", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 7186, "title": "AN ACT AMENDING SECTIONS 443, 454, AND 463 OF REPUBLIC ACT NO. 7160 OTHERWISE KNOWN AS THE `LOCAL GOVERNMENT CODE OF 199", "decision": "REVISE / CALIBRATE"}, {"congress": 20, "number": 3375, "title": "AN ACT AMENDING SECTIONS 443, 454, AND 463 OF REPUBLIC ACT NO. 7160 OTHERWISE KNOWN AS THE \"LOCAL GOVERNMENT CODE OF 199", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 1286, "title": "AN ACT AMENDING SECTIONS 100 AND 272 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991, TO", "decision": "REVISE / CALIBRATE"}], "proposes": "Amends Sections 59, 188, and 511 of RA 7160 to revise provisions on mandatory local officers, local treasury, or related personnel requirements.", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "Conditional", "P4": "Fail", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "The multi-section amendment touching personnel and mandatory officers risks creating unfunded staffing mandates (P4 Fail) without specifying funding sources or phased implementation. Core direction is sound for coherence but requires explicit fiscal provisions and LGU-level demand validation before adoption."}, {"mid": 183, "rep_title": "AN ACT STRENGTHENING LOCAL GOVERNMENT PARTICIPATION IN NATIONAL DEVELOPMENT BY INCREASING THE SHARE OF LOCAL GOVERNMENT", "n_bills": 1, "archetype": "Other / residual — Fiscal transfers: IRA/NTA share", "theme": "Fiscal Transfers & PFM", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 3447, "title": "AN ACT STRENGTHENING LOCAL GOVERNMENT PARTICIPATION IN NATIONAL DEVELOPMENT BY INCREASING THE SHARE OF LOCAL GOVERNMENT", "decision": "REVISE / CALIBRATE"}], "proposes": "Increases the LGU share in national taxes (IRA/NTA) to strengthen local government participation in national development.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Direction strongly favors autonomy, subsidiarity, and LGU demand (P1–P3 Pass). However, the increased share must be accompanied by enhanced accountability and performance-based disbursement mechanisms (P5 Conditional) and must be reconciled with national fiscal balance and existing special-purpose fund allocations (P4, P6 Conditional). Calibrate with accountability safeguards and a transition formula."}, {"mid": 184, "rep_title": "AN ACT PROMOTING LOCAL GOVERNMENT EMPOWERMENT IN ORDER TO ACHIEVE INCLUSIVE DEVELOPMENT, AMENDING FOR THE PURPOSE SECTIO", "n_bills": 2, "archetype": "Other / residual — Fiscal transfers: IRA/NTA share", "theme": "Fiscal Transfers & PFM", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 5475, "title": "AN ACT PROMOTING LOCAL GOVERNMENT EMPOWERMENT IN ORDER TO ACHIEVE INCLUSIVE DEVELOPMENT, AMENDING FOR THE PURPOSE SECTIO", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 5662, "title": "AN ACT PROMOTING LOCAL GOVERNMENT EMPOWERMENT IN ORDER TO ACHIEVE INCLUSIVE DEVELOPMENT, AMENDING FOR THE PURPOSE SECTIO", "decision": "REVISE / CALIBRATE"}], "proposes": "Amends the IRA/NTA share provisions to promote local government empowerment and inclusive development.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Same principled direction as mid 183. The inclusive-development framing strengthens P2 and P3, but P4 and P6 require a credible fiscal transition roadmap and harmonization with the Mandanas-Garcia ruling implementation. P5 needs built-in reporting and performance conditions on the additional share."}, {"mid": 185, "rep_title": "AN ACT AMENDING SECTIONS 284, 285, 287 AND 290 OF REPUBLIC ACT NO. 7160 OR THE LOCAL GOVERNMENT CODE OF 1991", "n_bills": 1, "archetype": "Other / residual — Fiscal transfers: IRA/NTA share", "theme": "Fiscal Transfers & PFM", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 7430, "title": "AN ACT AMENDING SECTIONS 284, 285, 287 AND 290 OF REPUBLIC ACT NO. 7160 OR THE LOCAL GOVERNMENT CODE OF 1991", "decision": "REVISE / CALIBRATE"}], "proposes": "Amends Sections 284, 285, 287, and 290 of RA 7160 to revise the IRA/NTA share formula and utilization rules.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Most comprehensive of the IRA-share bills (touches allocation formula, utilization, and disclosure). Amending Section 290 (disclosure) is a P5 positive. Calibration needed on equity weights in the allocation formula (P4) and on ensuring the higher share does not crowd out national infrastructure spending that benefits LGUs (P6)."}, {"mid": 186, "rep_title": "AN ACT INTENSIFYING LOCAL GOVERNMENT PARTICIPATION IN NATIONAL DEVELOPMENT BY INCREASING THE SHARE OF LOCAL GOVERNMENT U", "n_bills": 3, "archetype": "Other / residual — Fiscal transfers: IRA/NTA share", "theme": "Fiscal Transfers & PFM", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 19, "number": 790, "title": "AN ACT INTENSIFYING LOCAL GOVERNMENT PARTICIPATION IN NATIONAL DEVELOPMENT BY INCREASING THE SHARE OF LOCAL GOVERNMENT U", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 1089, "title": "AN ACT INTENSIFYING LOCAL GOVERNMENT PARTICIPATION IN NATIONAL DEVELOPMENT BY INCREASING THE SHARE OF LOCAL GOVERNMENT U", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 3012, "title": "AN ACT INTENSIFYING LOCAL GOVERNMENT PARTICIPATION IN NATIONAL DEVELOPMENT BY INCREASING THE SHARE OF LOCAL GOVERNMENT U", "decision": "REVISE / CALIBRATE"}], "proposes": "Increases the LGU share in national taxes to intensify local government participation in national development.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Substantively parallel to mids 183–185. The 'intensifying' framing adds urgency but does not resolve fiscal-transition or accountability gaps. Should be consolidated with related bills (183–185) to avoid redundancy and calibrated with performance-conditionality and a phase-in schedule."}, {"mid": 187, "rep_title": "AN ACT MAKING THE POSITION OF MUNICIPAL AGRICULTURIST MANDATORY IN ALL MUNICIPAL GOVERNMENTS, AMENDING FOR THE PURPOSE F", "n_bills": 1, "archetype": "Other / residual — Functional assignment & sector devolution (health", "theme": "Service Delivery & Devolution", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 4468, "title": "AN ACT MAKING THE POSITION OF MUNICIPAL AGRICULTURIST MANDATORY IN ALL MUNICIPAL GOVERNMENTS, AMENDING FOR THE PURPOSE F", "decision": "REVISE / CALIBRATE"}], "proposes": "Makes the position of Municipal Agriculturist mandatory in all municipal governments by amending RA 7160.", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "Pass", "P4": "Fail", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Mandating a position in ALL municipalities (including urban or non-agricultural ones) creates an unfunded mandate (P4 Fail) and overrides local discretion (P1, P2 Conditional). Revise to cover only municipalities where agriculture is a significant sector, add DBM-certified funding or SPA allocation, and allow shared arrangements for smaller LGUs."}, {"mid": 188, "rep_title": "AN ACT PROVIDING FOR THE MANDATORY APPOINTMENT OF A MUNICIPAL VETERINARIAN OFFICER, AMENDING FOR THE PURPOSE CERTAIN PRO", "n_bills": 1, "archetype": "Other / residual — Functional assignment & sector devolution (health", "theme": "Service Delivery & Devolution", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 6331, "title": "AN ACT PROVIDING FOR THE MANDATORY APPOINTMENT OF A MUNICIPAL VETERINARIAN OFFICER, AMENDING FOR THE PURPOSE CERTAIN PRO", "decision": "REVISE / CALIBRATE"}], "proposes": "Mandates the appointment of a Municipal Veterinary Officer in all municipal governments by amending RA 7160.", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "Pass", "P4": "Fail", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Same structural problem as mid 187: blanket mandate regardless of livestock/fishery relevance creates unfunded personnel costs (P4 Fail) and overrides LGU staffing discretion (P1/P2 Conditional). Revise to threshold criteria (e.g., livestock population or DA classification) with accompanying funding."}, {"mid": 189, "rep_title": "AN ACT TO RATIONALIZE THE FUNCTIONAL ASSIGNMENTS OF LOCAL GOVERNMENT UNITS BY AMENDING CERTAIN PROVISIONS OF REPUBLIC AC", "n_bills": 1, "archetype": "Other / residual — Functional assignment & sector devolution (health", "theme": "Service Delivery & Devolution", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 6882, "title": "AN ACT TO RATIONALIZE THE FUNCTIONAL ASSIGNMENTS OF LOCAL GOVERNMENT UNITS BY AMENDING CERTAIN PROVISIONS OF REPUBLIC AC", "decision": "REVISE / CALIBRATE"}], "proposes": "Rationalizes functional assignments of LGUs by amending certain provisions of RA 7160 to clarify service-delivery responsibilities.", "scores": {"P1": "Pass", "P2": "Conditional", "P3": "Pass", "P4": "Conditional", "P5": "Pass", "P6": "Pass"}, "decision": "ADOPT", "rationale": "Rationalization of functional assignments directly advances subsidiarity (P3) and national-local coherence (P6). Clearer mandates improve accountability (P5 Pass). Conditionality on P4 is minor — ensuring unfunded devolved functions get matching transfers — and on P2 reflects the need for LGU consultation in the rationalization process. No core principle fails; Conditionals are fixable in IRR."}, {"mid": 190, "rep_title": "AN ACT MAKING THE POSITION OF MUNICIPAL AGRICULTURIST MANDATORY IN MUNICIPALITIES, AMENDING FOR THE PURPOSE SECTIONS 443", "n_bills": 1, "archetype": "Other / residual — Functional assignment & sector devolution (health", "theme": "Service Delivery & Devolution", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 7390, "title": "AN ACT MAKING THE POSITION OF MUNICIPAL AGRICULTURIST MANDATORY IN MUNICIPALITIES, AMENDING FOR THE PURPOSE SECTIONS 443", "decision": "REVISE / CALIBRATE"}], "proposes": "Makes the position of Municipal Agriculturist mandatory in municipalities by amending Sections 443 and related provisions of RA 7160.", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "Pass", "P4": "Fail", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Duplicates the intent of mid 187 with the same fatal P4 flaw: no identified appropriation for the mandatory position across all municipalities. Should be consolidated with mid 187 and mid 191 into a single bill with sector-based criteria and matching fiscal provision."}, {"mid": 191, "rep_title": "AN ACT MAKING THE APPOINTMENT OF AN AGRICULTURIST MANDATORY IN MUNICIPALITIES WHERE AGRICULTURE IS A SIGNIFICANT INDUSTR", "n_bills": 1, "archetype": "Other / residual — Functional assignment & sector devolution (health", "theme": "Service Delivery & Devolution", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 19, "number": 9046, "title": "AN ACT MAKING THE APPOINTMENT OF AN AGRICULTURIST MANDATORY IN MUNICIPALITIES WHERE AGRICULTURE IS A SIGNIFICANT INDUSTR", "decision": "REVISE / CALIBRATE"}], "proposes": "Makes appointment of an Agriculturist mandatory only in municipalities where agriculture is a significant industry.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Pass", "P6": "Pass"}, "decision": "ADOPT", "rationale": "The sector-significance qualifier resolves the core defects of mids 187 and 190: mandate is proportional, respects LGU autonomy for non-agricultural municipalities (P1/P2 Pass), is subsidiarity-consistent (P3 Pass), and coherent with DA policy (P6 Pass). P4 Conditional only on ensuring DA or GAA funding accompanies the mandate; Conditionals are minor and addressable in implementing rules."}, {"mid": 192, "rep_title": "AN ACT TO REFORMAT CERTAIN FUNCTIONAL ASSIGNMENT OF LOCAL GOVERNMENT UNITS BY AMENDING PERTINENT PROVISIONS IN REPUBLIC", "n_bills": 1, "archetype": "Other / residual — Functional assignment & sector devolution (health", "theme": "Service Delivery & Devolution", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 20, "number": 3151, "title": "AN ACT TO REFORMAT CERTAIN FUNCTIONAL ASSIGNMENT OF LOCAL GOVERNMENT UNITS BY AMENDING PERTINENT PROVISIONS IN REPUBLIC", "decision": "REVISE / CALIBRATE"}], "proposes": "Reformats functional assignments of LGUs by amending pertinent provisions of RA 7160 to realign service-delivery roles.", "scores": {"P1": "Pass", "P2": "Conditional", "P3": "Pass", "P4": "Conditional", "P5": "Pass", "P6": "Pass"}, "decision": "ADOPT", "rationale": "Parallel to mid 189; reformatting functional assignments strengthens subsidiarity and coherence (P3, P6 Pass) and improves accountability (P5 Pass). P2 Conditional because LGU stakeholder consultation should be mandated in the reform process. P4 Conditional on ensuring realigned functions carry matching resource transfers. No core principle fails; should be harmonized with mid 189 to avoid duplication."}, {"mid": 193, "rep_title": "AN ACT RATIONALIZING THE MANAGEMENT OF THE NATURAL RESOURCES, LOCATED IN MALAPASCUA ISLAND BARANGAY LOGON IN THE MUNICIP", "n_bills": 1, "archetype": "Other / residual — Land use", "theme": "LGU Creation, Boundaries & Land", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 5731, "title": "AN ACT RATIONALIZING THE MANAGEMENT OF THE NATURAL RESOURCES, LOCATED IN MALAPASCUA ISLAND BARANGAY LOGON IN THE MUNICIP", "decision": "REVISE / CALIBRATE"}], "proposes": "Rationalize natural resource management in Malapascua Island, Barangay Logon, a specific named locality.", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "Pass", "P4": "Conditional", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Targeting a single barangay's natural resources in national legislation bypasses the LGU's own land-use and resource management authority (P1 Conditional), and the bill must clarify whether the LGU and community were consulted (P2 Conditional). Subsidiarity is satisfied since the measure addresses a localized resource (P3 Pass). Without a clear funding mechanism for any management body created, P4 is at risk of unfunded mandate. Accountability structures and alignment with DENR/national resource frameworks need to be spelled out before adoption."}, {"mid": 194, "rep_title": "AN ACT PROVIDING SECURITY OF TENURE FOR BARANGAY HEALTH WORKERS, AMENDING FOR THIS PURPOSE SECTION 6 (D) OF REPUBLIC ACT", "n_bills": 4, "archetype": "Other / residual — LGU creation", "theme": "LGU Creation, Boundaries & Land", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 22, "title": "AN ACT PROVIDING SECURITY OF TENURE FOR BARANGAY HEALTH WORKERS, AMENDING FOR THIS PURPOSE SECTION 6 (D) OF REPUBLIC ACT", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "number": 4575, "title": "AN ACT PROVIDING SECURITY OF TENURE FOR BARANGAY HEALTH WORKERS, AMENDING FOR THIS PURPOSE SECTION 6 (D) OF REPUBLIC ACT", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "number": 5057, "title": "AN ACT PROVIDING SECURITY OF TENURE FOR BARANGAY HEALTH WORKERS, AMENDING FOR THIS PURPOSE SECTION 6 [D] OF REPUBLIC ACT", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "number": 6437, "title": "AN ACT PROVIDING SECURITY OF TENURE FOR BARANGAY HEALTH WORKERS, AMENDING FOR THIS PURPOSE SECTION 6 (D) OF REPUBLIC ACT", "decision": "REVISE / CALIBRATE"}], "proposes": "Provide security of tenure for Barangay Health Workers by amending RA provisions on their employment status.", "scores": {"P1": "Fail", "P2": "Pass", "P3": "Conditional", "P4": "Fail", "P5": "Conditional", "P6": "Conditional"}, "decision": "REJECT / REFER", "rationale": "Mandating tenure security for BHWs at the national level overrides LGU discretion in managing their own workforce, directly undermining local autonomy (P1 Fail). It creates a clear unfunded mandate: LGUs must absorb tenure obligations with no identified national funding offset (P4 Fail). The measure belongs more properly in labor or civil service law, or requires a companion fiscal provision before it can be considered under the LGC framework."}, {"mid": 195, "rep_title": "AN ACT AMENDING SECTION 9 AND SECTION 27 OF REPUBLIC ACT NO. 8189 OR THE VOTER'S REGISTRATION ACT OF 1996", "n_bills": 1, "archetype": "Other / residual — LGU creation", "theme": "LGU Creation, Boundaries & Land", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 69, "title": "AN ACT AMENDING SECTION 9 AND SECTION 27 OF REPUBLIC ACT NO. 8189 OR THE VOTER'S REGISTRATION ACT OF 1996", "decision": "REVISE / CALIBRATE"}], "proposes": "Amend the Voter's Registration Act of 1996 (RA 8189) by modifying sections on voter registration procedures.", "scores": {"P1": "N/A", "P2": "N/A", "P3": "N/A", "P4": "N/A", "P5": "N/A", "P6": "N/A"}, "decision": "REJECT / REFER", "rationale": "This measure amends the Voter's Registration Act, not the Local Government Code, and its subject matter — national voter registration — is outside ULAP's LGC-amendment screening scope. All six principles are N/A. The measure should be referred to the COMELEC/electoral reform track; it does not belong in this batch."}, {"mid": 196, "rep_title": "AN ACT ALLOWING THE CONVERSION OF A MUNICIPALITY INTO A COMPONENT CITY IN A PROVINCE THAT DOES NOT HAVE AN EXISTING COMP", "n_bills": 2, "archetype": "Other / residual — LGU creation", "theme": "LGU Creation, Boundaries & Land", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 259, "title": "AN ACT ALLOWING THE CONVERSION OF A MUNICIPALITY INTO A COMPONENT CITY IN A PROVINCE THAT DOES NOT HAVE AN EXISTING COMP", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "number": 9264, "title": "AN ACT ALLOWING THE CONVERSION OF A MUNICIPALITY INTO A COMPONENT CITY IN A PROVINCE THAT DOES NOT HAVE AN EXISTING COMP", "decision": "REVISE / CALIBRATE"}], "proposes": "Allow a municipality to convert into a component city even if its province has no existing component city, easing conversion criteria.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Conditional", "P4": "Conditional", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Relaxing the 'no existing city' barrier expands LGU self-determination and promotes development equity (P1, P2 Pass). However, subsidiarity is Conditional because removing this safeguard could accelerate city proliferation without ensuring the new city has genuine service-delivery capacity. Fiscal implications — particularly IRA share redistribution affecting the host province and sister municipalities — must be explicitly addressed (P4 Conditional). Coherence with DILG standards on cityhood requires a companion viability assessment requirement."}, {"mid": 197, "rep_title": "AN ACT GRANTING A FIXED MONTHLY HONORARIA AND ADDITIONAL BENEFITS TO ACCREDITED BARANGAY HEALTH WORKERS, AMENDING FOR TH", "n_bills": 3, "archetype": "Other / residual — LGU creation", "theme": "LGU Creation, Boundaries & Land", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 439, "title": "AN ACT GRANTING A FIXED MONTHLY HONORARIA AND ADDITIONAL BENEFITS TO ACCREDITED BARANGAY HEALTH WORKERS, AMENDING FOR TH", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "number": 690, "title": "AN ACT GRANTING A FIXED MONTHLY HONORARIA AND ADDITIONAL BENEFITS TO ACCREDITED BARANGAY HEALTH WORKERS, AMENDING FOR TH", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "number": 4395, "title": "AN ACT GRANTING A FIXED MONTHLY HONORARIA AND ADDITIONAL BENEFITS TO ACCREDITED BARANGAY HEALTH WORKERS, AMENDING FOR TH", "decision": "REVISE / CALIBRATE"}], "proposes": "Grant fixed monthly honoraria and additional benefits to accredited Barangay Health Workers, amending existing BHW law.", "scores": {"P1": "Fail", "P2": "Pass", "P3": "Conditional", "P4": "Fail", "P5": "Conditional", "P6": "Conditional"}, "decision": "REJECT / REFER", "rationale": "Mandating fixed national honoraria for BHWs binds LGU budgets without providing a dedicated national funding stream, constituting a classic unfunded mandate (P4 Fail) and constraining local discretion over workforce compensation (P1 Fail). The measure should be restructured so the national government shoulders the cost — either through the DOH budget or an earmarked national transfer — before it can be screened favorably under the LGC framework."}, {"mid": 198, "rep_title": "AN ACT EXEMPTING FROM THE POPULATION AND LAND AREA REQUIREMENTS THE CONVERSION OF A MUNICIPALITY INTO A COMPONENT CITY I", "n_bills": 2, "archetype": "Other / residual — LGU creation", "theme": "LGU Creation, Boundaries & Land", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 1051, "title": "AN ACT EXEMPTING FROM THE POPULATION AND LAND AREA REQUIREMENTS THE CONVERSION OF A MUNICIPALITY INTO A COMPONENT CITY I", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "number": 3148, "title": "AN ACT EXEMPTING FROM THE POPULATION AND LAND AREA REQUIREMENTS THE CONVERSION OF A MUNICIPALITY INTO A COMPONENT CITY I", "decision": "REVISE / CALIBRATE"}], "proposes": "Exempt municipalities from population and land area requirements when converting to a component city in a province without a city.", "scores": {"P1": "Conditional", "P2": "Pass", "P3": "Fail", "P4": "Fail", "P5": "Conditional", "P6": "Fail"}, "decision": "REJECT / REFER", "rationale": "Waiving both population and land area thresholds simultaneously removes the minimum viability safeguards that ensure new cities can self-govern and deliver services (P3 Fail). This risks creating fiscally non-viable cities that will be permanently dependent on IRA, distorting the IRA pool for neighboring LGUs (P4 Fail) and fragmenting the local government landscape inconsistently across provinces (P6 Fail). The proposal contradicts the structural integrity of the LGC's tiered government framework and should be rejected."}, {"mid": 199, "rep_title": "AN ACT MAKING THE POSITION OF THE MUNICIPAL AGRICULTURIST MANDATORY, AMENDING FOR THE PURPOSE SECTIONS 442 AND 482 OF RE", "n_bills": 1, "archetype": "Other / residual — LGU creation", "theme": "LGU Creation, Boundaries & Land", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 1545, "title": "AN ACT MAKING THE POSITION OF THE MUNICIPAL AGRICULTURIST MANDATORY, AMENDING FOR THE PURPOSE SECTIONS 442 AND 482 OF RE", "decision": "REVISE / CALIBRATE"}], "proposes": "Make the position of Municipal Agriculturist mandatory, amending LGC Sections 442 and 482.", "scores": {"P1": "Fail", "P2": "Conditional", "P3": "Pass", "P4": "Fail", "P5": "Conditional", "P6": "Conditional"}, "decision": "REJECT / REFER", "rationale": "Mandating a specific local executive position removes LGU discretion in organizing their own bureaucracy, a core aspect of local autonomy (P1 Fail). Without national funding support for the salaries and operations of newly mandatory agriculturist offices — particularly in small, low-income municipalities — this is an unfunded mandate (P4 Fail). Subsidiarity supports the function (P3 Pass), but the mandate should be optional with incentivized funding, not compulsory."}, {"mid": 200, "rep_title": "AN ACT COMMEMORATING THE PLEBISCITE VICTORY ON THE CITYHOOD OF SAN JOSE DEL MONTE WITH THE TANGLAWAN FESTIVAL TO BE HELD", "n_bills": 1, "archetype": "Other / residual — LGU creation", "theme": "LGU Creation, Boundaries & Land", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 2376, "title": "AN ACT COMMEMORATING THE PLEBISCITE VICTORY ON THE CITYHOOD OF SAN JOSE DEL MONTE WITH THE TANGLAWAN FESTIVAL TO BE HELD", "decision": "REVISE / CALIBRATE"}], "proposes": "Commemorate the cityhood plebiscite victory of San Jose del Monte by establishing the Tanglawan Festival.", "scores": {"P1": "N/A", "P2": "N/A", "P3": "N/A", "P4": "N/A", "P5": "N/A", "P6": "N/A"}, "decision": "REJECT / REFER", "rationale": "This is a single-LGU commemorative/cultural measure with no substantive bearing on the Local Government Code. All six ULAP screening principles are N/A. The measure belongs in a special law or a local ordinance, not in LGC amendment proceedings, and should be referred accordingly."}, {"mid": 201, "rep_title": "AN ACT GRANTING BARANGAY HEALTH WORKERS (BHWs) A MONTHLY HONORARIUM, IN ADDITION TO INCENTIVES AND BENEFITS, AMENDING FO", "n_bills": 1, "archetype": "Other / residual — LGU creation", "theme": "LGU Creation, Boundaries & Land", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 3159, "title": "AN ACT GRANTING BARANGAY HEALTH WORKERS (BHWs) A MONTHLY HONORARIUM, IN ADDITION TO INCENTIVES AND BENEFITS, AMENDING FO", "decision": "REVISE / CALIBRATE"}], "proposes": "Grant Barangay Health Workers a monthly honorarium in addition to existing incentives and benefits, amending existing BHW law.", "scores": {"P1": "Fail", "P2": "Pass", "P3": "Conditional", "P4": "Fail", "P5": "Conditional", "P6": "Conditional"}, "decision": "REJECT / REFER", "rationale": "Substantively identical in impact to mid 197 and mid 203: a nationally mandated BHW honorarium without a dedicated national appropriation creates an unfunded mandate charged to LGU budgets (P4 Fail) and overrides local compensation discretion (P1 Fail). The three BHW honorarium bills (197, 201, 203) should be consolidated and restructured so the national DOH budget funds the honorarium before ULAP can support passage."}, {"mid": 202, "rep_title": "AN ACT EXEMPTING THE CAPITAL TOWN OF A PROVINCE WITHOUT A CITY, FROM THE REQUISITES FOR ITS CONVERSION INTO A COMPONENT", "n_bills": 1, "archetype": "Other / residual — LGU creation", "theme": "LGU Creation, Boundaries & Land", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 4804, "title": "AN ACT EXEMPTING THE CAPITAL TOWN OF A PROVINCE WITHOUT A CITY, FROM THE REQUISITES FOR ITS CONVERSION INTO A COMPONENT", "decision": "REVISE / CALIBRATE"}], "proposes": "Exempt the capital town of a province that has no existing city from conversion requisites to become a component city.", "scores": {"P1": "Conditional", "P2": "Pass", "P3": "Conditional", "P4": "Conditional", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Targeting the provincial capital — which typically has greater administrative and economic capacity than a random municipality — makes this somewhat more defensible than mid 198's blanket waiver. However, fully exempting from all requisites still risks fiscal non-viability (P4 Conditional) and inconsistent application across provinces (P6 Conditional). Revision should specify which requisites are waived, retain the income threshold, and require a DOF/DILG viability certification before conversion takes effect."}, {"mid": 203, "rep_title": "AN ACT GRANTING A MONTHLY HONORARIUM TO ACCREDITED BARANGAY HEALTH WORKERS, AMENDING FOR THE PURPOSE SECTION 6 OF REPUBL", "n_bills": 1, "archetype": "Other / residual — LGU creation", "theme": "LGU Creation, Boundaries & Land", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 5003, "title": "AN ACT GRANTING A MONTHLY HONORARIUM TO ACCREDITED BARANGAY HEALTH WORKERS, AMENDING FOR THE PURPOSE SECTION 6 OF REPUBL", "decision": "REVISE / CALIBRATE"}], "proposes": "Grant a monthly honorarium to accredited Barangay Health Workers by amending Section 6 of existing BHW law.", "scores": {"P1": "Fail", "P2": "Pass", "P3": "Conditional", "P4": "Fail", "P5": "Conditional", "P6": "Conditional"}, "decision": "REJECT / REFER", "rationale": "Materially identical to mid 197 and mid 201. A nationally mandated BHW honorarium billed to LGUs with no identified appropriation is an unfunded mandate (P4 Fail) that overrides local compensation authority (P1 Fail). All three BHW honorarium measures should be consolidated; the consolidated bill must anchor funding in the national DOH budget and provide a cost-sharing formula before ULAP endorsement."}, {"mid": 204, "rep_title": "AN ACT CONVERTING INTO COMPONENT CITIES THE CAPITAL TOWNS OF PROVINCES WITHOUT A CITY AND WHICH ARE AMONG THE TWENTY POO", "n_bills": 1, "archetype": "Other / residual — LGU creation", "theme": "LGU Creation, Boundaries & Land", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 5535, "title": "AN ACT CONVERTING INTO COMPONENT CITIES THE CAPITAL TOWNS OF PROVINCES WITHOUT A CITY AND WHICH ARE AMONG THE TWENTY POO", "decision": "REVISE / CALIBRATE"}], "proposes": "Convert the capital towns of provinces without a city that are among the twenty poorest provinces into component cities.", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "Conditional", "P4": "Fail", "P5": "Conditional", "P6": "Conditional"}, "decision": "REJECT / REFER", "rationale": "Directing conversion at poverty-province capitals has equity appeal, but legislatively mandating conversion without plebiscite or LGU petition undermines self-determination (P2 Conditional). More critically, converting low-income municipalities into cities without ensuring they can generate the revenue base to meet cityhood expenditure obligations creates structurally underfunded cities dependent on IRA increases at the expense of other LGUs (P4 Fail). Fiscal viability certification and voluntary petition requirements must precede any conversion mandate."}, {"mid": 205, "rep_title": "AN ACT COMMEMORATING THE CITYHOOD OF SAN JOSE DEL MONTE, PROVINCE OF BULACAN THROUGH THE ANNUAL CELEBRATION OF THE TANGL", "n_bills": 1, "archetype": "Other / residual — LGU creation", "theme": "LGU Creation, Boundaries & Land", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 6333, "title": "AN ACT COMMEMORATING THE CITYHOOD OF SAN JOSE DEL MONTE, PROVINCE OF BULACAN THROUGH THE ANNUAL CELEBRATION OF THE TANGL", "decision": "REVISE / CALIBRATE"}], "proposes": "Commemorates the cityhood of San Jose del Monte, Bulacan through an annual celebration (Tangl- [festival/day])", "scores": {"P1": "N/A", "P2": "Pass", "P3": "N/A", "P4": "Conditional", "P5": "N/A", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "Purely commemorative measure with no autonomy or subsidiarity implications. P2 passes as local identity/demand driven. P4 is Conditional because an annual mandated celebration implies recurring LGU expenditure without identified funding source — should specify that costs are charged to local budget with LGU discretion on scope."}, {"mid": 206, "rep_title": "AN ACT ALLOWING THE CONVERSION OF A MUNICIPALITY WITH EITHER A POPULATION OF AT LEAST ONE HUNDRED THOUSAND (100,000) INH", "n_bills": 1, "archetype": "Other / residual — LGU creation", "theme": "LGU Creation, Boundaries & Land", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 8207, "title": "AN ACT ALLOWING THE CONVERSION OF A MUNICIPALITY WITH EITHER A POPULATION OF AT LEAST ONE HUNDRED THOUSAND (100,000) INH", "decision": "REVISE / CALIBRATE"}], "proposes": "Allows conversion of a municipality with at least 100,000 population (lowered threshold) into a city", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Lowering the population threshold for cityhood can accelerate conversion and expand local autonomy (P1, P2, P3 pass), but risks proliferating cities that strain IRA shares (P4 Conditional), dilutes fiscal accountability standards if income requirements are also relaxed (P5 Conditional), and must be coherent with DILG rationalization policy on city creation (P6 Conditional). Measure is sound in direction but needs explicit income/revenue floor and compliance audit requirements before conversion."}, {"mid": 207, "rep_title": "AN ACT REVISING THE CHARTER OF THE CITY OF BAGUIO", "n_bills": 1, "archetype": "Other / residual — LGU creation", "theme": "LGU Creation, Boundaries & Land", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 8882, "title": "AN ACT REVISING THE CHARTER OF THE CITY OF BAGUIO", "decision": "REVISE / CALIBRATE"}], "proposes": "Revises the Charter of the City of Baguio", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Charter revision can strengthen Baguio's special-city governance and autonomy (P1, P2, P3 pass). However, without the full text, fiscal implications of expanded powers or new mandates are uncertain (P4 Conditional), accountability mechanisms must be explicitly updated to modern standards (P5 Conditional), and alignment with Baguio's status as a highly-urbanized city and its unique land law situation must be addressed (P6 Conditional). Should be reviewed against existing LGC and IPRA provisions."}, {"mid": 208, "rep_title": "AN ACT PROVIDING SECURITY OF TENURE FOR BARANGAY HEALTH WORKERS, AMENDING SECTION 6 (D) OF REPUBLIC ACT 7883 OTHERWISE K", "n_bills": 1, "archetype": "Other / residual — LGU creation", "theme": "LGU Creation, Boundaries & Land", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 9919, "title": "AN ACT PROVIDING SECURITY OF TENURE FOR BARANGAY HEALTH WORKERS, AMENDING SECTION 6 (D) OF REPUBLIC ACT 7883 OTHERWISE K", "decision": "REVISE / CALIBRATE"}], "proposes": "Provides security of tenure for barangay health workers, amending RA 7883", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "Pass", "P4": "Fail", "P5": "Pass", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Security of tenure for barangay health workers is subsidiarity-sound (P3 pass) and enhances accountability of health service delivery (P5 pass). However, mandating tenure without a corresponding national funding mechanism constitutes an unfunded mandate on barangays and municipalities (P4 Fail) — this is the binding defect. P1 is Conditional because it constrains LGU flexibility in workforce management. Must include a national government subsidy or augmentation mechanism before adoption."}, {"mid": 209, "rep_title": "AN ACT RECONCILING THE POWERS OF THE BUREAU OF CORRECTIONS WITH REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS \"THE LOCAL GOV", "n_bills": 1, "archetype": "Other / residual — LGU creation", "theme": "LGU Creation, Boundaries & Land", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 20, "number": 561, "title": "AN ACT RECONCILING THE POWERS OF THE BUREAU OF CORRECTIONS WITH REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS \"THE LOCAL GOV", "decision": "REVISE / CALIBRATE"}], "proposes": "Reconciles the powers of the Bureau of Corrections with RA 7160 (Local Government Code)", "scores": {"P1": "Pass", "P2": "N/A", "P3": "Pass", "P4": "Pass", "P5": "Pass", "P6": "Pass"}, "decision": "ADOPT", "rationale": "Clarifying the boundary between BuCor (national agency) and LGU jurisdiction is a coherence measure that affirms rather than diminishes local autonomy (P1 pass), correctly assigns functions by level (P3 pass), creates no new fiscal burden (P4 pass), and improves legal clarity and accountability (P5, P6 pass). P2 is N/A as this is a national-local jurisdictional alignment, not a community demand question. Straightforward harmonization bill."}, {"mid": 210, "rep_title": "AN ACT PROPOSING AMENDMENTS TO SECTION 138, RA 7160, OTHERWISE KNOWN AS AN ACT PROVIDING FOR A LOCAL GOVERNMENT CODE OF", "n_bills": 1, "archetype": "Other / residual — Local taxation", "theme": "Local Taxation & Revenue", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 154, "title": "AN ACT PROPOSING AMENDMENTS TO SECTION 138, RA 7160, OTHERWISE KNOWN AS AN ACT PROVIDING FOR A LOCAL GOVERNMENT CODE OF", "decision": "REVISE / CALIBRATE"}], "proposes": "Amends Section 138 of RA 7160 on local taxation (likely franchise tax or professional tax provision)", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "Pass", "P4": "Conditional", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Amendments to Section 138 typically involve the professional tax or franchise tax collected by provinces. Without the full text the direction is unclear — changes could either expand or curtail LGU revenue authority (P1, P4 Conditional). Must ensure amendments do not reduce LGU revenue base without replacement financing, maintain collection transparency (P5 Conditional), and harmonize with BIR rules (P6 Conditional)."}, {"mid": 211, "rep_title": "AN ACT RATIONALIZING LOCAL TAXATION AMENDING FOR THE PURPOSE SECTION 150, CHAPTER 1, TITLE ONE, BOOK II OF REPUBLIC ACT", "n_bills": 1, "archetype": "Other / residual — Local taxation", "theme": "Local Taxation & Revenue", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 2616, "title": "AN ACT RATIONALIZING LOCAL TAXATION AMENDING FOR THE PURPOSE SECTION 150, CHAPTER 1, TITLE ONE, BOOK II OF REPUBLIC ACT", "decision": "REVISE / CALIBRATE"}], "proposes": "Rationalizes local taxation by amending Section 150, Chapter 1, Title 1, Book II of RA 7160 (situs of tax on manufacturers/distributors)", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "Pass", "P4": "Conditional", "P5": "Pass", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "Section 150 situs rules govern where local business taxes are paid for companies operating across multiple LGUs. Rationalization can reduce inter-LGU tax conflicts (P6 pass) and improve transparency (P5 pass), but redistribution of situs may shift revenue away from producing LGUs toward consuming ones (P4 Conditional, P1 Conditional). P2 Conditional because some LGUs may lose revenue against their will. Needs a transition/hold-harmless clause for LGUs that would lose revenue."}, {"mid": 212, "rep_title": "AN ACT ESTABLISHING THE FISCAL REGIME FOR THE MINING INDUSTRY", "n_bills": 1, "archetype": "Other / residual — Local taxation", "theme": "Local Taxation & Revenue", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 6135, "title": "AN ACT ESTABLISHING THE FISCAL REGIME FOR THE MINING INDUSTRY", "decision": "REVISE / CALIBRATE"}], "proposes": "Establishes the fiscal regime for the mining industry", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "Conditional", "P4": "Conditional", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "A mining fiscal regime bill has sweeping implications for host LGUs and affected communities. All six principles engage conditionally: P1/P2 — LGU and community consent and share-of-revenues must be preserved; P3 — revenue sharing must reach the most local level (barangay, municipality); P4 — LGU shares (under Sec. 289/291 LGC) must not be diluted; P5 — disclosure of mining revenues and environmental liabilities required; P6 — must align with DENR, NIPAS, IPRA and existing LGC shares. This bill belongs primarily in mining/energy law but must be calibrated to protect LGU fiscal entitlements."}, {"mid": 213, "rep_title": "AN ACT AMENDING SECTIONS 236 AND 237 (A), (B), OF CHAPTER IV, TITLE I, BOOK II, OF REPUBLIC ACT NO. 7160, OTHERWISE KNOW", "n_bills": 1, "archetype": "Other / residual — Local taxation", "theme": "Local Taxation & Revenue", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 6187, "title": "AN ACT AMENDING SECTIONS 236 AND 237 (A), (B), OF CHAPTER IV, TITLE I, BOOK II, OF REPUBLIC ACT NO. 7160, OTHERWISE KNOW", "decision": "REVISE / CALIBRATE"}], "proposes": "Amends Sections 236 and 237(a)(b) of RA 7160 on levy on idle lands", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Pass", "P5": "Pass", "P6": "Pass"}, "decision": "ADOPT", "rationale": "Amending idle lands tax provisions strengthens LGU revenue authority (P1 pass), is a standard local fiscal tool with demonstrated community benefit in land utilization (P2, P3 pass), generates local revenue without national subsidy (P4 pass), and clarifying assessment and levy procedures improves accountability and transparency (P5 pass). Consistent with national land use and urbanization policy (P6 pass). A clean LGC technical improvement."}, {"mid": 214, "rep_title": "AN ACT GRANTING TAX EXEMPTIONS AND SUBSIDIES FOR THE LOCAL FILM AND MUSIC INDUSTRIES, AMENDING FOR THE PURPOSE SECTION 1", "n_bills": 1, "archetype": "Other / residual — Local taxation", "theme": "Local Taxation & Revenue", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 19, "number": 7086, "title": "AN ACT GRANTING TAX EXEMPTIONS AND SUBSIDIES FOR THE LOCAL FILM AND MUSIC INDUSTRIES, AMENDING FOR THE PURPOSE SECTION 1", "decision": "REVISE / CALIBRATE"}], "proposes": "Grants tax exemptions and subsidies for the local film and music industries, amending Section 1[40 or similar] of RA 7160", "scores": {"P1": "Fail", "P2": "Conditional", "P3": "Conditional", "P4": "Fail", "P5": "Conditional", "P6": "Conditional"}, "decision": "REJECT / REFER", "rationale": "Mandating LGU tax exemptions for film and music industries overrides LGU taxing discretion (P1 Fail) and imposes revenue loss on LGUs without national compensation (P4 Fail) — two core failures. Cultural industry incentives are legitimate but should be structured as optional LGU incentives or funded through national fiscal transfers, not as unfunded mandates on local revenue. The measure should be referred to the film/cultural industry legislation track or restructured as a national tax incentive under TIPC/BOI."}, {"mid": 215, "rep_title": "AN ACT GRANTING TAX EXEMPTIONS AND SUBSIDIES FOR THE LOCAL FILM INDUSTRY, AMENDING FOR THE PURPOSE SECTION 140 OF REPUBL", "n_bills": 1, "archetype": "Other / residual — Local taxation", "theme": "Local Taxation & Revenue", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 19, "number": 7111, "title": "AN ACT GRANTING TAX EXEMPTIONS AND SUBSIDIES FOR THE LOCAL FILM INDUSTRY, AMENDING FOR THE PURPOSE SECTION 140 OF REPUBL", "decision": "REVISE / CALIBRATE"}], "proposes": "Grants tax exemptions and subsidies for the local film industry only, amending Section 140 of RA 7160", "scores": {"P1": "Fail", "P2": "Conditional", "P3": "N/A", "P4": "Fail", "P5": "Conditional", "P6": "Conditional"}, "decision": "REJECT / REFER", "rationale": "Same structural defect as mid 214 but scoped to film alone. Amending Section 140 (amusement tax) to mandate exemptions removes LGU discretion over a key revenue source (P1 Fail) and constitutes an unfunded mandate (P4 Fail). LGUs near major production hubs would bear disproportionate revenue loss. Should be referred to a national film development or fiscal incentive framework rather than imposed through the LGC."}, {"mid": 216, "rep_title": "AN ACT INSTITUTIONALIZING THE MANDATORY ESTABLISHMENT OF AN ENVIRONMENT AND NATURAL RESOURCES MANAGEMENT OFFICE IN ALL P", "n_bills": 3, "archetype": "Other / residual — Mandatory local officers", "theme": "Personnel & Mandatory Officers", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 620, "title": "AN ACT INSTITUTIONALIZING THE MANDATORY ESTABLISHMENT OF AN ENVIRONMENT AND NATURAL RESOURCES MANAGEMENT OFFICE IN ALL P", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 426, "title": "AN ACT INSTITUTIONALIZING THE MANDATORY ESTABLISHMENT OF AN ENVIRONMENT AND NATURAL RESOURCES MANAGEMENT OFFICE IN ALL P", "decision": "REVISE / CALIBRATE"}, {"congress": 20, "number": 409, "title": "AN ACT INSTITUTIONALIZING THE MANDATORY ESTABLISHMENT OF AN ENVIRONMENT AND NATURAL RESOURCES MANAGEMENT OFFICE IN ALL P", "decision": "REVISE / CALIBRATE"}], "proposes": "Institutionalizes mandatory establishment of an Environment and Natural Resources Management Office (ENRMO) in all provinces/cities/municipalities", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "Pass", "P4": "Fail", "P5": "Pass", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "Creating a mandatory ENRMO in every LGU improves environmental governance (P5, P6 pass) and correctly places environmental management at the local level (P3 pass). However, mandating a new office without national funding support is an unfunded mandate (P4 Fail) — the binding defect — especially burdensome for 4th–6th class LGUs. P1 Conditional because it constrains organizational discretion. Bill should include a phased implementation schedule, national budget augmentation for lower-income LGUs, and allow smaller LGUs to share an ENRMO through inter-LGU cooperation."}, {"mid": 217, "rep_title": "AN ACT INSTITUTIONALIZING THE MANDATORY ESTABLISHMENT OF A POPULATION OFFICE IN ALL PROVINCES, CITIES AND MUNICIPALITIES", "n_bills": 2, "archetype": "Other / residual — Mandatory local officers", "theme": "Personnel & Mandatory Officers", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 621, "title": "AN ACT INSTITUTIONALIZING THE MANDATORY ESTABLISHMENT OF A POPULATION OFFICE IN ALL PROVINCES, CITIES AND MUNICIPALITIES", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "number": 5880, "title": "AN ACT INSTITUTIONALIZING THE MANDATORY ESTABLISHMENT OF A POPULATION OFFICE IN ALL PROVINCES, CITIES AND MUNICIPALITIES", "decision": "REVISE / CALIBRATE"}], "proposes": "Mandates establishment of a Population Office in all provinces, cities, and municipalities.", "scores": {"P1": "Fail", "P2": "Fail", "P3": "Conditional", "P4": "Fail", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Mandatory top-down imposition of a new office (P1, P2 Fail) without accompanying national funding creates an unfunded mandate risk (P4 Fail). Population management is a legitimate local function but imposing the structural form overrides LGU discretion. Revision should allow LGUs to integrate population functions into existing offices or grant funding and phase-in flexibility."}, {"mid": 218, "rep_title": "AN ACT AMENDING TITLE V, SECTION 470 (A), (B) AND SECTION 471 (A) OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL", "n_bills": 2, "archetype": "Other / residual — Mandatory local officers", "theme": "Personnel & Mandatory Officers", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 895, "title": "AN ACT AMENDING TITLE V, SECTION 470 (A), (B) AND SECTION 471 (A) OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 904, "title": "AN ACT AMENDING TITLE V, SECTION 470 (A), (B) AND SECTION 471 (A) OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL", "decision": "REVISE / CALIBRATE"}], "proposes": "Amends Sections 470 and 471 of RA 7160 on local civil registrar qualifications and duties.", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "Pass", "P4": "Conditional", "P5": "Pass", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "Updating civil registrar qualifications and duties is nationally coherent and improves accountability (P5, P6 Pass), and the function is appropriately local (P3 Pass). However, raising qualification standards without funding adjustments may create fiscal strain (P4 Conditional) and limits LGU staffing discretion (P1, P2 Conditional). Revision should pair qualification upgrades with commensurate salary grade and budget support."}, {"mid": 219, "rep_title": "AN ACT MAKING THE POSITION OF SOCIAL WELFARE AND DEVELOPMENT OFFICER MANDATORY IN THE MUNICIPAL LEVEL, AMENDING FOR THE", "n_bills": 1, "archetype": "Other / residual — Mandatory local officers", "theme": "Personnel & Mandatory Officers", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 4467, "title": "AN ACT MAKING THE POSITION OF SOCIAL WELFARE AND DEVELOPMENT OFFICER MANDATORY IN THE MUNICIPAL LEVEL, AMENDING FOR THE", "decision": "REVISE / CALIBRATE"}], "proposes": "Makes the position of Social Welfare and Development Officer mandatory at the municipal level.", "scores": {"P1": "Fail", "P2": "Conditional", "P3": "Pass", "P4": "Fail", "P5": "Conditional", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "Social welfare functions are inherently local (P3 Pass) and nationally coherent (P6 Pass), but mandating a dedicated officer at the municipal level without a dedicated national funding stream creates an unfunded mandate (P4 Fail) and overrides LGU organizational discretion (P1 Fail). Revision should either provide IRA-supplement funding or allow smaller municipalities to share or embed the function in existing offices."}, {"mid": 220, "rep_title": "AN ACT AMENDING SECTIONS 443, 454, AND 463 OF REPUBLIC ACT NO. 7160 OTHERWISE KNOWN AS THE \\\"LOCAL GOVERNMENT CODE OF 19", "n_bills": 3, "archetype": "Other / residual — Mandatory local officers", "theme": "Personnel & Mandatory Officers", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 6319, "title": "AN ACT AMENDING SECTIONS 443, 454, AND 463 OF REPUBLIC ACT NO. 7160 OTHERWISE KNOWN AS THE \\\"LOCAL GOVERNMENT CODE OF 19", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 5503, "title": "AN ACT AMENDING SECTIONS 443, 454, 463, AND 477 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS “THE LOCAL GOVERNMENT CODE", "decision": "REVISE / CALIBRATE"}, {"congress": 20, "number": 1166, "title": "AN ACT AMENDING SECTIONS 391, 447, 458 AND 468 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF", "decision": "REVISE / CALIBRATE"}], "proposes": "Amends Sections 443, 454, and 463 of RA 7160 to add mandatory officers for municipalities, component cities, and provinces.", "scores": {"P1": "Fail", "P2": "Fail", "P3": "Conditional", "P4": "Fail", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Amending multiple sections to impose additional mandatory officers across all LGU levels compounds unfunded mandate risk (P4 Fail) and directly curtails LGU organizational autonomy (P1, P2 Fail). The breadth of the amendment signals a top-down staffing model inconsistent with subsidiarity in its truest form. Revision must include funding provisions and tiered applicability by LGU income class."}, {"mid": 221, "rep_title": "AN ACT AMENDING SECTION 463 UNDER CHAPTER 2, TITLE 4, BOOK 3 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVE", "n_bills": 3, "archetype": "Other / residual — Mandatory local officers", "theme": "Personnel & Mandatory Officers", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 7382, "title": "AN ACT AMENDING SECTION 463 UNDER CHAPTER 2, TITLE 4, BOOK 3 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVE", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 1819, "title": "AN ACT AMENDING SECTION 463 UNDER CHAPTER 2, TITLE 4, BOOK 3 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVE", "decision": "REVISE / CALIBRATE"}, {"congress": 20, "number": 3374, "title": "AN ACT AMENDING SECTION 463 UNDER CHAPTER 2, TITLE 4, BOOK 3 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVE", "decision": "REVISE / CALIBRATE"}], "proposes": "Amends Section 463 of RA 7160 to modify mandatory officer requirements at the provincial level.", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "Pass", "P4": "Conditional", "P5": "Conditional", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "A more targeted amendment to provincial-level officer requirements is narrower in scope, making fiscal and autonomy concerns more manageable (P1, P4 Conditional rather than Fail). Provincial functions are appropriately assigned (P3 Pass) and nationally coherent (P6 Pass). Revision should confirm funding adequacy and allow flexibility in how provinces structure the mandated function."}, {"mid": 222, "rep_title": "AN ACT CREATING THE POSITION OF BARANGAY NUTRITION WORKER IN EVERY BARANGAY PROVIDING INCENTIVES THERETO, APPROPRIATING", "n_bills": 1, "archetype": "Other / residual — Mandatory local officers", "theme": "Personnel & Mandatory Officers", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 9613, "title": "AN ACT CREATING THE POSITION OF BARANGAY NUTRITION WORKER IN EVERY BARANGAY PROVIDING INCENTIVES THERETO, APPROPRIATING", "decision": "REVISE / CALIBRATE"}], "proposes": "Creates the position of Barangay Nutrition Worker in every barangay with incentives and appropriations.", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "Pass", "P4": "Conditional", "P5": "Pass", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "Nutrition work is best delivered at the barangay level (P3 Pass) and the measure includes appropriations language which partially addresses fiscal concern (P4 Conditional). However, the adequacy and sustainability of the appropriation versus actual per-barangay cost is unverified, and mandatory creation at every barangay regardless of capacity limits self-determination (P1, P2 Conditional). Revision should ensure funding is sufficient and allow barangay federation arrangements for very small barangays."}, {"mid": 223, "rep_title": "AN ACT PROVIDING FOR MANDATORY APPOINTMENT OF PUBLIC INFORMATION OFFICERS IN LOCAL GOVERNMENT UNITS, AMENDING FOR THE PU", "n_bills": 1, "archetype": "Other / residual — Mandatory local officers", "theme": "Personnel & Mandatory Officers", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 19, "number": 4357, "title": "AN ACT PROVIDING FOR MANDATORY APPOINTMENT OF PUBLIC INFORMATION OFFICERS IN LOCAL GOVERNMENT UNITS, AMENDING FOR THE PU", "decision": "REVISE / CALIBRATE"}], "proposes": "Mandates appointment of Public Information Officers in all LGUs.", "scores": {"P1": "Fail", "P2": "Fail", "P3": "Conditional", "P4": "Fail", "P5": "Pass", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "Mandatory PIOs strengthen transparency and accountability (P5 Pass) and align with FOI policy (P6 Pass), but imposing a dedicated position on all LGUs regardless of size or capacity is an unfunded mandate (P4 Fail) and overrides local organizational choice (P1, P2 Fail). Revision should allow smaller LGUs to designate an existing officer as PIO, with a dedicated position required only above a population or income threshold."}, {"mid": 224, "rep_title": "AN ACT PROVIDING FOR MANDATORY APPOINTMENT 0F BUILDING OFFICIAL IN PROVINCES, CITIES AND MUNICIPALITIES, AMENDING FOR TH", "n_bills": 1, "archetype": "Other / residual — Mandatory local officers", "theme": "Personnel & Mandatory Officers", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 19, "number": 5704, "title": "AN ACT PROVIDING FOR MANDATORY APPOINTMENT 0F BUILDING OFFICIAL IN PROVINCES, CITIES AND MUNICIPALITIES, AMENDING FOR TH", "decision": "REVISE / CALIBRATE"}], "proposes": "Mandates appointment of Building Officials in all provinces, cities, and municipalities.", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "Pass", "P4": "Conditional", "P5": "Pass", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "Building regulation is an inherently local function (P3 Pass) and a mandatory Building Official supports safety accountability (P5 Pass) and coherence with the National Building Code (P6 Pass). The function is relatively standard, moderately mitigating the autonomy concern (P1, P2 Conditional). P4 is Conditional pending confirmation that national government provides funding support or that fees/permits self-finance the position. Revision should clarify the funding mechanism."}, {"mid": 225, "rep_title": "AN ACT PROVIDING FOR THE MANDATORY APPOINTMENT OF ENVIRONMENT AND NATURAL RESOURCE OFFICERS AND SOCIAL WELFARE AND DEVEL", "n_bills": 1, "archetype": "Other / residual — Mandatory local officers", "theme": "Personnel & Mandatory Officers", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 20, "number": 3780, "title": "AN ACT PROVIDING FOR THE MANDATORY APPOINTMENT OF ENVIRONMENT AND NATURAL RESOURCE OFFICERS AND SOCIAL WELFARE AND DEVEL", "decision": "REVISE / CALIBRATE"}], "proposes": "Mandates appointment of Environment and Natural Resource Officers and Social Welfare and Development Officers in LGUs.", "scores": {"P1": "Fail", "P2": "Fail", "P3": "Pass", "P4": "Fail", "P5": "Conditional", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "Mandating two separate specialized officer positions simultaneously doubles the unfunded mandate risk (P4 Fail) and severely constrains LGU organizational autonomy (P1, P2 Fail). Both functions are locally relevant (P3 Pass) and nationally coherent (P6 Pass). Revision should decouple the two positions, provide income-class-tiered applicability, and include a dedicated national fund transfer to cover personnel costs."}, {"mid": 226, "rep_title": "AN ACT FURTHER AMENDING REPUBLIC ACT NO. 8759, OTHERWISE KNOWN AS THE PUBLIC EMPLOYMENT SERVICE OFFICE ACT OF 1999, AS A", "n_bills": 1, "archetype": "Other / residual — Other / cross-cutting", "theme": "Other / Cross-cutting", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 631, "title": "AN ACT FURTHER AMENDING REPUBLIC ACT NO. 8759, OTHERWISE KNOWN AS THE PUBLIC EMPLOYMENT SERVICE OFFICE ACT OF 1999, AS A", "decision": "REVISE / CALIBRATE"}], "proposes": "Further amends the Public Employment Service Office Act of 1999 affecting LGU-based PESO operations.", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "Pass", "P4": "Conditional", "P5": "Pass", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "Employment service delivery is appropriately local (P3 Pass), and PESO strengthens labor market accountability (P5 Pass) with clear national coherence (P6 Pass). Amendments to an existing law with established structures are less disruptive to autonomy than creating new offices, but any expansion of PESO mandates without commensurate DOLE funding remains a conditional fiscal concern (P4 Conditional). Revision should confirm that additional mandates are matched by enhanced national subsidy to PESO."}, {"mid": 227, "rep_title": "AN ACT INSTITUTIONALIZING A FIVE PERCENT (5%) BUDGETARY ALLOCATION OF BARANGAYS FOR THE IMPLEMENTATION OF PROGRAMS, PROJ", "n_bills": 5, "archetype": "Other / residual — Other / cross-cutting", "theme": "Other / Cross-cutting", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 1704, "title": "AN ACT INSTITUTIONALIZING A FIVE PERCENT (5%) BUDGETARY ALLOCATION OF BARANGAYS FOR THE IMPLEMENTATION OF PROGRAMS, PROJ", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "number": 6037, "title": "AN ACT INSTITUTIONALIZING A TEN PERCENT BUDGETARY ALLOCATION OF BARANGAYS FOR THE IMPLEMENTATION OF PROGRAMS, PROJECTS,", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 4709, "title": "AN ACT INSTITUTIONALIZING A FIVE PERCENT (5%) BUDGETARY ALLOCATION OF BARANGAYS FOR THE IMPLEMENTATION OF PROGRAMS, PROJ", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 8561, "title": "AN ACT INSTITUTIONALIZING A SIX PERCENT BUDGETARY ALLOCATION OF BARANGAYS FOR THE IMPLEMENTATION OF PROGRAMS, PROJECTS,", "decision": "REVISE / CALIBRATE"}, {"congress": 20, "number": 1423, "title": "AN ACT INSTITUTIONALIZING A SIX PERCENT BUDGETARY ALLOCATION OF BARANGAYS FOR THE IMPLEMENTATION OF PROGRAMS, PROJECTS,", "decision": "REVISE / CALIBRATE"}], "proposes": "Institutionalizes a mandatory 5% budgetary allocation in barangay budgets for specified programs.", "scores": {"P1": "Fail", "P2": "Fail", "P3": "Conditional", "P4": "Fail", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Earmarking a fixed percentage of barangay budgets from above directly contradicts barangay fiscal autonomy and self-determination (P1, P2 Fail), and further constrains already-thin barangay budgets without additional resources (P4 Fail). This stacks on top of existing mandatory earmarks (SK, LDRRM, etc.), potentially leaving barangays with negligible discretionary funds. Revision should either make this a recommended minimum, eliminate it in favor of technical assistance, or offset it with an increase in barangay IRA share."}, {"mid": 228, "rep_title": "AN ACT CREATING TWO (2) ADDITIONAL BRANCHES OF REGIONAL TRIAL COURTS IN THE PROVINCE OF ILOILO WITH SEATS AT THE COMPONE", "n_bills": 1, "archetype": "Other / residual — Other / cross-cutting", "theme": "Other / Cross-cutting", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 5149, "title": "AN ACT CREATING TWO (2) ADDITIONAL BRANCHES OF REGIONAL TRIAL COURTS IN THE PROVINCE OF ILOILO WITH SEATS AT THE COMPONE", "decision": "REVISE / CALIBRATE"}], "proposes": "Creates two additional branches of Regional Trial Courts in Iloilo Province seated at component municipalities.", "scores": {"P1": "N/A", "P2": "N/A", "P3": "Pass", "P4": "N/A", "P5": "Pass", "P6": "Pass"}, "decision": "REJECT / REFER", "rationale": "This is a judiciary infrastructure measure — court creation is a national government function under the Supreme Court and Congress and does not amend the Local Government Code. It does not engage LGU autonomy, self-determination, or fiscal justice principles. While improved court access at the component municipality level is consistent with subsidiarity and benefits local communities, this bill belongs in judiciary legislation, not an LGC amendment. It should be referred to the appropriate judiciary or justice committee."}, {"mid": 229, "rep_title": "AN ACT AMENDING REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991, FOR THE PURPOSE OF ENHANCIN", "n_bills": 1, "archetype": "Other / residual — Other / cross-cutting", "theme": "Other / Cross-cutting", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 5199, "title": "AN ACT AMENDING REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991, FOR THE PURPOSE OF ENHANCIN", "decision": "REVISE / CALIBRATE"}], "proposes": "Amends RA 7160 to enhance (likely governance, service delivery, or LGU capacity — title truncated)", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "Conditional", "P4": "Conditional", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Title is truncated and substance is indeterminate; the amendment touches RA 7160 broadly, so all principles are conditionally engaged pending full text. Cannot confirm no unfunded mandate or that it strengthens rather than constrains autonomy without the operative provisions."}, {"mid": 230, "rep_title": "AN ACT AMENDING REPUBLIC ACT NO. 8256, OTHERWISE KNOWN AS \\\"AN ACT DECLARING THE FOUNDATION DAYS AND FEAST DAYS OF THE P", "n_bills": 1, "archetype": "Other / residual — Other / cross-cutting", "theme": "Other / Cross-cutting", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 5637, "title": "AN ACT AMENDING REPUBLIC ACT NO. 8256, OTHERWISE KNOWN AS \\\"AN ACT DECLARING THE FOUNDATION DAYS AND FEAST DAYS OF THE P", "decision": "REVISE / CALIBRATE"}], "proposes": "Amends RA 8256 to expand or modify the declaration of foundation days and feast days of Philippine patron saints as special non-working holidays", "scores": {"P1": "Conditional", "P2": "Pass", "P3": "Pass", "P4": "Fail", "P5": "N/A", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Declaring additional non-working holidays imposes labor-cost and productivity burdens on LGU employers and local businesses without compensatory funding (P4 Fail — unfunded economic mandate). The measure reflects local cultural identity (P2 Pass) and is local in nature (P3 Pass), but nationwide or blanket application risks incoherence across LGUs with different patron saints (P6 Conditional). Revision should limit scope to localities that affirmatively opt in and assess economic impact."}, {"mid": 231, "rep_title": "AN ACT EXCLUDING CERTAIN PORTIONS OF SITIO BAQUILAN IN BARANGAY SAN JUAN, MUNICIPALITY OF BOTOLAN, PROVINCE OF ZAMBALES", "n_bills": 1, "archetype": "Other / residual — Other / cross-cutting", "theme": "Other / Cross-cutting", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 7182, "title": "AN ACT EXCLUDING CERTAIN PORTIONS OF SITIO BAQUILAN IN BARANGAY SAN JUAN, MUNICIPALITY OF BOTOLAN, PROVINCE OF ZAMBALES", "decision": "REVISE / CALIBRATE"}], "proposes": "Excludes certain portions of Sitio Baquilan in Barangay San Juan, Botolan, Zambales from a coverage area (likely a protected zone, development boundary, or hazard map)", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Pass", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Boundary or coverage exclusions affecting a specific sitio respond to local conditions and generally strengthen LGU self-determination (P1, P2, P3 Pass). No new fiscal burden is apparent (P4 Pass). However, exclusions from coverage areas — especially if related to hazard or environmental zones — must be transparently justified and consistent with national zoning or disaster-risk frameworks (P5 Conditional, P6 Conditional). Legislation should require full disclosure of the exclusion rationale and NAMRIA/HLURB/DENR concurrence."}, {"mid": 232, "rep_title": "AN ACT AMENDING REPUBLIC ACT 7160", "n_bills": 1, "archetype": "Other / residual — Other / cross-cutting", "theme": "Other / Cross-cutting", "sheet_decision": "REVI ARTICLE 310, TO INCREASE THE PENALTIES IN C", "n_bills": 1, "archetype": "Other / residual — Other / cross-cutting", "theme": "Other / Cross-cutting", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 9118, "title": "AN ACT AMENDING ACT NO. 3815, AS AMENDED, OTHERWISE KNOWN AS THE PENAL CODE, ARTICLE 310, TO INCREASE THE PENALTIES IN C", "decision": "REVISE / CALIBRATE"}], "proposes": "Amends Article 310 of the Revised Penal Code to increase penalties for qualified theft — not an LGC amendment", "scores": {"P1": "N/A", "P2": "N/A", "P3": "N/A", "P4": "N/A", "P5": "Pass", "P6": "Pass"}, "decision": "REJECT / REFER", "rationale": "This is a purely national criminal law amendment (Revised Penal Code) with no direct local government governance, fiscal, or autonomy dimension. It does not belong in the LGC amendment stream and falls outside ULAP's screening mandate. Refer to the House/Senate Committees on Justice. P5 and P6 nominally pass as stricter penalties support rule of law, but the measure is not LGC-related."}, {"mid": 235, "rep_title": "AN ACT AMENDING REPUBLIC ACT NUMBERED ELEVEN THOUSAND FIVE HUNDRED EIGHTEEN (RA 11518) OR THE GENERAL APPROPRIATIONS ACT", "n_bills": 1, "archetype": "Other / residual — Other / cross-cutting", "theme": "Other / Cross-cutting", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 9192, "title": "AN ACT AMENDING REPUBLIC ACT NUMBERED ELEVEN THOUSAND FIVE HUNDRED EIGHTEEN (RA 11518) OR THE GENERAL APPROPRIATIONS ACT", "decision": "REVISE / CALIBRATE"}], "proposes": "Amends RA 11518 (General Appropriations Act) — likely to restore, increase, or realign a specific LGU-related appropriation", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "Conditional", "P4": "Conditional", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "A GAA amendment is inherently time-bound and its LGC relevance depends entirely on which appropriation is being changed. Without the operative provision, all principles are conditional. If the amendment restores devolved-function funding to LGUs, P4 and P1 would clearly pass; if it centralizes or conditions releases, they would fail. Full title and text required before a definitive verdict."}, {"mid": 236, "rep_title": "AN ACT AMENDING REPUBLIC ACT NO. 8185, OTHERWISE KNOWN AS AND ACT AMMENDING SECTION 324(D) OF REPUBLIC ATCT NO. 7160, OT", "n_bills": 1, "archetype": "Other / residual — Other / cross-cutting", "theme": "Other / Cross-cutting", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 19, "number": 1237, "title": "AN ACT AMENDING REPUBLIC ACT NO. 8185, OTHERWISE KNOWN AS AND ACT AMMENDING SECTION 324(D) OF REPUBLIC ATCT NO. 7160, OT", "decision": "REVISE / CALIBRATE"}], "proposes": "Amends RA 8185 (which itself amended Section 324(d) of RA 7160) — concerning LGU budget deficit ceilings or borrowing limits", "scores": {"P1": "Pass", "P2": "Conditional", "P3": "N/A", "P4": "Pass", "P5": "Conditional", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "Section 324(d) governs LGU debt service or budget deficit limits. Amending it to give LGUs more fiscal headroom strengthens autonomy (P1 Pass) and fiscal sustainability (P4 Pass) and is coherent with national fiscal policy (P6 Pass). However, raising deficit ceilings without stronger accountability safeguards risks fiscal imprudence (P5 Conditional). The measure should pair any ceiling increase with mandatory disclosure and DBM/COA reporting requirements."}, {"mid": 237, "rep_title": "AN ACT RELOCATING THE SHARING OF TAXES BETWEEN LOCAL GOVERNMANT UNITS HOSTING PRINCIPAL OFFICES, FACTORIES, PROJECT OFFI", "n_bills": 1, "archetype": "Other / residual — Other / cross-cutting", "theme": "Other / Cross-cutting", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 19, "number": 4774, "title": "AN ACT RELOCATING THE SHARING OF TAXES BETWEEN LOCAL GOVERNMANT UNITS HOSTING PRINCIPAL OFFICES, FACTORIES, PROJECT OFFI", "decision": "REVISE / CALIBRATE"}], "proposes": "Relocates (realigns) the sharing formula for taxes between LGUs hosting principal offices, factories, project offices, or plantations of businesses", "scores": {"P1": "Pass", "P2": "Conditional", "P3": "Pass", "P4": "Conditional", "P5": "Pass", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Realigning the situs-of-taxation shares directly affects horizontal fiscal equity among LGUs (P4 Conditional — winners and losers must be identified and transition provisions included). The measure supports subsidiarity by directing revenues to the level bearing the burden of hosting facilities (P3 Pass) and strengthens transparency if situs rules are clarified (P5 Pass). P6 is conditional because inconsistent application across regions can distort economic geography; a uniform national formula with LGU consultation is needed."}, {"mid": 238, "rep_title": "AN ACT INSTITUTING REFORMS IN REAL PROPERTY VALUATION AND ASSESSMENT IN THE PHILIPPINES, AMENDING FOR THIS PURPOSE SECTI", "n_bills": 1, "archetype": "Other / residual — Other / cross-cutting", "theme": "Other / Cross-cutting", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 19, "number": 5289, "title": "AN ACT INSTITUTING REFORMS IN REAL PROPERTY VALUATION AND ASSESSMENT IN THE PHILIPPINES, AMENDING FOR THIS PURPOSE SECTI", "decision": "REVISE / CALIBRATE"}], "proposes": "Institutes reforms in real property valuation and assessment in the Philippines, amending related LGC provisions", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "Conditional", "P4": "Conditional", "P5": "Pass", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "Real property valuation reform (likely toward market-value-based assessment) can strengthen LGU own-source revenues (P4 positive) and transparency (P5 Pass) and aligns with national fiscal policy (P6 Pass). However, if the reform centralizes valuation authority away from local assessors, it weakens P1 and P3 (Conditional). If it mandates uniform market valuations without transition relief, it may spike local tax burdens without offsetting LGU flexibility — making P2 and P4 conditional. Revisions must preserve local assessor authority within a national standards framework and include graduated implementation."}, {"mid": 239, "rep_title": "AN ACT REQUIRING MANDATORY INSURANCE OF ALL BUILDINGS AND OTHER PHYSICAL STRUCTURES OWNED BY LOCAL GOVERNMENT UNITS, AME", "n_bills": 1, "archetype": "Other / residual — Other / cross-cutting", "theme": "Other / Cross-cutting", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 19, "number": 5302, "title": "AN ACT REQUIRING MANDATORY INSURANCE OF ALL BUILDINGS AND OTHER PHYSICAL STRUCTURES OWNED BY LOCAL GOVERNMENT UNITS, AME", "decision": "REVISE / CALIBRATE"}], "proposes": "Requires mandatory insurance of all buildings and physical structures owned by LGUs, amending related LGC provisions", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "N/A", "P4": "Fail", "P5": "Pass", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "Mandatory insurance is a sound risk-management and asset-protection policy (P5 Pass, P6 Pass), but it imposes a recurring premium cost on all LGUs without a dedicated funding source or national subsidy — a classic unfunded mandate especially burdensome for small, low-income LGUs (P4 Fail). The measure should either appropriate national co-payment for poorer LGUs, allow LGUs to self-insure above a threshold, or phase in requirements by LGU income class to be fiscally fair."}, {"mid": 240, "rep_title": "AN ACT ENHANCING THE TAXING POWERS OF LOCAL GOVERNMENT UNITS, AMENDING FOR THIS PURPOSE SECTIONS 131, 141, 150, 171, AND", "n_bills": 1, "archetype": "Other / residual — Other / cross-cutting", "theme": "Other / Cross-cutting", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 19, "number": 5304, "title": "AN ACT ENHANCING THE TAXING POWERS OF LOCAL GOVERNMENT UNITS, AMENDING FOR THIS PURPOSE SECTIONS 131, 141, 150, 171, AND", "decision": "REVISE / CALIBRATE"}], "proposes": "Enhances the taxing powers of LGUs by amending Sections 131, 141, 150, 171, and related LGC provisions", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Pass", "P5": "Conditional", "P6": "Conditional"}, "decision": "ADOPT", "rationale": "Expanding LGU taxing authority directly strengthens fiscal autonomy (P1 Pass), responds to longstanding LGU demand for own-source revenue capacity (P2 Pass), places revenue generation at the level delivering services (P3 Pass), and improves fiscal sustainability without creating unfunded mandates (P4 Pass). P5 is conditional on pairing enhanced powers with mandatory disclosure of new tax utilization. P6 is conditional on ensuring rate floors/ceilings prevent harmful inter-LGU tax competition. Overall, this is the most LGC-aligned measure in the batch and warrants adoption with transparency and anti-race-to-the-bottom guardrails."}, {"mid": 241, "rep_title": "AN ACT PROVIDING FOR BUSINESS-FRIENDLY TAX REMEDIES IN LOCAL GOVERNMENT UNITS BY AMENDING CERTAIN PROVISIONS IN BOOK II", "n_bills": 1, "archetype": "Other / residual — Other / cross-cutting", "theme": "Other / Cross-cutting", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 19, "number": 5403, "title": "AN ACT PROVIDING FOR BUSINESS-FRIENDLY TAX REMEDIES IN LOCAL GOVERNMENT UNITS BY AMENDING CERTAIN PROVISIONS IN BOOK II", "decision": "REVISE / CALIBRATE"}], "proposes": "Amends Book II of RA 7160 to introduce business-friendly tax remedy provisions for LGUs, easing tax dispute and settlement processes for local businesses.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Conditional", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "The measure broadly strengthens LGU fiscal autonomy and reduces barriers to
