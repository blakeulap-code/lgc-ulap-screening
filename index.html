business. However, 'business-friendly' remedies could undercut LGU revenue collection capacity (P4 risk of fiscal erosion) and need safeguards to ensure transparency in compromise/settlement processes (P5). Conditioning on revenue-neutral design and audit trail requirements would resolve both."}, {"mid": 242, "rep_title": "AN ACT EXPANDING THE POWER OF LOCAL GOVERNMENT UNITS TO CREATE INDEBTEDNESS AND TO ENTER INTO CREDIT AND OTHER FINANCIAL", "n_bills": 2, "archetype": "Other / residual — Other / cross-cutting", "theme": "Other / Cross-cutting", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 19, "number": 6404, "title": "AN ACT EXPANDING THE POWER OF LOCAL GOVERNMENT UNITS TO CREATE INDEBTEDNESS AND TO ENTER INTO CREDIT AND OTHER FINANCIAL", "decision": "REVISE / CALIBRATE"}, {"congress": 20, "number": 1993, "title": "AN ACT EXPANDING THE POWER OF LOCAL GOVERNMENT UNITS TO CREATE INDEBTEDNESS AND TO ENTER INTO CREDIT AND OTHER FINANCIAL", "decision": "REVISE / CALIBRATE"}], "proposes": "Expands LGU power to incur indebtedness and enter into credit and other financial transactions beyond current RA 7160 limits.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Expanding LGU borrowing power strengthens fiscal autonomy (P1/P3), but without mandatory disclosure, debt ceilings, and creditworthiness standards the measure risks fiscal distress (P4), weak accountability (P5), and uncoordinated borrowing that conflicts with national fiscal policy (P6). Conditioned on robust disclosure and prudential guardrails."}, {"mid": 243, "rep_title": "AN ACT UPDATING THE REQUISITES FOR THE CREATION OF MUNICIPALITIES, CITIES, AND PROVINCES BY AMENDING CERTAIN PROVISIONS", "n_bills": 1, "archetype": "Other / residual — Other / cross-cutting", "theme": "Other / Cross-cutting", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 19, "number": 10547, "title": "AN ACT UPDATING THE REQUISITES FOR THE CREATION OF MUNICIPALITIES, CITIES, AND PROVINCES BY AMENDING CERTAIN PROVISIONS", "decision": "REVISE / CALIBRATE"}], "proposes": "Updates income, population, and land area thresholds for the creation of municipalities, cities, and provinces under RA 7160.", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "Conditional", "P4": "Fail", "P5": "Pass", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Revising creation requisites can rationalise LGU structure (P3/P6) but must ensure newly created units are fiscally viable at creation and do not dilute IRA shares of existing LGUs without compensation (P4 Fail unless fiscal impact analysis and transitional IRA adjustment are built in). Community consultation requirements also need explicit inclusion for P2."}, {"mid": 244, "rep_title": "AN ACT PROVIDING FOR THE RETROACTIVE APPLICATION OF SALARY INCREASES OR ADJUSTMENTS, AND ADDITIONAL ALLOWANCE FOR CIVILI", "n_bills": 2, "archetype": "Other / residual — Other / cross-cutting", "theme": "Other / Cross-cutting", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 19, "number": 10844, "title": "AN ACT PROVIDING FOR THE RETROACTIVE APPLICATION OF SALARY INCREASES OR ADJUSTMENTS, AND ADDITIONAL ALLOWANCE FOR CIVILI", "decision": "REVISE / CALIBRATE"}, {"congress": 20, "number": 1867, "title": "AN ACT PROVIDING FOR THE RETROACTIVE APPLICATION OF SALARY INCREASES OR ADJUSTMENTS, AND ADDITIONAL ALLOWANCE FOR CIVILI", "decision": "REVISE / CALIBRATE"}], "proposes": "Provides for retroactive application of salary increases or adjustments and additional allowances for civilian local government employees.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "N/A", "P4": "Fail", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Retroactive salary mandates without national funding appropriation constitute an unfunded mandate on LGU budgets (P4 Fail), particularly for lower-income LGUs. The measure should clarify whether national government shoulders the retroactive differential or whether LGUs are given a phased implementation period with a corresponding IRA supplement."}, {"mid": 245, "rep_title": "AN ACT AMENDING SECTION 261, TITLE II, CHAPTER VI OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE `LOCAL GOVERNMENT COD", "n_bills": 1, "archetype": "Other / residual — Other / cross-cutting", "theme": "Other / Cross-cutting", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 19, "number": 10847, "title": "AN ACT AMENDING SECTION 261, TITLE II, CHAPTER VI OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE `LOCAL GOVERNMENT COD", "decision": "REVISE / CALIBRATE"}], "proposes": "Amends Section 261 of RA 7160 (Title II, Chapter VI) relating to prohibited acts and election offenses under the Local Government Code.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "N/A", "P4": "N/A", "P5": "Pass", "P6": "Pass"}, "decision": "ADOPT", "rationale": "Amendments to election-offense provisions (Sec. 261) tighten accountability of local officials (P5) without creating fiscal burdens or autonomy conflicts. Aligns with the broader anti-corruption and democratic governance framework (P6). No unfunded mandate or subsidiarity issue is raised by an enforcement-focused amendment."}, {"mid": 246, "rep_title": "AN ACT PROVIDING FOR THE RETROACTIVE APPLICATION OF NATIONALLY MANDATED SALARY INCREASES AND ADJUSTMENTS FOR LOCAL GOVER", "n_bills": 2, "archetype": "Other / residual — Other / cross-cutting", "theme": "Other / Cross-cutting", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 19, "number": 10851, "title": "AN ACT PROVIDING FOR THE RETROACTIVE APPLICATION OF NATIONALLY MANDATED SALARY INCREASES AND ADJUSTMENTS FOR LOCAL GOVER", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 10865, "title": "AN ACT PROVIDING FOR THE RETROACTIVE APPLICATION OF NATIONALLY MANDATED SALARY INCREASES AND ADJUSTMENTS FOR LOCAL GOVER", "decision": "REVISE / CALIBRATE"}], "proposes": "Provides for retroactive application of nationally mandated salary increases and adjustments for local government workers, with national government presumably covering the cost.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "N/A", "P4": "Conditional", "P5": "Conditional", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "If national funding is explicitly appropriated to cover retroactive differentials, the unfunded-mandate risk is largely cured (P4 Conditional pending clear appropriation). The measure must also specify a uniform implementation mechanism to avoid disparate application across LGUs (P5). Slight improvement on mid 244 if the national mandate language is clearer, but still requires appropriation confirmation."}, {"mid": 247, "rep_title": "AN ACT ALLOWING THE RETROACTIVE APPLICATION OF INCREASES AND ADJUSTMENTS IN SALARIES AND ALLOWANCES FOR THOSE IN PERSONA", "n_bills": 1, "archetype": "Other / residual — Other / cross-cutting", "theme": "Other / Cross-cutting", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 19, "number": 11196, "title": "AN ACT ALLOWING THE RETROACTIVE APPLICATION OF INCREASES AND ADJUSTMENTS IN SALARIES AND ALLOWANCES FOR THOSE IN PERSONA", "decision": "REVISE / CALIBRATE"}], "proposes": "Allows retroactive application of salary and allowance increases for personal services in local government, covering personnel in local positions.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "N/A", "P4": "Fail", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Substantially overlaps with mids 244 and 246; unless this version contains an explicit national appropriation or phased phase-in, retroactive application creates an unfunded mandate (P4 Fail). Should be consolidated with mid 246 or clearly delineate funding source to avoid duplicative and unbudgeted obligations on LGUs."}, {"mid": 248, "rep_title": "AN ACT MANDATING THE LIVESTREAMING OF SANGGUNIANG BAYAN SESSIONS, AMENDING FOR THE PURPOSE SECTIONS 50 AND 52, CHAPTER I", "n_bills": 1, "archetype": "Other / residual — Other / cross-cutting", "theme": "Other / Cross-cutting", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 19, "number": 11294, "title": "AN ACT MANDATING THE LIVESTREAMING OF SANGGUNIANG BAYAN SESSIONS, AMENDING FOR THE PURPOSE SECTIONS 50 AND 52, CHAPTER I", "decision": "REVISE / CALIBRATE"}], "proposes": "Mandates livestreaming of Sangguniang Bayan sessions by amending Sections 50 and 52 of RA 7160.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Pass", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "Livestreaming requirements directly advance transparency and community participation (P5/P2). The single fixable issue is fiscal: small and 4th-6th class municipalities may lack connectivity or equipment budget, creating a de facto unfunded mandate (P4 Conditional). A national subsidy or phased rollout tied to LGU income class would resolve this."}, {"mid": 249, "rep_title": "AN ACT REGULATING THE VALIDITY OF LICENSES ISSUED UNDER SECTION 3 (B) 3 AND AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 71", "n_bills": 1, "archetype": "Other / residual — Other / cross-cutting", "theme": "Other / Cross-cutting", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 20, "number": 2064, "title": "AN ACT REGULATING THE VALIDITY OF LICENSES ISSUED UNDER SECTION 3 (B) 3 AND AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 71", "decision": "REVISE / CALIBRATE"}], "proposes": "Regulates the validity period of licenses issued under Section 3(b)(3) of RA 7160, amending the license renewal cycle for LGU-issued permits.", "scores": {"P1": "Pass", "P2": "Conditional", "P3": "Pass", "P4": "Conditional", "P5": "Pass", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Standardising license validity can reduce administrative burden and promote ease of doing business (P1/P3/P5). However, national prescription of validity periods constrains LGU discretion (P2 Conditional) and may alter revenue timing if annual renewal fees are shifted to multi-year cycles (P4 Conditional). Clarification on LGU option to set shorter periods and revenue impact analysis needed."}, {"mid": 250, "rep_title": "AN ACT AMENDING REPUBLIC ACT NO. 8185, OTHERWISE KNOWN AS AN ACT AMENDING SECTION 324(D) OF REPUBLIC ACT NO. 7160, OTHER", "n_bills": 1, "archetype": "Other / residual — Other / cross-cutting", "theme": "Other / Cross-cutting", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 20, "number": 2254, "title": "AN ACT AMENDING REPUBLIC ACT NO. 8185, OTHERWISE KNOWN AS AN ACT AMENDING SECTION 324(D) OF REPUBLIC ACT NO. 7160, OTHER", "decision": "REVISE / CALIBRATE"}], "proposes": "Amends RA 8185 (which amended Section 324(d) of RA 7160) governing the 20% development fund utilisation cap and allowable expenditure categories.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Pass", "P5": "Conditional", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "Updating 20% development fund rules generally expands LGU fiscal flexibility and investment capacity (P1/P4). The conditional flag on P5 is that any expansion of allowable uses must retain mandatory reporting and COA audit requirements to prevent misuse of development funds, which past experience shows is a real accountability risk."}, {"mid": 251, "rep_title": "AN ACT AMENDING SECTION 325(A) OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE \"LOCAL GOVERNMENT CODE OF 1991,\" TO INCR", "n_bills": 1, "archetype": "Other / residual — Other / cross-cutting", "theme": "Other / Cross-cutting", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 20, "number": 2695, "title": "AN ACT AMENDING SECTION 325(A) OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE \"LOCAL GOVERNMENT CODE OF 1991,\" TO INCR", "decision": "REVISE / CALIBRATE"}], "proposes": "Amends Section 325(a) of RA 7160 to increase the ceiling on personal services expenditures as a percentage of total LGU appropriations.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "N/A", "P4": "Fail", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Raising the personal services cap reduces funds available for capital outlay and MOOE, crowding out development spending especially in lower-income LGUs (P4 Fail). It also risks wage-bill bloat with insufficient accountability for staffing decisions (P5 Conditional). Should be recalibrated with an income-class-tiered ceiling or paired with personnel rationalisation safeguards."}, {"mid": 252, "rep_title": "AN ACT AUGMENTING THE NUMBER OF BARANGAY PUBLIC SAFETY OFFICERS (BPSO) PROPORTIONATE TO THE BARANGAY POPULATION AND AMEN", "n_bills": 1, "archetype": "Other / residual — Other / cross-cutting", "theme": "Other / Cross-cutting", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 20, "number": 3709, "title": "AN ACT AUGMENTING THE NUMBER OF BARANGAY PUBLIC SAFETY OFFICERS (BPSO) PROPORTIONATE TO THE BARANGAY POPULATION AND AMEN", "decision": "REVISE / CALIBRATE"}], "proposes": "Augments the number of Barangay Public Safety Officers (BPSO) proportionate to barangay population and amends relevant RA 7160 provisions.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Fail", "P5": "Pass", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "Population-proportionate BPSO augmentation aligns with subsidiarity (P3) and local public safety needs (P1/P2). However, mandating additional personnel positions without dedicated national funding creates an unfunded mandate on barangay budgets, which are the thinnest tier of LGU finance (P4 Fail). Requires explicit national appropriation or Barangay Development Fund allocation mechanism."}, {"mid": 253, "rep_title": "AN ACT AMENDING SECTIONS 447(a)(1)(iii), 458(a)(1)(iii), AND 468(a)(1)(iii) OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS", "n_bills": 1, "archetype": "Other / residual — Other / cross-cutting", "theme": "Other / Cross-cutting", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 20, "number": 3957, "title": "AN ACT AMENDING SECTIONS 447(a)(1)(iii), 458(a)(1)(iii), AND 468(a)(1)(iii) OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS", "decision": "REVISE / CALIBRATE"}], "proposes": "Amends Sections 447, 458, and 468 of RA 7160 to modify legislative powers of sangguniang bayan, panlungsod, and panlalawigan (likely expanding or clarifying ordinance-making powers).", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Pass", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Expanding or clarifying sanggunian legislative authority generally strengthens autonomy (P1) and subsidiarity (P3), but without full text the scope of the amendment is uncertain. Conditional on P5 (accountability safeguards for expanded powers) and P6 (uniformity of application across LGU levels). Title is too truncated to confirm no unfunded mandate, so revision to clarify scope and guardrails is warranted before adoption."}, {"mid": 254, "rep_title": "AN ACT STRENGTHENING THE INVOLVEMENT OF LOCAL COMMUNITIES AND LOCAL GOVERNMENT UNITS IN BASIC EDUCATION GOVERNANCE BY EM", "n_bills": 2, "archetype": "Other / residual — Special Education Fund & education finance", "theme": "Fiscal Transfers & PFM", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 7056, "title": "AN ACT STRENGTHENING THE INVOLVEMENT OF LOCAL COMMUNITIES AND LOCAL GOVERNMENT UNITS IN BASIC EDUCATION GOVERNANCE BY EM", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 3690, "title": "AN ACT STRENGTHENING THE INVOLVEMENT OF LOCAL COMMUNITIES AND LOCAL GOVERNMENT UNITS IN BASIC EDUCATION GOVERNANCE BY EM", "decision": "REVISE / CALIBRATE"}], "proposes": "Strengthens LGU and local community involvement in basic education governance, likely by expanding LGU roles or amending the Special Education Fund (SEF) framework.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Greater LGU participation in basic education is consistent with autonomy and subsidiarity, but education governance is a shared national-local domain. P4 is conditional because expanding LGU mandates in education without corresponding SEF augmentation risks unfunded obligations. P5 and P6 are conditional because coordination mechanisms with DepEd and accountability structures for SEF use must be explicit. Revise to specify funding source, DepEd interface, and disclosure requirements."}, {"mid": 255, "rep_title": "AN ACT STRENGTHENING SCHOOL LEADERSHIP IN BASIC EDUCATION BY ESTABLISHING A SCHOOL LEADERSHIP PIPELINE, SUPPORT MECHANIS", "n_bills": 1, "archetype": "Other / residual — Special Education Fund & education finance", "theme": "Fiscal Transfers & PFM", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 20, "number": 4286, "title": "AN ACT STRENGTHENING SCHOOL LEADERSHIP IN BASIC EDUCATION BY ESTABLISHING A SCHOOL LEADERSHIP PIPELINE, SUPPORT MECHANIS", "decision": "REVISE / CALIBRATE"}], "proposes": "Establishes a school leadership pipeline and support mechanism within basic education, likely assigning functions to local school heads or LGU-level bodies.", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "Conditional", "P4": "Fail", "P5": "Pass", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "School leadership pipelines are primarily a national DepEd function; assigning them to LGUs without commensurate devolution of budget and authority creates a structural mismatch (P3 Conditional). The bill appears to impose implementation duties on LGUs without identifying a dedicated funding stream, risking an unfunded mandate (P4 Fail). P1 and P2 are conditional because local choice in school leadership selection may be constrained by national pipeline requirements. Revise to clarify funding, delineate national vs. local roles, and align with DepEd devolution architecture."}, {"mid": 256, "rep_title": "AN ACT AMENDING CERTAIN SECTIONS OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991, TO INCL", "n_bills": 1, "archetype": "Sectoral representation in the sanggunian (senior citizens, youth, etc.)", "theme": "Fiscal Transfers & PFM", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 765, "title": "AN ACT AMENDING CERTAIN SECTIONS OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991, TO INCL", "decision": "REVISE / CALIBRATE"}], "proposes": "Amends the Local Government Code to include additional sectoral representatives in the sanggunian (scope of sector unclear from truncated title).", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Pass", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Adding sectoral representation broadens participatory governance (P1, P2) and is consistent with subsidiarity. P4 is conditional because additional sanggunian seats entail honoraria and administrative costs that must be budgeted. P6 is conditional because the new sector must be uniformly integrated across all LGU levels and harmonized with existing COMELEC sectoral election rules. Revise to specify the sector, prescribe cost provisions, and align with national election law."}, {"mid": 257, "rep_title": "AN ACT ALLOWING SENIOR CITIZENS TO SERVE AS REPRESENTATIVES TO THE SANGGUNIANG BAYAN THEREBY AMENDING PERTINENT PROVISIO", "n_bills": 1, "archetype": "Sectoral representation in the sanggunian (senior citizens, youth, etc.)", "theme": "Fiscal Transfers & PFM", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 1346, "title": "AN ACT ALLOWING SENIOR CITIZENS TO SERVE AS REPRESENTATIVES TO THE SANGGUNIANG BAYAN THEREBY AMENDING PERTINENT PROVISIO", "decision": "REVISE / CALIBRATE"}], "proposes": "Allows senior citizens to serve as sectoral representatives to the Sangguniang Bayan by amending RA 7160.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Pass", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Giving senior citizens a formal voice in the municipal legislature strengthens participatory self-governance (P1, P2) and assigns representation at the most local level (P3). P4 is conditional on explicit appropriation for honoraria and support costs. P6 is conditional because representation at the Sangguniang Bayan level alone, without equivalent provision at city and provincial levels, creates asymmetric coverage; harmonization with measures mid 258, 260, 261, and 263 is needed."}, {"mid": 258, "rep_title": "AN ACT PROVIDING FOR THE REPRESENTATION OF SENIOR CITIZENS IN ALL LEVELS OF LOCAL GOVERNMENT, CREATING THE SANGGUNIANG S", "n_bills": 2, "archetype": "Sectoral representation in the sanggunian (senior citizens, youth, etc.)", "theme": "Fiscal Transfers & PFM", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 1448, "title": "AN ACT PROVIDING FOR THE REPRESENTATION OF SENIOR CITIZENS IN ALL LEVELS OF LOCAL GOVERNMENT, CREATING THE SANGGUNIANG S", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "number": 4608, "title": "AN ACT PROVIDING FOR REPRESENTATION IN ALL LEVELS OF LOCAL GOVERNMENT FOR SENIOR CITIZENS, CREATING THE SANGGUNIANG SENI", "decision": "REVISE / CALIBRATE"}], "proposes": "Provides for senior citizen representation at all levels of local government and creates a Sangguniang Senior Citizens body.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Conditional", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "A dedicated Sangguniang Senior Citizens across all LGU levels is the most comprehensive approach among the cluster and achieves national-local coherence (P6 Pass). P4 is conditional because creating a new deliberative body generates recurring costs (honoraria, secretariat, logistics) that must be explicitly funded. P5 is conditional because the bill must specify the accountability relationship between the new body and the regular sanggunian, and mandate disclosure of its deliberations. Revise to address fiscal provisions and governance interface."}, {"mid": 259, "rep_title": "AN ACT TO STRENGTHEN THE LOCAL DEVELOPMENT COUNCILS (LDCs) BY THREEFOLDING ITS REPRESENTATION, AMENDING FOR THAT PURPOSE", "n_bills": 1, "archetype": "Sectoral representation in the sanggunian (senior citizens, youth, etc.)", "theme": "Fiscal Transfers & PFM", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 2271, "title": "AN ACT TO STRENGTHEN THE LOCAL DEVELOPMENT COUNCILS (LDCs) BY THREEFOLDING ITS REPRESENTATION, AMENDING FOR THAT PURPOSE", "decision": "REVISE / CALIBRATE"}], "proposes": "Strengthens Local Development Councils (LDCs) by tripling sectoral representation within them, amending RA 7160.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Pass", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "Expanding LDC representation directly enhances participatory planning (P1, P2) and strengthens a local special body already mandated by RA 7160, consistent with subsidiarity and national policy (P3, P6). P4 is conditional because tripling membership implies higher meeting and logistical costs without a clear funding stream; the bill should specify whether IRA or local funds shall cover the increment. Minor calibration on cost provisions suffices for adoption."}, {"mid": 260, "rep_title": "AN ACT PROVIDING FOR THE REPRESENTATION OF SENIOR CITIZENS IN THE DIFFERENT LOCAL GOVERNMENT UNITS AMENDING CERTAIN PROV", "n_bills": 1, "archetype": "Sectoral representation in the sanggunian (senior citizens, youth, etc.)", "theme": "Fiscal Transfers & PFM", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 5715, "title": "AN ACT PROVIDING FOR THE REPRESENTATION OF SENIOR CITIZENS IN THE DIFFERENT LOCAL GOVERNMENT UNITS AMENDING CERTAIN PROV", "decision": "REVISE / CALIBRATE"}], "proposes": "Provides for senior citizen representation in different LGU levels by amending certain provisions of RA 7160.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Pass", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Similar to mid 257 and 261 but potentially multi-level. Representation for senior citizens strengthens self-governance and subsidiarity. P4 is conditional on funding provisions for the added seats. P6 is conditional because this bill overlaps significantly with mid 257, 258, 261, and 263 — consolidation into a single, coherent senior-citizen representation framework is strongly preferable to avoid conflicting or duplicative provisions across the Code."}, {"mid": 261, "rep_title": "AN ACT PROVIDING FOR THE REPRESENTATION OF SENIOR CITIZENS IN THE LOCAL SANGGUNIAN, AMENDING FOR THE PURPOSE PERTINENT P", "n_bills": 1, "archetype": "Sectoral representation in the sanggunian (senior citizens, youth, etc.)", "theme": "Fiscal Transfers & PFM", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 5730, "title": "AN ACT PROVIDING FOR THE REPRESENTATION OF SENIOR CITIZENS IN THE LOCAL SANGGUNIAN, AMENDING FOR THE PURPOSE PERTINENT P", "decision": "REVISE / CALIBRATE"}], "proposes": "Provides for senior citizen representation in the local sanggunian by amending pertinent provisions of RA 7160.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Pass", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Substantively identical in intent to mid 257, 260, and 263. Sound in direction — senior citizen voice in local legislation is consistent with P1, P2, and P3. P4 is conditional on fiscal provisions. P6 is conditional because five near-identical bills (mid 257, 258, 260, 261, 263) risk inconsistent amendments to the same Code sections; Committee should consolidate into one measure with uniform coverage and funding language."}, {"mid": 262, "rep_title": "AN ACT PROVIDING FOR THE ELECTION OF SECTORAL REPRESENTATIVES TO THE LEGISLATIVE BODIES OF LOCAL GOVERNMENT UNITS", "n_bills": 1, "archetype": "Sectoral representation in the sanggunian (senior citizens, youth, etc.)", "theme": "Fiscal Transfers & PFM", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 6332, "title": "AN ACT PROVIDING FOR THE ELECTION OF SECTORAL REPRESENTATIVES TO THE LEGISLATIVE BODIES OF LOCAL GOVERNMENT UNITS", "decision": "REVISE / CALIBRATE"}], "proposes": "Provides for the election (not mere appointment) of sectoral representatives to the legislative bodies of LGUs.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Shifting from appointment to election of sectoral representatives significantly strengthens self-determination (P2) and democratic accountability (P5). However, the electoral mechanics must be defined and coordinated with COMELEC, which creates complexity and cost (P4 Conditional — election administration costs). P6 is conditional because this changes the mode of sectoral representation system-wide and must be harmonized with existing COMELEC rules and the Omnibus Election Code, not just RA 7160. Revise to detail electoral procedure, COMELEC coordination, and cost allocation."}, {"mid": 263, "rep_title": "AN ACT PROVIDING FOR THE INCLUSION OF SENIOR CITIZENS AS SECTORAL REPRESENTATIVES IN THE SANGGUNIAN, AMENDING FOR THE PU", "n_bills": 1, "archetype": "Sectoral representation in the sanggunian (senior citizens, youth, etc.)", "theme": "Fiscal Transfers & PFM", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 19, "number": 9798, "title": "AN ACT PROVIDING FOR THE INCLUSION OF SENIOR CITIZENS AS SECTORAL REPRESENTATIVES IN THE SANGGUNIAN, AMENDING FOR THE PU", "decision": "REVISE / CALIBRATE"}], "proposes": "Provides for inclusion of senior citizens as sectoral representatives in the sanggunian by amending RA 7160.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Pass", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Fifth bill in the senior citizen sanggunian representation cluster (with mid 257, 258, 260, 261). All six principles are substantively engaged the same way. P4 conditional on honoraria and cost provisions; P6 conditional due to duplication risk across the cluster. The Committee should consolidate all five measures (mid 257–258, 260–261, 263) into a single omnibus amendment to avoid amending the same Code sections multiple times with potentially varying language."}, {"mid": 264, "rep_title": "AN ACT MANDATING FULL PUBLIC DISCLOSURE BY GOVERNORS, CITY MAYORS, MUNICIPAL MAYORS, TREASURERS, ACCOUNTANTS, BUDGET OFF", "n_bills": 1, "archetype": "Strengthen local special bodies / full public disclosure", "theme": "Autonomy & Intergovernmental Relations", "sheet_decision": "ADOPT", "member_bills": [{"congress": 18, "number": 1017, "title": "AN ACT MANDATING FULL PUBLIC DISCLOSURE BY GOVERNORS, CITY MAYORS, MUNICIPAL MAYORS, TREASURERS, ACCOUNTANTS, BUDGET OFF", "decision": "ADOPT"}], "proposes": "Mandates full public disclosure by local chief executives, treasurers, accountants, and budget officers of financial and governance information.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Pass", "P5": "Pass", "P6": "Pass"}, "decision": "ADOPT", "rationale": "Full public disclosure by key local officials directly and strongly advances accountability and transparency (P5) without undermining autonomy — LGUs retain authority but are made answerable to their constituents (P1, P2). The obligation sits precisely at the LGU level where financial decisions are made (P3). No new spending program is created; disclosure is a low-cost administrative duty (P4 Pass). The measure is coherent with the Constitution's public accountability mandate and national transparency policy (P6). Consistent with the archetype's prior ADOPT verdict."}, {"mid": 265, "rep_title": "AN ACT EMPOWERING THE LOCAL SCHOOL BOARD TO CHOOSE FROM AMONG THE LIST OF FIVE NOMINEES SUBMITTED BY THE DEPARTMENT OF E", "n_bills": 1, "archetype": "Strengthen local special bodies / full public disclosure", "theme": "Autonomy & Intergovernmental Relations", "sheet_decision": "ADOPT", "member_bills": [{"congress": 18, "number": 3981, "title": "AN ACT EMPOWERING THE LOCAL SCHOOL BOARD TO CHOOSE FROM AMONG THE LIST OF FIVE NOMINEES SUBMITTED BY THE DEPARTMENT OF E", "decision": "ADOPT"}], "proposes": "Empowers the Local School Board to select a division superintendent from a DepEd-submitted shortlist of five nominees, giving LGUs a meaningful role in appointing a key education official.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "N/A", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "The core autonomy and self-determination gain is clear: local boards choose from a vetted shortlist rather than receiving a central appointee (P1 Pass, P2 Pass, P3 Pass — education delivery is local). P4 is not engaged. However, the shortlisting power remains entirely with DepEd, which can pre-screen candidates ideologically or administratively, creating a residual accountability gap (P5 Conditional) and potential tension with the Civil Service merit system and DepEd's supervisory mandate over public schools (P6 Conditional). Revision needed: specify that the LSB's choice is binding, define shortlist criteria transparently, and include a tiebreaker/deadlock mechanism to prevent DepEd from stalling."}, {"mid": 266, "rep_title": "AN ACT INSTITUTIONALIZING THE COMMUNITY-DRIVEN DEVELOPMENT (CDD) APPROACH AS A NATIONAL STRATEGY FOR INCLUSIVE GROWTH AN", "n_bills": 1, "archetype": "Strengthen local special bodies / full public disclosure", "theme": "Autonomy & Intergovernmental Relations", "sheet_decision": "ADOPT", "member_bills": [{"congress": 18, "number": 9065, "title": "AN ACT INSTITUTIONALIZING THE COMMUNITY-DRIVEN DEVELOPMENT (CDD) APPROACH AS A NATIONAL STRATEGY FOR INCLUSIVE GROWTH AN", "decision": "ADOPT"}], "proposes": "Institutionalizes Community-Driven Development (CDD) as a national strategy for inclusive growth, embedding participatory, community-led planning in local governance.", "scores": {"P1": "Conditional", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Pass", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "CDD strongly supports self-determination (P2 Pass) and subsidiarity (P3 Pass — functions vest at community level) and transparency through participatory processes (P5 Pass). However, institutionalizing CDD as a national strategy risks creating a top-down framework that constrains LGU discretion in choosing their own development modalities (P1 Conditional). Unless fully funded by national government, it risks imposing unfunded administrative mandates on LGUs managing CDD cycles (P4 Conditional). Coherence with DILG's existing KALAHI-CIDSS and NDRRMC structures needs explicit alignment (P6 Conditional). Revision: clarify that CDD is an option not a mandate for LGUs, and provide dedicated national funding for implementation costs."}, {"mid": 267, "rep_title": "AN ACT STRENGTHENING LOCAL SCHOOL BOARDS, AMENDING FOR THE PURPOSE SECTIONS 98, 99 AND 100 OF REPUBLIC ACT NO. 7160, OTH", "n_bills": 1, "archetype": "Strengthen local special bodies / full public disclosure", "theme": "Autonomy & Intergovernmental Relations", "sheet_decision": "ADOPT", "member_bills": [{"congress": 19, "number": 2950, "title": "AN ACT STRENGTHENING LOCAL SCHOOL BOARDS, AMENDING FOR THE PURPOSE SECTIONS 98, 99 AND 100 OF REPUBLIC ACT NO. 7160, OTH", "decision": "ADOPT"}], "proposes": "Strengthens Local School Boards by amending Sections 98, 99, and 100 of RA 7160, broadening composition, powers, and functions of LSBs.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "N/A", "P5": "Pass", "P6": "Pass"}, "decision": "ADOPT", "rationale": "Amending all three core LSB sections (composition, meetings, functions) is a coherent, comprehensive reform that strengthens the local special body without removing national oversight (P1 Pass). Sectoral and community representation expansions reflect expressed LGU demand (P2 Pass). Keeping education support decisions at the school-board level is correct subsidiarity (P3 Pass). No new fiscal burden implied on its face (P4 N/A). Expanded composition and clearer mandates improve accountability (P5 Pass). LSBs operate within the DepEd framework so coherence is preserved (P6 Pass). No conditions blocking adoption."}, {"mid": 268, "rep_title": "AN ACT STRENGTHENING LOCAL HEALTH BOARDS, AMENDING FOR THE PURPOSE SECTIONS 102 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOW", "n_bills": 1, "archetype": "Strengthen local special bodies / full public disclosure", "theme": "Autonomy & Intergovernmental Relations", "sheet_decision": "ADOPT", "member_bills": [{"congress": 19, "number": 2954, "title": "AN ACT STRENGTHENING LOCAL HEALTH BOARDS, AMENDING FOR THE PURPOSE SECTIONS 102 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOW", "decision": "ADOPT"}], "proposes": "Strengthens Local Health Boards by amending Section 102 of RA 7160, updating membership composition or expanding LHB powers and functions.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "N/A", "P5": "Pass", "P6": "Pass"}, "decision": "ADOPT", "rationale": "A direct amendment to Section 102 strengthening the LHB is squarely within the LGC reform mandate (P1 Pass). Health governance at the local level reflects subsidiarity and community demand especially post-devolution of health services (P2 Pass, P3 Pass). No new fiscal charge is apparent from board-strengthening alone (P4 N/A). Clearer mandates and broader membership improve accountability and transparency (P5 Pass). The DOH retains national regulatory authority so coherence is maintained (P6 Pass)."}, {"mid": 269, "rep_title": "AN ACT STRENGTHENING THE LOCAL HEALTH BOARDS OF EVERY PROVINCE, CITY, OR MUNICIPALITY BY INCLUDING IN THE MEMBERSHIP THE", "n_bills": 1, "archetype": "Strengthen local special bodies / full public disclosure", "theme": "Autonomy & Intergovernmental Relations", "sheet_decision": "ADOPT", "member_bills": [{"congress": 19, "number": 7447, "title": "AN ACT STRENGTHENING THE LOCAL HEALTH BOARDS OF EVERY PROVINCE, CITY, OR MUNICIPALITY BY INCLUDING IN THE MEMBERSHIP THE", "decision": "ADOPT"}], "proposes": "Expands Local Health Board membership to include additional representatives — likely health professionals, CSOs, or PhilHealth representatives — at the province, city, and municipal levels.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Pass", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Broadening LHB membership deepens local participation and strengthens the board's deliberative capacity (P1 Pass, P2 Pass, P3 Pass, P5 Pass). However, if the added members are national agency representatives (e.g., PhilHealth, DOH regional staff), this can subtly shift board dynamics toward national agency preferences, reducing genuine local voice (P6 Conditional). Additional members also create quorum and logistics costs, which may strain smaller municipalities (P4 Conditional). Revision: cap new national-agency seats to non-voting or advisory roles; provide quorum flexibility for lower-income LGUs."}, {"mid": 270, "rep_title": "AN ACT AMENDING SECTION 98 OF REPUBLIC ACT NO. 7160 OTHERWISE KNOWN AS THE \"LOCAL GOVERNMENT CODE OF 1991\", TO INCLUDE R", "n_bills": 1, "archetype": "Strengthen local special bodies / full public disclosure", "theme": "Autonomy & Intergovernmental Relations", "sheet_decision": "ADOPT", "member_bills": [{"congress": 20, "number": 3840, "title": "AN ACT AMENDING SECTION 98 OF REPUBLIC ACT NO. 7160 OTHERWISE KNOWN AS THE \"LOCAL GOVERNMENT CODE OF 1991\", TO INCLUDE R", "decision": "ADOPT"}], "proposes": "Amends Section 98 of RA 7160 to include an additional representative category — likely district representatives or sectoral members — in Local School Board composition.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "N/A", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Including additional voices in LSB composition supports autonomy and participation (P1 Pass, P2 Pass, P3 Pass, P4 N/A). The critical question is who is added: if it is congressional district representatives, this introduces a political layer into an education governance body that should remain LGU-and-community-driven, risking capture and blurring accountability lines (P5 Conditional). It also risks parity issues across LGUs with different numbers of congressional districts (P6 Conditional). Revision: if the added seat is a congressional rep, convert it to an advisory/non-voting role; prefer adding a teachers' federation or parent representative instead."}, {"mid": 271, "rep_title": "AN ACT EXPANDING THE PURPOSES AND APPLICATION OF THE SPECIAL EDUCATION FUND, AMENDING FOR THE PURPOSE SECTIONS 100 AND 2", "n_bills": 16, "archetype": "Expand permissible uses of the Special Education Fund", "theme": "Fiscal Transfers & PFM", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 205, "title": "AN ACT EXPANDING THE PURPOSES AND APPLICATION OF THE SPECIAL EDUCATION FUND, AMENDING FOR THE PURPOSE SECTIONS 100 AND 2", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "number": 611, "title": "AN ACT EXPANDING THE PURPOSES AND APPLICATION OF THE SPECIAL EDUCATION FUND (SEF), AMENDING FOR THE PURPOSE SECTION 272", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "number": 1431, "title": "AN ACT EXPANDING THE PURPOSES AND APPLICATION OF THE SPECIAL EDUCATION FUND (SEF), AMENDING FOR THE PURPOSE SECTIONS 100", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "number": 3864, "title": "AN ACT EXPANDING THE PURPOSES AND APPLICATION OF THE SPECIAL EDUCATION FUND, AMENDING FOR THIS PURPOSE SECTION 272 OF RE", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "number": 4810, "title": "AN ACT EXPANDING THE PURPOSES AND APPLICATION OF THE SPECIAL EDUCATION FUND, AMENDING FOR THE PURPOSE SECTION 272 OF REP", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "number": 4990, "title": "AN ACT EXPANDING THE PURPOSES AND APPLICATION OF THE SPECIAL EDUCATION FUND, AMENDING FOR THE PURPOSE SECTIONS 100 AND 2", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 1200, "title": "AN ACT EXPANDING THE PURPOSES AND APPLICATION OF THE SPECIAL EDUCATION FUND, AMENDING FOR THE PURPOSE SECTIONS 100 AND 2", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 1530, "title": "AN ACT EXPANDING THE PURPOSES AND APPLICATION OF THE SPECIAL EDUCATION FUND (SEF), AMENDING FOR THE PURPOSE SECTIONS 100", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 1619, "title": "AN ACT EXPANDING THE PURPOSES AND APPLICATION OF THE SPECIAL EDUCATION FUND, AMENDING FOR THE PURPOSE SECTIONS 100 AND 2", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 3018, "title": "AN ACT EXPANDING THE PURPOSES AND APPLICATION OF THE SPECIAL EDUCATION FUND, AMENDING FOR THE PURPOSE SECTION 272 OF REP", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 3512, "title": "AN ACT EXPANDING THE PURPOSES AND APPLICATION OF THE SPECIAL EDUCATION FUND (SEF), AMENDING FOR THE PURPOSE SECTION 272", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 6965, "title": "AN ACT EXPANDING THE PURPOSES AND APPLICATION OF THE SPECIAL EDUCATION FUND, AMENDING FOR THE PURPOSE SECTION 272 OF REP", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 7095, "title": "AN ACT EXPANDING THE PURPOSES AND APPLICATION OF THE SPECIAL EDUCATION FUND, AMENDING FOR THE PURPOSE SECTIONS, 99, 100", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 8091, "title": "AN ACT EXPANDING THE APPLICATION OF THE SPECIAL EDUCATION FUND, AMENDING FOR THE PURPOSE SECTIONS 100, 235 AND 272 OF RE", "decision": "REVISE / CALIBRATE"}, {"congress": 20, "number": 684, "title": "AN ACT EXPANDING THE PURPOSES AND APPLICATION OF THE SPECIAL EDUCATION FUND (SEF), AMENDING FOR THE PURPOSE SECTIONS 100", "decision": "REVISE / CALIBRATE"}, {"congress": 20, "number": 2208, "title": "AN ACT EXPANDING THE PURPOSES AND APPLICATION OF THE SPECIAL EDUCATION FUND, AMENDING FOR THE PURPOSE SECTION 272 OF REP", "decision": "REVISE / CALIBRATE"}], "proposes": "Expands the purposes and application of the Special Education Fund by amending Sections 100 and 272 of RA 7160, allowing SEF to cover a broader range of education-related expenditures.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Expanding SEF uses increases LGU discretion over locally-collected education funds (P1 Pass, P2 Pass, P3 Pass). The core fiscal risk is cost-shifting: if expanded uses include items that are DepEd's national mandate (e.g., teacher salaries, textbooks), national obligations migrate onto the local tax base without a compensating transfer, creating an unfunded mandate (P4 Conditional). Without enhanced reporting on how expanded uses are spent, the expanded discretion undermines audit trails (P5 Conditional). Expanded uses must be harmonized with DepEd's own spending plans to avoid duplication (P6 Conditional). Revision: enumerate permissible new uses explicitly, exclude DepEd-mandated items, and require annual LSB-approved SEF utilization reports published online."}, {"mid": 272, "rep_title": "AN ACT PROVIDING FOR INCLUSION OF PRIVATE SCHOOLS AS BENEFICIARIES OF THE SPECIAL EDUCATION FUND (SEF), AMENDING FOR THE", "n_bills": 1, "archetype": "Expand permissible uses of the Special Education Fund", "theme": "Fiscal Transfers & PFM", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 1539, "title": "AN ACT PROVIDING FOR INCLUSION OF PRIVATE SCHOOLS AS BENEFICIARIES OF THE SPECIAL EDUCATION FUND (SEF), AMENDING FOR THE", "decision": "REVISE / CALIBRATE"}], "proposes": "Includes private schools as beneficiaries of the Special Education Fund by amending the relevant SEF provisions of RA 7160.", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "Fail", "P4": "Fail", "P5": "Conditional", "P6": "Fail"}, "decision": "REJECT / REFER", "rationale": "The SEF is a locally-levied tax specifically for public basic education support; extending it to private schools contradicts the fund's statutory purpose and creates a structural misalignment (P3 Fail — private schools are not the most local or public-accountable level for this fund). It dilutes a constitutionally-grounded local education fund, shrinking resources for public school learners who are the intended beneficiaries and creating an unfunded gap (P4 Fail). Private school subsidies from public funds raise procurement, anti-subsidy, and equal-protection concerns without clear safeguards (P6 Fail). Refer to a separate private-school voucher or financial-assistance framework under DepEd or CHED rather than amending the LGC's SEF provisions."}, {"mid": 273, "rep_title": "AN ACT AMENDING THE SALIENT PROVISIONS OF THE LOCAL GOVERNMENT CODE ON THE SPECIAL EDUCATION FUND (SEF), AMENDING FOR TH", "n_bills": 1, "archetype": "Expand permissible uses of the Special Education Fund", "theme": "Fiscal Transfers & PFM", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 6684, "title": "AN ACT AMENDING THE SALIENT PROVISIONS OF THE LOCAL GOVERNMENT CODE ON THE SPECIAL EDUCATION FUND (SEF), AMENDING FOR TH", "decision": "REVISE / CALIBRATE"}], "proposes": "Amends salient SEF provisions of the Local Government Code to update and modernize the fund's governance, eligible expenditures, or distribution rules.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "General SEF modernization is aligned with LGU demand and autonomy as long as it preserves local discretion over fund use (P1 Pass, P2 Pass, P3 Pass). Without sight of the specific amendments, the fiscal risk of cost-shifting from national to local cannot be ruled out (P4 Conditional), reporting obligations need strengthening (P5 Conditional), and alignment with current DepEd and DEPED-DILG joint guidelines must be assured (P6 Conditional). Revision: provide an enumerated list of amended provisions; attach fiscal impact note; require mandatory annual SEF audit disclosure to constituents."}, {"mid": 274, "rep_title": "AN ACT ALLOWING THE DEPED TO LEVY FUNDS FROM THE SPECIAL EDUCATION FUND (SEF) FOR PREEMPTIVE AND RESPONSIVE MEASURES IN", "n_bills": 1, "archetype": "Expand permissible uses of the Special Education Fund", "theme": "Fiscal Transfers & PFM", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 6685, "title": "AN ACT ALLOWING THE DEPED TO LEVY FUNDS FROM THE SPECIAL EDUCATION FUND (SEF) FOR PREEMPTIVE AND RESPONSIVE MEASURES IN", "decision": "REVISE / CALIBRATE"}], "proposes": "Allows DepEd to levy or draw from the SEF for preemptive and responsive measures in disaster or emergency situations affecting schools.", "scores": {"P1": "Fail", "P2": "Conditional", "P3": "Conditional", "P4": "Fail", "P5": "Conditional", "P6": "Conditional"}, "decision": "REJECT / REFER", "rationale": "This measure directly empowers a national agency (DepEd) to unilaterally levy or access a locally-generated fund, which is a fundamental violation of local fiscal autonomy (P1 Fail). The SEF is a product of local property tax and must remain under the control of the Local School Board, not DepEd central (P4 Fail — it creates an uncontrolled fiscal drain on local funds by a national actor, bypassing LGU appropriation authority). While disaster responsiveness is a legitimate policy goal, the correct mechanism is a national calamity fund or DepEd's own MOOE/capital outlay, not seizure of local SEF (P3 Conditional, P6 Conditional). Refer to the NDRRMC/DepEd disaster-preparedness budget framework instead of amending the LGC."}, {"mid": 275, "rep_title": "AN ACT EXPANDING THE PURPOSE AND APPLICATION OF THE SPECIAL EDUCATION FUND, AMENDING FOR THE PURPOSE SECTION 272 OF REPU", "n_bills": 7, "archetype": "Expand permissible uses of the Special Education Fund", "theme": "Fiscal Transfers & PFM", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 7125, "title": "AN ACT EXPANDING THE PURPOSE AND APPLICATION OF THE SPECIAL EDUCATION FUND, AMENDING FOR THE PURPOSE SECTION 272 OF REPU", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 558, "title": "AN ACT EXPANDING THE PURPOSE AND APPLICATION OF THE SPECIAL EDUCATION FUND, AMENDING FOR THE PURPOSE SECTION 272 OF REPU", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 6969, "title": "AN ACT EXPANDING THE PURPOSE AND APPLICATION OF THE SPECIAL EDUCATION FUND, AMENDING FOR THE PURPOSE SECTION 272 OF REPU", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 10807, "title": "AN ACT EXPANDING THE PURPOSE AND APPLICATION OF THE SPECIAL EDUCATION FUND, AMENDING FOR THE PURPOSE SECTION 272 OF REPU", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 10978, "title": "AN ACT EXPANDING THE PURPOSE AND APPLICATION OF THE SPECIAL EDUCATION FUND, AMENDING FOR THE PURPOSE SECTION 272 OF REPU", "decision": "REVISE / CALIBRATE"}, {"congress": 20, "number": 1269, "title": "AN ACT EXPANDING THE PURPOSE AND APPLICATION OF THE SPECIAL EDUCATION FUND, AMENDING FOR THE PURPOSE SECTION 272 OF REPU", "decision": "REVISE / CALIBRATE"}, {"congress": 20, "number": 3033, "title": "AN ACT EXPANDING THE PURPOSE AND APPLICATION OF THE SPECIAL EDUCATION FUND, AMENDING FOR THE PURPOSE SECTION 272 OF REPU", "decision": "REVISE / CALIBRATE"}], "proposes": "Expands the purpose and application of the SEF by amending Section 272 of RA 7160, the core provision defining allowable SEF uses and the levy base.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Expanding Section 272 to modernize allowable SEF uses gives LGUs greater flexibility over a fund they generate (P1 Pass, P2 Pass, P3 Pass). The single-section focus keeps the amendment surgical. Fiscal risk lies in whether expanded uses include items that should be nationally funded (P4 Conditional); accountability risk lies in whether expanded discretion is paired with reporting requirements (P5 Conditional); coherence risk is whether new uses align with DepEd curriculum and priority lists (P6 Conditional). Revision: enumerate new permitted uses; require LSB resolution for each new-category expenditure; exclude DepEd-mandated core items."}, {"mid": 276, "rep_title": "AN ACT EXPANDING THE APPLICATION OF THE SPECIAL EDUCATION FUND (SEF), AMENDING FOR THE PURPOSE SECTIONS 100, 235 AND 272", "n_bills": 1, "archetype": "Expand permissible uses of the Special Education Fund", "theme": "Fiscal Transfers & PFM", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 7441, "title": "AN ACT EXPANDING THE APPLICATION OF THE SPECIAL EDUCATION FUND (SEF), AMENDING FOR THE PURPOSE SECTIONS 100, 235 AND 272", "decision": "REVISE / CALIBRATE"}], "proposes": "Expands the application of the SEF by amending Sections 100, 235, and 272 of RA 7160, covering LSB functions, the real property tax levy, and allowable SEF expenditures — the broadest SEF reform package.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Touching all three SEF-related sections (LSB functions in Sec. 100, the RPT levy in Sec. 235, and uses in Sec. 272) is the most comprehensive approach and avoids piecemeal inconsistency (P1 Pass, P2 Pass, P3 Pass). The breadth is also the main risk: amending Section 235 (the levy rate or base) without a rigorous fiscal impact note could under- or over-fund local education needs (P4 Conditional). Wider discretion across all three sections demands proportionally stronger audit, reporting, and disclosure obligations (P5 Conditional). Coherence with DepEd's Basic Education Development Plan and with other LGC fiscal provisions must be explicitly mapped (P6 Conditional). Revision: accompany with a comprehensive fiscal impact statement, mandatory LSB annual report, and DepEd-DILG joint implementation guidelines."}, {"mid": 277, "rep_title": "AN ACT PROVIDING FOR THE INCLUSION OF PRIVATE ELEMENTARY AND SECONDARY SCHOOLS AS BENEFICIARIES OF THE SPECIAL EDUCATION", "n_bills": 2, "archetype": "Expand permissible uses of the Special Education Fund", "theme": "Fiscal Transfers & PFM", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 19, "number": 1583, "title": "AN ACT PROVIDING FOR THE INCLUSION OF PRIVATE ELEMENTARY AND SECONDARY SCHOOLS AS BENEFICIARIES OF THE SPECIAL EDUCATION", "decision": "REVISE / CALIBRATE"}, {"congress": 20, "number": 4695, "title": "AN ACT PROVIDING FOR THE INCLUSION OF PRIVATE ELEMENTARY AND SECONDARY SCHOOLS AS BENEFICIARIES OF THE SPECIAL EDUCATION", "decision": "REVISE / CALIBRATE"}], "proposes": "Include private elementary and secondary schools as beneficiaries of the Special Education Fund (SEF).", "scores": {"P1": "Fail", "P2": "Conditional", "P3": "Fail", "P4": "Fail", "P5": "Conditional", "P6": "Fail"}, "decision": "REJECT / REFER", "rationale": "The SEF is a public fund generated from a local tax levy; extending it to private schools diverts public resources to private entities (P1, P3 Fail), creates a fiscal risk without adequate safeguards (P4 Fail), and undermines the fund's constitutionally grounded public-education purpose (P6 Fail). The measure belongs in a separate private-school subsidy law, not an LGC amendment."}, {"mid": 278, "rep_title": "AN ACT RATIONALIZING THE PURPOSES AND APPLICATION OF THE SPECIAL EDUCATION FUND, AMENDING FOR THE PURPOSE SECTION 272 OF", "n_bills": 1, "archetype": "Expand permissible uses of the Special Education Fund", "theme": "Fiscal Transfers & PFM", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 19, "number": 5932, "title": "AN ACT RATIONALIZING THE PURPOSES AND APPLICATION OF THE SPECIAL EDUCATION FUND, AMENDING FOR THE PURPOSE SECTION 272 OF", "decision": "REVISE / CALIBRATE"}], "proposes": "Rationalize and broaden the purposes and application of the SEF by amending Section 272 of RA 7160.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Rationalizing SEF use is sound in direction and respects local autonomy (P1, P2, P3 Pass), but the measure must embed spending caps, audit requirements, and alignment with DepEd standards (P4, P5, P6 Conditional) before adoption to prevent fiscal leakage and incoherence with national education policy."}, {"mid": 279, "rep_title": "AN ACT AUTHORIZING PROVINCES, CITIES, AND MUNICIPALITIES TO MAKE LOANS USING THE SPECIAL EDUCATION FUND AS COLLATERAL, A", "n_bills": 1, "archetype": "Expand permissible uses of the Special Education Fund", "theme": "Fiscal Transfers & PFM", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 19, "number": 6267, "title": "AN ACT AUTHORIZING PROVINCES, CITIES, AND MUNICIPALITIES TO MAKE LOANS USING THE SPECIAL EDUCATION FUND AS COLLATERAL, A", "decision": "REVISE / CALIBRATE"}], "proposes": "Authorize provinces, cities, and municipalities to use the SEF as collateral for loans.", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "Pass", "P4": "Fail", "P5": "Fail", "P6": "Fail"}, "decision": "REJECT / REFER", "rationale": "Pledging a dedicated education levy as loan collateral exposes public school funding to debt-service risk (P4 Fail), lacks the transparency and accountability safeguards needed for contingent liabilities (P5 Fail), and is inconsistent with DepEd's stewardship framework and national fiscal rules (P6 Fail). The borrowing power of LGUs is already addressed in LGC Title IV; this collateral provision belongs there, not under SEF."}, {"mid": 280, "rep_title": "AN ACT AMENDING SECTION 272 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE \"LOCAL GOVERNMENT CODE OF 1991,\" TO ALLOW T", "n_bills": 1, "archetype": "Expand permissible uses of the Special Education Fund", "theme": "Fiscal Transfers & PFM", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 20, "number": 2371, "title": "AN ACT AMENDING SECTION 272 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE \"LOCAL GOVERNMENT CODE OF 1991,\" TO ALLOW T", "decision": "REVISE / CALIBRATE"}], "proposes": "Amend Section 272 of RA 7160 to allow the SEF to fund additional education-related purposes beyond its current scope.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Expanding SEF permissible uses to additional education purposes is directionally sound (P1-P3 Pass), but without defined eligibility criteria, expenditure ceilings, and mandatory reporting to the Local School Board, fiscal discipline and coherence with national education plans remain at risk (P4, P5, P6 Conditional). These guardrails must be written into the bill."}, {"mid": 281, "rep_title": "AN ACT EXPANDING THE COVERAGE OF THE SPECIAL EDUCATION FUND (SEF) BY INCREASING THE RATE FROM ONE PERCENT (1%) TO TWO PE", "n_bills": 1, "archetype": "Expand permissible uses of the Special Education Fund", "theme": "Fiscal Transfers & PFM", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 20, "number": 3841, "title": "AN ACT EXPANDING THE COVERAGE OF THE SPECIAL EDUCATION FUND (SEF) BY INCREASING THE RATE FROM ONE PERCENT (1%) TO TWO PE", "decision": "REVISE / CALIBRATE"}], "proposes": "Expand SEF coverage by raising the SEF levy rate from 1% to 2% of assessed value of real property.", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "Pass", "P4": "Conditional", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Doubling the levy could meaningfully increase education funding (P3, P4 potentially positive), but the rate increase is nationally mandated without assessing local fiscal capacity variation (P1, P2 Conditional), risks property-tax burden without corresponding accountability mechanisms (P5 Conditional), and needs coordination with BLGF and DepEd guidelines (P6 Conditional). Rate flexibility tied to local school board approval would improve the measure."}, {"mid": 282, "rep_title": "AN ACT INCREASING THE SPECIAL EDUCATION FUND LEVY AND EXPANDING THE APPLICATION OF THE SPECIAL EDUCATION FUND, AMENDING", "n_bills": 1, "archetype": "Expand permissible uses of the Special Education Fund", "theme": "Fiscal Transfers & PFM", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 20, "number": 4575, "title": "AN ACT INCREASING THE SPECIAL EDUCATION FUND LEVY AND EXPANDING THE APPLICATION OF THE SPECIAL EDUCATION FUND, AMENDING", "decision": "REVISE / CALIBRATE"}], "proposes": "Increase the SEF levy and expand permissible applications of the SEF, amending RA 7160.", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "Pass", "P4": "Conditional", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Combining a levy increase with expanded uses is the most comprehensive SEF reform but also the most complex; autonomy and self-determination depend on whether LGUs retain discretion over the expanded uses (P1, P2 Conditional). Fiscal justice, accountability, and coherence all require enforceable Local School Board oversight, audit trails, and DepEd alignment to avoid an unfunded-mandate-in-reverse scenario where funds are misapplied (P4, P5, P6 Conditional)."}, {"mid": 283, "rep_title": "AN ACT MANDATING THE ESTABLISHMENT OF PUBLIC CREMATORIUMS IN CITIES AND MUNICIPALITIES AND EXTENDING FREE CREMATION SERV", "n_bills": 1, "archetype": "Public crematorium / mortuary / cemetery", "theme": "Service Delivery & Devolution", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 19, "number": 7868, "title": "AN ACT MANDATING THE ESTABLISHMENT OF PUBLIC CREMATORIUMS IN CITIES AND MUNICIPALITIES AND EXTENDING FREE CREMATION SERV", "decision": "REVISE / CALIBRATE"}], "proposes": "Mandate establishment of public crematoriums in cities and municipalities and extend free cremation services.", "scores": {"P1": "Fail", "P2": "Conditional", "P3": "Conditional", "P4": "Fail", "P5": "Conditional", "P6": "Conditional"}, "decision": "REJECT / REFER", "rationale": "A blanket national mandate to build crematoriums overrides local land-use decisions and religious/cultural contexts (P1 Fail, P2 Conditional), and 'free cremation' without an identified funding source is a classic unfunded mandate on LGU budgets (P4 Fail). The measure should at minimum be permissive rather than mandatory and include an accompanying national subsidy or cost-sharing mechanism before LGC insertion."}, {"mid": 284, "rep_title": "AN ACT AMENDING REPUBLIC ACT NO. 7743, OTHERWISE KNOWN AS \\\"AN ACT PROVIDING FOR THE ESTABLISHMENT OF PROVINCIAL, CITY,", "n_bills": 1, "archetype": "Public library establishment / strengthening", "theme": "Service Delivery & Devolution", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 1698, "title": "AN ACT AMENDING REPUBLIC ACT NO. 7743, OTHERWISE KNOWN AS \\\"AN ACT PROVIDING FOR THE ESTABLISHMENT OF PROVINCIAL, CITY,", "decision": "REVISE / CALIBRATE"}], "proposes": "Amend RA 7743 to strengthen or adjust requirements for establishment of provincial, city, and municipal public libraries.", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "Pass", "P4": "Conditional", "P5": "Pass", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "Strengthening public libraries aligns with subsidiarity and national literacy policy (P3, P6 Pass) and inherently promotes accountability through public service delivery (P5 Pass). However, if the amendment tightens mandatory establishment standards without providing additional national funding support, it risks imposing fiscal burdens on poorer LGUs (P4 Conditional) and limiting local discretion over resource allocation (P1, P2 Conditional). A differentiated standard by LGU class or a national matching grant would resolve these conditions."}, {"mid": 285, "rep_title": "AN ACT AMENDING REPUBLIC ACT NO. 7743, OTHERWISE KNOWN AS 'AN ACT PROVIDING FOR THE ESTABLISHMENT OF CONGRESSIONAL, CITY", "n_bills": 3, "archetype": "Public library establishment / strengthening", "theme": "Service Delivery & Devolution", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 1879, "title": "AN ACT AMENDING REPUBLIC ACT NO. 7743, OTHERWISE KNOWN AS 'AN ACT PROVIDING FOR THE ESTABLISHMENT OF CONGRESSIONAL, CITY", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "number": 1889, "title": "AN ACT AMENDING REPUBLIC ACT NO. 7743, OTHERWISE KNOWN AS 'AN ACT PROVIDING FOR THE ESTABLISHMENT OF CONGRESSIONAL, CITY", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "number": 7409, "title": "AN ACT AMENDING REPUBLIC ACT NO. 7743, OTHERWISE KNOWN AS \\\"AN ACT PROVIDING FOR THE ESTABLISHMENT OF CONGRESSIONAL, CIT", "decision": "REVISE / CALIBRATE"}], "proposes": "Amend RA 7743 to update requirements for establishment of congressional, city, and municipal public libraries.", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "Pass", "P4": "Conditional", "P5": "Pass", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "Same structural analysis as mid 284: the policy direction is sound and coherent (P3, P5, P6 Pass), but mandatory establishment standards risk fiscal strain on lower-income LGUs without accompanying national support mechanisms (P1, P2, P4 Conditional). Differentiated compliance timelines or funding assistance would allow adoption."}, {"mid": 286, "rep_title": "AN ACT AMENDING SEC. 6 OF REPUBLIC ACT NO. 7743, OTHERWISE KNOWN AS 'AN ACT PROVIDING FOR THE ESTABLISHMENT OF CONGRESSI", "n_bills": 1, "archetype": "Public library establishment / strengthening", "theme": "Service Delivery & Devolution", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 5837, "title": "AN ACT AMENDING SEC. 6 OF REPUBLIC ACT NO. 7743, OTHERWISE KNOWN AS 'AN ACT PROVIDING FOR THE ESTABLISHMENT OF CONGRESSI", "decision": "REVISE / CALIBRATE"}], "proposes": "Amend Section 6 of RA 7743 to revise funding or operational provisions for congressional, city, and municipal libraries.", "scores": {"P1": "Conditional", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Pass", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "A targeted amendment to the funding/operational section of RA 7743 is well-scoped (P2, P3, P5, P6 Pass). The conditional on P1 and P4 depends on whether the revised Section 6 prescribes specific budget appropriation levels that may be beyond smaller LGUs' means without flexibility; if the amendment allows LGU-determined allocation within a minimum floor, conditions are resolved."}, {"mid": 287, "rep_title": "AN ACT STRENGTHENING THE PHILIPPINE PUBLIC LIBRARY SYSTEM, AMENDING THE REPUBLIC ACT NO. 7743, OTHERWISE KNOWN AS \\\"AN A", "n_bills": 2, "archetype": "Public library establishment / strengthening", "theme": "Service Delivery & Devolution", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 7941, "title": "AN ACT STRENGTHENING THE PHILIPPINE PUBLIC LIBRARY SYSTEM, AMENDING THE REPUBLIC ACT NO. 7743, OTHERWISE KNOWN AS \\\"AN A", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "number": 8329, "title": "AN ACT STRENGTHENING THE PHILIPPINE PUBLIC LIBRARY SYSTEM, AMENDING FOR THE REPUBLIC ACT NO. 7743, OTHERWISE KNOWN AS \\\"", "decision": "REVISE / CALIBRATE"}], "proposes": "Comprehensively strengthen the Philippine public library system by amending RA 7743.", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "Pass", "P4": "Conditional", "P5": "Pass", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "A comprehensive strengthening bill carries the greatest potential impact but also the highest risk of imposing uniform national standards on fiscally diverse LGUs (P1, P2, P4 Conditional). The directional alignment with national literacy and information-access policy is strong (P3, P5, P6 Pass). Calibration should introduce tiered standards by LGU income class and a national-library-fund matching mechanism."}, {"mid": 288, "rep_title": "AN ACT STRENGTHENING THE PHILIPPINE PUBLIC LIBRARY SYSTEM, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7743, OTHERWISE KNO", "n_bills": 1, "archetype": "Public library establishment / strengthening", "theme": "Service Delivery & Devolution", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 8027, "title": "AN ACT STRENGTHENING THE PHILIPPINE PUBLIC LIBRARY SYSTEM, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7743, OTHERWISE KNO", "decision": "REVISE / CALIBRATE"}], "proposes": "Strengthen the Philippine public library system by further amending RA 7743, covering governance, staffing, or funding.", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "Pass", "P4": "Conditional", "P5": "Pass", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "Like mid 287, this comprehensive amendment is sound in direction (P3, P5, P6 Pass) but must guard against imposing uniform governance or staffing mandates that strain lower-income LGUs (P1, P2, P4 Conditional). Revision should include income-class-tiered requirements and clarity on whether the national government co-funds the staffing expansion."}, {"mid": 289, "rep_title": "AN ACT CREATING BARANGAY QUICK RESPONSE UNITS IN EVERY BARANGAY THEREBY AMENDING REPUBLIC ACT 7160 OTHERWISE KNOWN AS TH", "n_bills": 1, "archetype": "Barangay quick-response / emergency units", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 6056, "title": "AN ACT CREATING BARANGAY QUICK RESPONSE UNITS IN EVERY BARANGAY THEREBY AMENDING REPUBLIC ACT 7160 OTHERWISE KNOWN AS TH", "decision": "REVISE / CALIBRATE"}], "proposes": "Creates mandatory Barangay Quick Response Units in every barangay by amending RA 7160.", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "Pass", "P4": "Fail", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "P4 Fail: creating a mandatory unit in every barangay without a dedicated national funding stream imposes an unfunded mandate on resource-scarce barangays. P1/P2 Conditional: a one-size-fits-all structure curtails local design discretion. Revision should make the unit discretionary or provide earmarked funding, and allow LGUs to set internal structure."}, {"mid": 290, "rep_title": "AN ACT MANDATING EACH LOCAL GOVERNMENT UNIT TO ALLOT TO COOPERATIVES TWO PERCENT (2%) OF ITS APPROPRIATIONS FOR LOCAL DE", "n_bills": 2, "archetype": "Other basic-service / general-welfare / local economic powers", "theme": "Service Delivery & Devolution", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 2433, "title": "AN ACT MANDATING EACH LOCAL GOVERNMENT UNIT TO ALLOT TO COOPERATIVES TWO PERCENT (2%) OF ITS APPROPRIATIONS FOR LOCAL DE", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 1334, "title": "AN ACT MANDATING EACH LOCAL GOVERNMENT UNIT TO ALLOT TO COOPERATIVES TWO PERCENT (2%) OF THE APPROPRIATIONS FOR LOCAL DE", "decision": "REVISE / CALIBRATE"}], "proposes": "Mandates each LGU to allocate 2% of its local development appropriations to cooperatives.", "scores": {"P1": "Fail", "P2": "Fail", "P3": "Conditional", "P4": "Fail", "P5": "Conditional", "P6": "Conditional"}, "decision": "REJECT / REFER", "rationale": "P1 and P2 Fail: a nationally-mandated earmark on LGU appropriations directly overrides local fiscal autonomy and the community's own budget priorities. P4 Fail: the mandate is unfunded — it merely redirects a fixed share of the LGU's own funds, crowding out other devolved services. The cooperative development agenda belongs in national cooperative legislation (RA 6938), not as a forced LGU earmark."}, {"mid": 291, "rep_title": "AN ACT PROVIDING FOR TAX EXEMPTIONS AND SUBSIDIES FOR THE LOCAL MUSIC INDUSTRY, AMENDING FOR THIS PURPOSE CERTAIN SECTIO", "n_bills": 1, "archetype": "Other basic-service / general-welfare / local economic powers", "theme": "Service Delivery & Devolution", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 4517, "title": "AN ACT PROVIDING FOR TAX EXEMPTIONS AND SUBSIDIES FOR THE LOCAL MUSIC INDUSTRY, AMENDING FOR THIS PURPOSE CERTAIN SECTIO", "decision": "REVISE / CALIBRATE"}], "proposes": "Provides tax exemptions and subsidies for the local music industry by amending RA 7160 and related laws.", "scores": {"P1": "Fail", "P2": "Conditional", "P3": "Conditional", "P4": "Fail", "P5": "Conditional", "P6": "Conditional"}, "decision": "REJECT / REFER", "rationale": "P1 and P4 Fail: mandating LGU tax exemptions for a specific industry strips LGUs of their constitutionally-guaranteed power to levy local taxes and creates revenue loss without compensation. Music industry incentives belong in national investment/cultural legislation (e.g., CREATE Act, National Cultural Heritage Act), not RA 7160 amendments."}, {"mid": 292, "rep_title": "AN ACT INSTITUTING AGRICULTURAL COOPERATIVISM IN THE PHILIPPINES, AMENDING FOR THE PURPOSE CERTAIN SECTIONS OF R.A. NO.", "n_bills": 2, "archetype": "Other basic-service / general-welfare / local economic powers", "theme": "Service Delivery & Devolution", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 5732, "title": "AN ACT INSTITUTING AGRICULTURAL COOPERATIVISM IN THE PHILIPPINES, AMENDING FOR THE PURPOSE CERTAIN SECTIONS OF R.A. NO.", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 3492, "title": "AN ACT INSTITUTING AGRICULTURAL COOPERATIVISM IN THE PHILIPPINES, AMENDING FOR THE PURPOSE CERTAIN SECTIONS OF R.A. NO.", "decision": "REVISE / CALIBRATE"}], "proposes": "Institutionalizes agricultural cooperativism nationwide by amending RA 7160 and related laws, imposing LGU roles.", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "Conditional", "P4": "Fail", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "P4 Fail: assigning new mandatory functions to LGUs in support of agricultural cooperativism without commensurate funding constitutes an unfunded mandate. Agricultural cooperative policy is primarily a national concern (RA 6938/DA mandate); any LGU role should be facilitative and opt-in, with national budget support. Revision should clarify LGU roles as permissive and provide national funding conduit."}, {"mid": 293, "rep_title": "AN ACT PROVIDING A NATIONAL STIMULUS STRATEGY TO RESTORE ECONOMIC GROWTH AND EMPLOYMENT, APPROPRIATING FUNDS THEREFOR, A", "n_bills": 1, "archetype": "Other basic-service / general-welfare / local economic powers", "theme": "Service Delivery & Devolution", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 6619, "title": "AN ACT PROVIDING A NATIONAL STIMULUS STRATEGY TO RESTORE ECONOMIC GROWTH AND EMPLOYMENT, APPROPRIATING FUNDS THEREFOR, A", "decision": "REVISE / CALIBRATE"}], "proposes": "Enacts a national stimulus strategy to restore economic growth and employment, appropriating funds and amending LGC provisions.", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "Conditional", "P4": "Conditional", "P5": "Conditional", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "A national stimulus that amends RA 7160 risks recentralizing functions unless LGU participation is voluntary and funded. P1/P2/P3 Conditional: stimulus design must preserve LGU discretion over local economic priorities. P4 Conditional: appropriated funds must clearly flow to LGUs without unfunded mandates. Revision should ring-fence LGU stimulus shares as block grants with minimal conditionalities."}, {"mid": 294, "rep_title": "AN ACT EXPEDITING THE PROCUREMENT AND ADMINISTRATION OF VACCINES FOR THE PROTECTION AGAINST THE CORONAVIRUS DISEASE 2019", "n_bills": 1, "archetype": "Other basic-service / general-welfare / local economic powers", "theme": "Service Delivery & Devolution", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 8648, "title": "AN ACT EXPEDITING THE PROCUREMENT AND ADMINISTRATION OF VACCINES FOR THE PROTECTION AGAINST THE CORONAVIRUS DISEASE 2019", "decision": "REVISE / CALIBRATE"}], "proposes": "Expedites procurement and administration of COVID-19 vaccines, amending relevant laws including LGC provisions on LGU health roles.", "scores": {"P1": "Conditional", "P2": "N/A", "P3": "Pass", "P4": "Conditional", "P5": "Pass", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "Emergency health response appropriately coordinates national-local action, and vaccine administration at the local level aligns with subsidiarity. P1 Conditional: national override of LGU procurement rules for vaccines is justified by urgency but must sunset post-emergency. P4 Conditional: national funding for vaccines must be explicitly assured so LGUs bear no uncompensated cost. Overall sound but needs clear sunset and funding guarantee."}, {"mid": 295, "rep_title": "AN ACT PROVIDING FOR TAX EXEMPTIONS AND SUBSIDIES FOR THE LOCAL MUSIC INDUSTRY AND AMENDING CERTAIN SECTIONS OF REPUBLIC", "n_bills": 4, "archetype": "Other basic-service / general-welfare / local economic powers", "theme": "Service Delivery & Devolution", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 8682, "title": "AN ACT PROVIDING FOR TAX EXEMPTIONS AND SUBSIDIES FOR THE LOCAL MUSIC INDUSTRY AND AMENDING CERTAIN SECTIONS OF REPUBLIC", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 2851, "title": "AN ACT PROVIDING FOR TAX EXEMPTIONS AND SUBSIDIES FOR THE LOCAL MUSIC INDUSTRY AND AMENDING CERTAIN SECTIONS OF REPUBLIC", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 4782, "title": "AN ACT PROVIDING FOR TAX EXEMPTIONS AND SUBSIDIES FOR THE LOCAL MUSIC INDUSTRY AND AMENDING CERTAIN SECTIONS OF REPUBLIC", "decision": "REVISE / CALIBRATE"}, {"congress": 20, "number": 3433, "title": "AN ACT PROVIDING FOR TAX EXEMPTIONS AND SUBSIDIES FOR THE LOCAL MUSIC INDUSTRY AND AMENDING CERTAIN SECTIONS OF REPUBLIC", "decision": "REVISE / CALIBRATE"}], "proposes": "Provides tax exemptions and subsidies for the local music industry, amending RA 7160 and other revenue laws.", "scores": {"P1": "Fail", "P2": "Conditional", "P3": "Conditional", "P4": "Fail", "P5": "Conditional", "P6": "Conditional"}, "decision": "REJECT / REFER", "rationale": "Substantively identical to mid 291. P1 and P4 Fail for the same reasons: mandated LGU tax exemptions for a specific sector override local taxing autonomy and impose uncompensated revenue losses. This belongs in national cultural/investment legislation, not RA 7160."}, {"mid": 296, "rep_title": "AN ACT GRANTING PROVINCES A SHARE IN THE PROCEEDS OF REAL PROPERTY TAXES IMPOSED BY COMPONENT CITIES, AMENDING SECTION 2", "n_bills": 3, "archetype": "Real property tax / idle land / valuation reform", "theme": "Local Taxation & Revenue", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 1575, "title": "AN ACT GRANTING PROVINCES A SHARE IN THE PROCEEDS OF REAL PROPERTY TAXES IMPOSED BY COMPONENT CITIES, AMENDING SECTION 2", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 1019, "title": "AN ACT GRANTING PROVINCES A SHARE IN THE PROCEEDS OF REAL PROPERTY TAXES IMPOSED BY COMPONENT CITIES, AMENDING SECTION 2", "decision": "REVISE / CALIBRATE"}, {"congress": 20, "number": 1623, "title": "AN ACT GRANTING PROVINCES A SHARE IN THE PROCEEDS OF REAL PROPERTY TAXES IMPOSED BY COMPONENT CITIES, AMENDING SECTION 2", "decision": "REVISE / CALIBRATE"}], "proposes": "Grants provinces a share of real property taxes imposed by component cities, amending Section 2 of RA 7160.", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "Conditional", "P4": "Pass", "P5": "Pass", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "P4 Pass: revenue sharing between component cities and provinces improves fiscal equity without an unfunded mandate. P1/P2/P3 Conditional: the mandatory sharing formula may reduce city autonomy and could disadvantage cities that have built up their own tax base; a negotiated or needs-based floor would be preferable. Revision should allow flexibility in the sharing arrangement and include a transition period for affected cities."}, {"mid": 297, "rep_title": "AN ACT INCREASING THE TAX ON IDLE LANDS, AMENDING FOR THE PURPOSE SECTION 236 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN", "n_bills": 1, "archetype": "Real property tax / idle land / valuation reform", "theme": "Local Taxation &
