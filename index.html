"theme": "Other / Cross-cutting", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 1915, "title": "AN ACT ESTABLISHING AT LEAST ONE SPED CENTER FOR EVERY COMPONENT CITY AND AT LEAST TWO SPED CENTERS FOR EVERY HIGHLY URB", "decision": "REVISE / CALIBRATE"}], "proposes": "Mandates establishment of SPED Centers in every component city and highly urbanized city.", "scores": {"P1": "Fail", "P2": "N/A", "P3": "Fail", "P4": "Fail", "P5": "N/A", "P6": "Fail"}, "decision": "REJECT / REFER", "rationale": "Special education is a core DepEd function governed by the Enhanced Basic Education Act (RA 10533), not the Local Government Code. Inserting an infrastructure mandate into the LGC overrides LGU discretion on spending priorities (P1 Fail), assigns a national education function to LGUs without national funding (P3 Fail, P4 Fail — textbook unfunded mandate), and conflicts with DepEd's existing SPED framework (P6 Fail). This measure should be referred to the Committee on Basic Education for incorporation into the appropriate education statute with a dedicated national appropriation."}, {"mid": 71, "rep_title": "AN ACT RATIONALIZING THE LAND AREA REQUIREMENT FOR THE CREATION OF A PROVINCE, AMENDING FOR THE PURPOSE SECTION 461 (B)", "n_bills": 3, "archetype": "Rationalize income/population/land requirements for creating/converting LGUs", "theme": "Other / Cross-cutting", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 2269, "title": "AN ACT RATIONALIZING THE LAND AREA REQUIREMENT FOR THE CREATION OF A PROVINCE, AMENDING FOR THE PURPOSE SECTION 461 (B)", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 1824, "title": "AN ACT RATIONALIZING THE LAND AREA REQUIREMENT FOR THE CREATION OF A PROVINCE, AMENDING FOR THE PURPOSE SECTION 461 (B)", "decision": "REVISE / CALIBRATE"}, {"congress": 20, "number": 1542, "title": "AN ACT RATIONALIZING THE LAND AREA REQUIREMENT FOR THE CREATION OF A PROVINCE, AMENDING FOR THE PURPOSE SECTION 461 (B)", "decision": "REVISE / CALIBRATE"}], "proposes": "Rationalizes the land area requirement for the creation of a province by amending Section 461(b) of RA 7160.", "scores": {"P1": "Pass", "P2": "Conditional", "P3": "Conditional", "P4": "Conditional", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Updating a land area threshold that may no longer reflect geographic or administrative realities is reasonable (P1), but lowering province-creation requirements without a commensurate income or population floor risks creating fiscally non-viable provinces that further fragment IRA shares (P4 Conditional). NEDA regional planning frameworks and the DILG rationalization roadmap must be observed (P6). The measure should pair land area adjustment with updated income and population criteria to avoid gaming and ensure viable units (P3, P5)."}, {"mid": 72, "rep_title": "AN ACT EXEMPTING FROM THE INCOME REQUIREMENT THE CAPITAL TOWN OF A PROVINCE WITHOUT A CITY, FURTHER AMENDING FOR THE PUR", "n_bills": 2, "archetype": "Rationalize income/population/land requirements for creating/converting LGUs", "theme": "Other / Cross-cutting", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 2702, "title": "AN ACT EXEMPTING FROM THE INCOME REQUIREMENT THE CAPITAL TOWN OF A PROVINCE WITHOUT A CITY, FURTHER AMENDING FOR THE PUR", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "number": 5572, "title": "AN ACT EXEMPTING FROM THE INCOME REQUIREMENT THE CAPITAL TOWN OF A PROVINCE WITHOUT A CITY, AMENDING FOR THE PURPOSE SEC", "decision": "REVISE / CALIBRATE"}], "proposes": "Exempts the capital town of a province that has no city from the income requirement for municipal status.", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "Conditional", "P4": "Fail", "P5": "Fail", "P6": "Fail"}, "decision": "REVISE / CALIBRATE", "rationale": "Blanket exemption from income requirements for capital towns removes the fiscal viability threshold that protects both the LGU and provincial governance (P4 Fail). A capital town below the income floor may require chronic national subsidy, undermining fiscal justice for other LGUs sharing the IRA pool. The exemption also creates a privileged LGU class with no accountability benchmark (P5 Fail) and is inconsistent with the general income-based classification scheme (P6 Fail). If the intent is to ensure provincial capitals have adequate administrative infrastructure, the correct approach is a national grant or special development fund tied to performance benchmarks, not a blanket waiver of viability standards."}, {"mid": 73, "rep_title": "AN ACT AMENDING SECTION 450 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE, BY AUTOMATICALLY CON", "n_bills": 3, "archetype": "Rationalize income/population/land requirements for creating/converting LGUs", "theme": "Other / Cross-cutting", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 4085, "title": "AN ACT AMENDING SECTION 450 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE, BY AUTOMATICALLY CON", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 427, "title": "AN ACT AMENDING SECTION 450 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE, BY AUTOMATICALLY CON", "decision": "REVISE / CALIBRATE"}, {"congress": 20, "number": 405, "title": "AN ACT AMENDING SECTION 450 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE, BY AUTOMATICALLY CON", "decision": "REVISE / CALIBRATE"}], "proposes": "Automatically converts a municipality meeting income/population thresholds into a component city under Section 450 of RA 7160.", "scores": {"P1": "Conditional", "P2": "Fail", "P3": "Pass", "P4": "Conditional", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Automatic conversion without a local plebiscite or community-initiated process fails P2 (self-determination); LGUs and communities must have a voice before structural change takes effect. Fiscal impact on the mother province and IRA reallocation should be assessed (P4). Conditionality on mandatory plebiscite and fiscal impact study would make this adoptable."}, {"mid": 74, "rep_title": "AN ACT INSTITUTIONALIZING THE AUTOMATIC INCOME CLASSIFICATION OF PROVINCES, CITIES AND MUNICIPALITIES, AMENDING FOR THIS", "n_bills": 1, "archetype": "Rationalize income/population/land requirements for creating/converting LGUs", "theme": "Other / Cross-cutting", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 19, "number": 5290, "title": "AN ACT INSTITUTIONALIZING THE AUTOMATIC INCOME CLASSIFICATION OF PROVINCES, CITIES AND MUNICIPALITIES, AMENDING FOR THIS", "decision": "REVISE / CALIBRATE"}], "proposes": "Institutionalizes automatic income classification of provinces, cities, and municipalities based on updated financial benchmarks.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Pass", "P5": "Pass", "P6": "Pass"}, "decision": "ADOPT", "rationale": "Automatic income reclassification removes political gatekeeping (P1), ensures LGUs access resource levels commensurate with their actual income (P4 fiscal justice), imposes no new mandates, and aligns classifications uniformly across all LGUs (P6). No principle is failed or materially conditioned."}, {"mid": 75, "rep_title": "AN ACT EXTENDING THE POWER OF THE PRESIDENT TO DECLARE HIGHLY URBANIZED STATUS TO MUNICIPALITIES, AMENDING FOR THE PURPO", "n_bills": 1, "archetype": "Rationalize income/population/land requirements for creating/converting LGUs", "theme": "Other / Cross-cutting", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 19, "number": 6495, "title": "AN ACT EXTENDING THE POWER OF THE PRESIDENT TO DECLARE HIGHLY URBANIZED STATUS TO MUNICIPALITIES, AMENDING FOR THE PURPO", "decision": "REVISE / CALIBRATE"}], "proposes": "Extends the President's power to declare Highly Urbanized City (HUC) status to municipalities, bypassing the existing city-only pathway.", "scores": {"P1": "Fail", "P2": "Fail", "P3": "Conditional", "P4": "Conditional", "P5": "Conditional", "P6": "Conditional"}, "decision": "REJECT / REFER", "rationale": "Concentrating HUC-declaration power in the President over municipalities directly undermines local autonomy (P1) and community self-determination (P2) by bypassing the legislated conversion process and plebiscite requirement. This is a structural governance change that contradicts the decentralization thrust of RA 7160 and should be referred back for redesign with mandatory local consultation and plebiscite safeguards."}, {"mid": 76, "rep_title": "AN ACT PROVIDING FOR THE AUTOMATIC INCOME CLASSIFICATION OF PROVINCES, CITIES, AND MUNICIPALITIES, AMENDING FOR THE PURP", "n_bills": 1, "archetype": "Rationalize income/population/land requirements for creating/converting LGUs", "theme": "Other / Cross-cutting", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 19, "number": 7006, "title": "AN ACT PROVIDING FOR THE AUTOMATIC INCOME CLASSIFICATION OF PROVINCES, CITIES, AND MUNICIPALITIES, AMENDING FOR THE PURP", "decision": "REVISE / CALIBRATE"}], "proposes": "Provides for automatic income classification of provinces, cities, and municipalities through legislative amendment of RA 7160.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Pass", "P5": "Pass", "P6": "Pass"}, "decision": "ADOPT", "rationale": "Like mid 74, automatic income classification depoliticizes reclassification, ensures timely and fair resource access (P4), and applies uniformly (P6). No unfunded mandate is created and local decision-making is not constrained. Substantively indistinguishable from mid 74 — both merit adoption."}, {"mid": 77, "rep_title": "AN ACT AMENDING SECTION 450 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE, TO INSTITUTIONALIZE", "n_bills": 1, "archetype": "Rationalize income/population/land requirements for creating/converting LGUs", "theme": "Other / Cross-cutting", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 19, "number": 9122, "title": "AN ACT AMENDING SECTION 450 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE, TO INSTITUTIONALIZE", "decision": "REVISE / CALIBRATE"}], "proposes": "Institutionalizes automatic conversion of municipalities into component cities upon meeting income and other criteria under Section 450.", "scores": {"P1": "Conditional", "P2": "Fail", "P3": "Pass", "P4": "Conditional", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Identical structural concern as mid 73: automatic conversion without a plebiscite violates P2. The conversion mechanism is sound in direction but must be revised to require community ratification before conversion takes legal effect. IRA and shared-tax reallocation impact on the mother province also needs explicit fiscal transition provision (P4)."}, {"mid": 78, "rep_title": "AN ACT AMENDING SECTION 461 OF REPUBLIC ACT 7160 OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991, BY INCREASING THE", "n_bills": 1, "archetype": "Rationalize income/population/land requirements for creating/converting LGUs", "theme": "Other / Cross-cutting", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 19, "number": 9659, "title": "AN ACT AMENDING SECTION 461 OF REPUBLIC ACT 7160 OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991, BY INCREASING THE", "decision": "REVISE / CALIBRATE"}], "proposes": "Increases the income, population, and land area requirements for province creation under Section 461 of RA 7160.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Pass", "P5": "Pass", "P6": "Pass"}, "decision": "ADOPT", "rationale": "Raising creation thresholds prevents proliferation of fiscally non-viable provinces, promotes sustainability (P4), and ensures new LGUs can actually exercise meaningful autonomy (P1, P3). It does not impose an unfunded mandate and aligns national policy with fiscal discipline (P6). No principle is failed."}, {"mid": 79, "rep_title": "AN ACT UPDATING THE REQUIREMENTS FOR THE CREATION OF LOCAL GOVERNMENT UNITS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7", "n_bills": 1, "archetype": "Rationalize income/population/land requirements for creating/converting LGUs", "theme": "Other / Cross-cutting", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 20, "number": 587, "title": "AN ACT UPDATING THE REQUIREMENTS FOR THE CREATION OF LOCAL GOVERNMENT UNITS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7", "decision": "REVISE / CALIBRATE"}], "proposes": "Updates income, population, and land area requirements for the creation of LGUs across all tiers in RA 7160.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Pass", "P5": "Pass", "P6": "Pass"}, "decision": "ADOPT", "rationale": "Comprehensive update of LGU creation standards guards against fragmentation and under-resourced units, supporting fiscal viability (P4), functional subsidiarity (P3), and coherent national-local architecture (P6). Aligns with the rationalization archetype's sound direction without triggering any principal concern."}, {"mid": 80, "rep_title": "AN ACT DIVIDING THE PROVINCE OF MAGUINDANAO INTO TWO (2) PROVINCES, NAMELY: NORTHERN MAGUINDANAO AND SOUTHERN MAGUINDANA", "n_bills": 1, "archetype": "Individual creation/conversion/division/renaming of specific LGUs", "theme": "LGU Creation, Boundaries & Land", "sheet_decision": "REJECT / REFER", "member_bills": [{"congress": 18, "number": 6413, "title": "AN ACT DIVIDING THE PROVINCE OF MAGUINDANAO INTO TWO (2) PROVINCES, NAMELY: NORTHERN MAGUINDANAO AND SOUTHERN MAGUINDANA", "decision": "REJECT / REFER"}], "proposes": "Divides the Province of Maguindanao into two provinces: Northern Maguindanao and Southern Maguindanao.", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "Pass", "P4": "Fail", "P5": "Conditional", "P6": "Conditional"}, "decision": "REJECT / REFER", "rationale": "Individual province-division bills belong in standalone legislation, not as LGC amendments (P6). The bill creates a potential unfunded mandate if either resulting province cannot sustain autonomous operations from day one (P4 Fail). Moreover, plebiscite compliance and ARMM/BARMM jurisdictional coherence must be verified before enactment. This should be referred to a separate bill with full plebiscite, fiscal viability study, and BARMM coordination."}, {"mid": 81, "rep_title": "AN ACT CONVERTING THE MUNICIPALITY OF CALACA IN THE PROVINCE OF BATANGAS INTO A COMPONENT CITY TO BE KNOWN AS THE CITY O", "n_bills": 1, "archetype": "Individual creation/conversion/division/renaming of specific LGUs", "theme": "LGU Creation, Boundaries & Land", "sheet_decision": "REJECT / REFER", "member_bills": [{"congress": 18, "number": 6598, "title": "AN ACT CONVERTING THE MUNICIPALITY OF CALACA IN THE PROVINCE OF BATANGAS INTO A COMPONENT CITY TO BE KNOWN AS THE CITY O", "decision": "REJECT / REFER"}], "proposes": "Converts the Municipality of Calaca, Batangas into a component city.", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "Pass", "P4": "Conditional", "P5": "Conditional", "P6": "Fail"}, "decision": "REJECT / REFER", "rationale": "Single-LGU conversion bills are not appropriate LGC amendments — they fragment the Code with particularistic changes (P6 Fail). The proper vehicle is a standalone city charter bill subject to plebiscite. Until converted to a charter bill with verified income thresholds and plebiscite, this should be rejected as an LGC amendment."}, {"mid": 82, "rep_title": "AN ACT CONVERTING EXISTING CAPITAL TOWNS OF PROVINCES WITHOUT A CITY INTO COMPONENT CITIES, AMENDING FOR THE PURPOSE SEC", "n_bills": 2, "archetype": "Individual creation/conversion/division/renaming of specific LGUs", "theme": "LGU Creation, Boundaries & Land", "sheet_decision": "REJECT / REFER", "member_bills": [{"congress": 19, "number": 1000, "title": "AN ACT CONVERTING EXISTING CAPITAL TOWNS OF PROVINCES WITHOUT A CITY INTO COMPONENT CITIES, AMENDING FOR THE PURPOSE SEC", "decision": "REJECT / REFER"}, {"congress": 19, "number": 3538, "title": "AN ACT CONVERTING INTO COMPONENT CITIES THE CAPITAL TOWNS OF PROVINCES WITHOUT A CITY, AMENDING FOR THE PURPOSE SECTION", "decision": "REVISE / CALIBRATE"}], "proposes": "Automatically converts existing capital towns of provinces without a city into component cities by amending RA 7160.", "scores": {"P1": "Conditional", "P2": "Fail", "P3": "Pass", "P4": "Fail", "P5": "Conditional", "P6": "Conditional"}, "decision": "REJECT / REFER", "rationale": "Blanket automatic conversion of all provincial capitals without plebiscite overrides community self-determination (P2 Fail). Many provincial capitals may not meet income or population thresholds, creating fiscally non-viable cities and unfunded mandates for city-level services (P4 Fail). This must be rejected or fundamentally redesigned to require individual compliance with thresholds and mandatory plebiscites."}, {"mid": 83, "rep_title": "AN ACT RATIONALIZING THE POWERS OF LOCAL GOVERNMENT UNITS TO RENAME BARANGAYS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO.", "n_bills": 2, "archetype": "Individual creation/conversion/division/renaming of specific LGUs", "theme": "LGU Creation, Boundaries & Land", "sheet_decision": "REJECT / REFER", "member_bills": [{"congress": 19, "number": 11119, "title": "AN ACT RATIONALIZING THE POWERS OF LOCAL GOVERNMENT UNITS TO RENAME BARANGAYS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO.", "decision": "REJECT / REFER"}, {"congress": 20, "number": 586, "title": "AN ACT RATIONALIZING THE POWERS OF LOCAL GOVERNMENT UNITS TO RENAME BARANGAYS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO.", "decision": "REJECT / REFER"}], "proposes": "Rationalizes LGU powers to rename barangays by amending RA 7160, likely introducing standards or restrictions on renaming.", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "Pass", "P4": "Pass", "P5": "Pass", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "Rationalization of renaming powers is broadly sound (P5, P6) but must ensure that standardization does not unduly restrict genuine LGU discretion to rename barangays reflecting local identity (P1, P2 Conditional). The measure should clarify that community consultation is preserved and that the renaming authority remains at the most local capable level (P3). Minor calibration on autonomy safeguards makes this adoptable."}, {"mid": 84, "rep_title": "AN ACT PROVIDING FOR THE CREATION OF INDIGENOUS BARANGAYS NATIONWIDE, AMENDING FOR THE PURPOSE SECTION 386 OF REPUBLIC A", "n_bills": 1, "archetype": "Individual creation/conversion/division/renaming of specific LGUs", "theme": "LGU Creation, Boundaries & Land", "sheet_decision": "REJECT / REFER", "member_bills": [{"congress": 20, "number": 246, "title": "AN ACT PROVIDING FOR THE CREATION OF INDIGENOUS BARANGAYS NATIONWIDE, AMENDING FOR THE PURPOSE SECTION 386 OF REPUBLIC A", "decision": "REJECT / REFER"}], "proposes": "Provides for the creation of indigenous barangays nationwide by amending Section 386 of RA 7160.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Pass", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Creating a dedicated pathway for indigenous barangays strongly supports autonomy and self-determination for IP communities (P1, P2 Pass) and assigns governance to the most local level (P3). The measure must clarify fiscal support — indigenous barangays in remote areas may lack adequate internal revenue to be self-sustaining without a complementary fund transfer provision (P4 Conditional). Coherence with IPRA (RA 8371) and NCIP processes must also be made explicit (P6 Conditional). These are fixable gaps, not fatal flaws."}, {"mid": 85, "rep_title": "AN ACT STRENGTHENING THE DIGITAL TRANSFORMATION CAPACITY OF ALL LOCAL GOVERNMENT UNITS, AMENDING FOR THE PURPOSE REPUBLI", "n_bills": 6, "archetype": "Mandate LGU digital transformation / ICT capacity / e-governance", "theme": "Service Delivery & Devolution", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 8336, "title": "AN ACT STRENGTHENING THE DIGITAL TRANSFORMATION CAPACITY OF ALL LOCAL GOVERNMENT UNITS, AMENDING FOR THE PURPOSE REPUBLI", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "number": 8420, "title": "AN ACT STRENGTHENING THE DIGITAL TRANSFORMATION CAPACITY OF ALL LOCAL GOVERNMENT UNITS, AMENDING FOR THE PURPOSE REPUBLI", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "number": 8449, "title": "AN ACT STRENGTHENING THE DIGITAL TRANSFORMATION CAPACITY OF ALL LOCAL GOVERNMENT UNITS, AMENDING FOR THE PURPOSE REPUBLI", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 4629, "title": "AN ACT STRENGTHENING THE DIGITAL TRANSFORMATION CAPACITY OF ALL LOCAL GOVERNMENT UNITS, AMENDING FOR THE PURPOSE REPUBLI", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 4718, "title": "AN ACT STRENGTHENING THE DIGITAL TRANSFORMATION CAPACITY OF ALL LOCAL GOVERNMENT UNITS, AMENDING FOR THE PURPOSE REPUBLI", "decision": "REVISE / CALIBRATE"}, {"congress": 20, "number": 3435, "title": "AN ACT STRENGTHENING THE DIGITAL TRANSFORMATION CAPACITY OF ALL LOCAL GOVERNMENT UNITS AMENDING FOR THE PURPOSE REPUBLIC", "decision": "REVISE / CALIBRATE"}], "proposes": "Mandates digital transformation and ICT capacity-building across all LGUs.", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "Pass", "P4": "Fail", "P5": "Pass", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "P4 Fail: a nationwide ICT mandate imposed on all LGUs regardless of fiscal capacity creates an unfunded mandate — smaller, lower-income LGUs cannot self-finance transformation without dedicated national subsidy or IRA augmentation. P2 Conditional: one-size mandate ignores varying LGU readiness and community demand. Revision must include tiered implementation timelines, a national funding mechanism (e.g., DILG-managed tech fund), and opt-in flexibility for highly constrained barangays."}, {"mid": 86, "rep_title": "AN ACT POSTPONING THE MAY 2020 BARANGAY AND SANGGUNIANG KABATAAN ELECTIONS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 91", "n_bills": 20, "archetype": "Postpone / reset barangay & SK elections", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 47, "title": "AN ACT POSTPONING THE MAY 2020 BARANGAY AND SANGGUNIANG KABATAAN ELECTIONS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 91", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "number": 396, "title": "AN ACT POSTPONING THE MAY 2020 BARANGAY AND SANGGUNIANG KABATAAN ELECTIONS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 10", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "number": 420, "title": "AN ACT POSTPONING THE MAY 2020 BARANGAY AND SANGGUNIANG KABATAAN ELECTIONS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 91", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "number": 625, "title": "AN ACT POSTPONING THE MAY 2020 BARANGAY AND SANGGUNIANG KABATAAN ELECTIONS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 91", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "number": 1354, "title": "AN ACT POSTPONING THE MAY 2020 BARANGAY AND SANGGUNIANG ELECTIONS TO MAY 2023, AMENDING FOR THE PURPOSE REPUBLIC ACT NO.", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "number": 1571, "title": "AN ACT POSTPONING THE MAY 2020 BARANGAY AND SANGGUNIANG KABATAAN ELECTIONS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 91", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "number": 2060, "title": "AN ACT POSTPONING THE MAY 2020 BARANGAY AND SANGGUNIANG KABATAAN ELECTIONS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 91", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "number": 2276, "title": "AN ACT POSTPONING THE MAY 2020 BARANGAY AND SANGGUNIANG KABATAAN ELECTIONS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 91", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "number": 2386, "title": "AN ACT POSTPONING THE MAY 2020 BARANGAY AND SANGGUNIANG KABATAAN ELECTIONS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 91", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "number": 2647, "title": "AN ACT POSTPONING THE MAY 2020 BARANGAY AND SANGGUNIANG KABATAAN ELECTIONS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 91", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "number": 2727, "title": "AN ACT POSTPONING THE MAY 2020 BARANGAY AND SANGGUNIANG KABATAAN ELECTIONS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 91", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "number": 2959, "title": "AN ACT POSTPONING THE MAY 2020 BARANGAY AND SANGGUNIANG KABATAAN ELECTIONS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 10", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "number": 3100, "title": "AN ACT POSTPONING THE MAY 2020 BARANGAY AND SANGGUNIANG KABATAAN ELECTIONS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 91", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "number": 3187, "title": "AN ACT POSTPONING THE OCTOBER 2020 BARANGAY AND SANGGUNIANG KABATAAN ELECTIONS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "number": 3316, "title": "AN ACT POSTPONING THE MAY 11, 2020 BARANGAY AND SANGGUNIANG KABATAAN ELECTIONS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "number": 3937, "title": "AN ACT POSTPONING THE MAY 2020 BARANGAY AND SANGGUNIANG KABATAAN ELECTIONS, FURTHER AMENDING FOR THE PURPOSE REPUBLIC AC", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "number": 3959, "title": "AN ACT POSTPONING THE MAY 2020 BARANGAY AND SANGGUNIANG KABATAAN ELECTIONS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 10", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "num e May 2020 synchronized Barangay and SK elections without specifying a firm new date.", "scores": {"P1": "Fail", "P2": "Fail", "P3": "N/A", "P4": "Pass", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Like mid 86, the absence of a firm rescheduled date creates an open-ended suspension of barangay democratic governance (P1 Fail, P2 Fail). Must be revised to include a specific election date, holdover conduct standards, and a COMELEC-certification trigger."}, {"mid": 90, "rep_title": "AN ACT PROVIDING FOR THE POSTPONMENT OF THE MAY 2020 SYNCHRONIZED BARANGAY AND SANGGUNIANG KABATAAN ELECTIONS, AMENDING", "n_bills": 1, "archetype": "Postpone / reset barangay & SK elections", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 2483, "title": "AN ACT PROVIDING FOR THE POSTPONMENT OF THE MAY 2020 SYNCHRONIZED BARANGAY AND SANGGUNIANG KABATAAN ELECTIONS, AMENDING", "decision": "REVISE / CALIBRATE"}], "proposes": "Provides for the postponement of the May 2020 synchronized Barangay and SK elections.", "scores": {"P1": "Fail", "P2": "Fail", "P3": "N/A", "P4": "Pass", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Framed as an enabling provision without a fixed new date, this carries the same core defects as mids 86 and 89 — indefinite deferral of barangay electoral accountability (P1 Fail) with no community voice (P2 Fail). Revision requires a firm target date and conduct safeguards."}, {"mid": 91, "rep_title": "AN ACT TO POSTPONE THE CONDUCT OF THE MAY 2020 BARANGAY AND SANGGUNIANG KABATAAN ELECTIONS, AMENDING FOR THE PURPOSE REP", "n_bills": 1, "archetype": "Postpone / reset barangay & SK elections", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 3268, "title": "AN ACT TO POSTPONE THE CONDUCT OF THE MAY 2020 BARANGAY AND SANGGUNIANG KABATAAN ELECTIONS, AMENDING FOR THE PURPOSE REP", "decision": "REVISE / CALIBRATE"}], "proposes": "Postpones the conduct of the May 2020 Barangay and SK elections.", "scores": {"P1": "Fail", "P2": "Fail", "P3": "N/A", "P4": "Pass", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Substantively identical to mids 86, 89, 90 — an open-ended postponement without a rescheduled date that suspends barangay self-governance indefinitely (P1 Fail, P2 Fail). Requires the same revisions: a specific rescheduled date, holdover rules, and health-readiness certification."}, {"mid": 92, "rep_title": "AN ACT POSTPONING THE MAY 2020 BARANGAY AND SANGGUNIANG KABATAAN ELECTIONS, AND FOR OTHER PURPOSES", "n_bills": 1, "archetype": "Postpone / reset barangay & SK elections", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 3515, "title": "AN ACT POSTPONING THE MAY 2020 BARANGAY AND SANGGUNIANG KABATAAN ELECTIONS, AND FOR OTHER PURPOSES", "decision": "REVISE / CALIBRATE"}], "proposes": "Postpones the May 2020 Barangay and SK elections (stand-alone act, not purely an LGC amendment).", "scores": {"P1": "Fail", "P2": "Fail", "P3": "N/A", "P4": "Pass", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Stand-alone framing ('and for other purposes') without a firm rescheduled date still produces the same P1 and P2 failures as companion bills. Revision must anchor a specific election date and provide interim holdover accountability standards."}, {"mid": 93, "rep_title": "AN ACT PROVIDING FOR THE POSTPONEMENT AND RESETTING OF THE BARANGAY AND SANGGUNIANG KABATAAN ELECTION AND FOR OTHER PURP", "n_bills": 1, "archetype": "Postpone / reset barangay & SK elections", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 3670, "title": "AN ACT PROVIDING FOR THE POSTPONEMENT AND RESETTING OF THE BARANGAY AND SANGGUNIANG KABATAAN ELECTION AND FOR OTHER PURP", "decision": "REVISE / CALIBRATE"}], "proposes": "Provides for postponement and resetting of Barangay and SK elections (broader reset framing).", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "N/A", "P4": "Pass", "P5": "Pass", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "'Resetting' language implies a firm new schedule is embedded, which is a marginal improvement over open-ended postponement bills, giving P1 and P2 Conditional rather than Fail. However, without confirmed dates and community-consultation provisions the autonomy and self-determination concerns persist. Revision should fix the reset date, add COMELEC readiness trigger, and specify holdover conduct rules."}, {"mid": 94, "rep_title": "AN ACT CHANGING THE TERM OF OFFICE OF ALL ELECTIVE BARANGAY OFFICIALS AND MEMBERS OF THE SANGGUNIANG KABATAAN FROM THREE", "n_bills": 9, "archetype": "Lengthen term of office of barangay/SK officials (3->5 yrs)", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 41, "title": "AN ACT CHANGING THE TERM OF OFFICE OF BARANGAY OFFICIALS AND MEMBERS OF THE SANGGUNIANG KABATAAN FROM THREE (3) TO FIVE", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "number": 180, "title": "AN ACT CHANGING THE TERM OF OFFICE OF BARANGAY OFFICIALS AND MEMBERS OF THE SANGGUNIANG KABATAAN FROM THREE (3) TO FIVE", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "number": 650, "title": "AN ACT CHANGING THE TERM OF OFFICE OF ALL ELECTIVE BARANGAY OFFICIALS AND MEMBERS OF THE SANGGUNIANG KABATAAN FROM THREE", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "number": 4567, "title": "AN ACT CHANGING THE TERM OF OFFICE OF ELECTIVE BARANGAY OFFICIALS AND MEMBERS OF THE SANGGUNIANG KABATAAN FROM THREE YEA", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "number": 8825, "title": "AN ACT CHANGING THE TERM OF OFFICE OF BARANGAY OFFICIALS AND MEMBERS OF THE SANGG ": "AN ACT CHANGING THE TERM OF OFFICE OF ALL BARANGAY OFFICIALS FROM THREE (3) YEARS TO FIVE (5) YEARS AND PROVIDING A SYST", "decision": "REVISE / CALIBRATE"}], "proposes": "Changes barangay officials' terms from 3 to 5 years and provides a system of accountability.", "scores": {"P1": "Conditional", "P2": "Fail", "P3": "N/A", "P4": "Pass", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "The addition of an accountability system partially mitigates the P5 concern (Conditional) and makes P1 Conditional rather than Fail, since there is at least a parallel performance framework. However, P2 still Fails because there is no demonstrated community or LGU demand for the longer term. Revision must: specify the accountability system's content and enforcement, require DILG monitoring, and include a recall or mid-term review safeguard."}, {"mid": 96, "rep_title": "AN ACT AMENDING SECTION 43 OF REPUBLIC ACT 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF THE PHILIPPINES BY INCR", "n_bills": 4, "archetype": "Lengthen term of office of barangay/SK officials (3->5 yrs)", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 3756, "title": "AN ACT AMENDING SECTION 43 OF REPUBLIC ACT 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF THE PHILIPPINES BY INCR", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 6758, "title": "AN ACT AMENDING SECTION 43 OF REPUBLIC ACT 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF THE PHILIPPINES BY INCR", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 7123, "title": "AN ACT AMENDING SECTION 43 OF REPUBLIC ACT 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF THE PHILIPPINES BY INCR", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 9629, "title": "AN ACT AMENDING SECTION 43 OF REPUBLIC ACT 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF THE PHILIPPINES BY INCR", "decision": "REVISE / CALIBRATE"}], "proposes": "Amends Section 43 of RA 7160 to increase the barangay term of office (3 to 5 years).", "scores": {"P1": "Fail", "P2": "Fail", "P3": "N/A", "P4": "Pass", "P5": "Fail", "P6": "Conditional"}, "decision": "REJECT / REFER", "rationale": "A bare Section 43 amendment with no accompanying accountability or community-voice mechanism is the weakest form of the term-extension bills. Same core failures as mid 94: P1 Fail (reduces democratic renewal cycles), P2 Fail (no community mandate), P5 Fail (removes an accountability checkpoint). Refer to electoral reform deliberations with a constitutional review requirement."}, {"mid": 97, "rep_title": "AN ACT INCREASING THE TERM OF OFFICE OF BARANGAY OFFICIALS FROM THREE (3) YEARS TO FIVE (5) YEARS THEREBY AMENDING SECTI", "n_bills": 1, "archetype": "Lengthen term of office of barangay/SK officials (3->5 yrs)", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 19, "number": 9434, "title": "AN ACT INCREASING THE TERM OF OFFICE OF BARANGAY OFFICIALS FROM THREE (3) YEARS TO FIVE (5) YEARS THEREBY AMENDING SECTI", "decision": "REVISE / CALIBRATE"}], "proposes": "Extends barangay officials' term from 3 to 5 years by amending Section 43 of RA 7160.", "scores": {"P1": "Conditional", "P2": "Fail", "P3": "N/A", "P4": "N/A", "P5": "Fail", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "P5 Fails because doubling the interval between elections weakens the community's most direct accountability mechanism over barangay officials, with no compensating recall or performance-audit provision. P2 Fails because the extension is imposed nationally with no evidence of barangay-level demand or community consultation. P1 is only Conditional — longer tenure may allow more program continuity but also insulates incumbents from voter pressure. P6 is Conditional pending COMELEC and SK synchronization provisions. The measure needs robust mid-term accountability safeguards and alignment with the SK term cycle before it can advance."}, {"mid": 98, "rep_title": "AN ACT CHANGING TERM OF BARANGAY OFFICIALS AND MEMBERS OF THE SANGGUNIANG KABATAAN FROM THREE (3) TO FIVE (5) YEARS, AME", "n_bills": 1, "archetype": "Lengthen term of office of barangay/SK officials (3->5 yrs)", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 19, "number": 9561, "title": "AN ACT CHANGING TERM OF BARANGAY OFFICIALS AND MEMBERS OF THE SANGGUNIANG KABATAAN FROM THREE (3) TO FIVE (5) YEARS, AME", "decision": "REVISE / CALIBRATE"}], "proposes": "Changes the term of barangay officials and SK members from 3 to 5 years, amending RA 7160.", "scores": {"P1": "Conditional", "P2": "Fail", "P3": "N/A", "P4": "N/A", "P5": "Fail", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Identical structural concerns as MID 97 but explicitly covers SK members, making the P5 accountability deficit broader (youth representation is also delayed). P2 Fails for the same reason — no demonstrated community or LGU-driven demand. P6 is Conditional because including SK brings the bill into tension with the Sangguniang Kabataan Reform Act; harmonization language is required. Revision must add mid-term performance review and genuine consultation with barangay constituencies."}, {"mid": 99, "rep_title": "AN ACT ESTABLISHING A FIVE (5) YEAR TERM OF OFFICE FOR ALL BARANGAY OFFICIALS THEREBY AMENDING SECTION 43 OF R.A. 7160,", "n_bills": 1, "archetype": "Lengthen term of office of barangay/SK officials (3->5 yrs)", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 19, "number": 9630, "title": "AN ACT ESTABLISHING A FIVE (5) YEAR TERM OF OFFICE FOR ALL BARANGAY OFFICIALS THEREBY AMENDING SECTION 43 OF R.A. 7160,", "decision": "REVISE / CALIBRATE"}], "proposes": "Establishes a 5-year term for all barangay officials by amending Section 43 of RA 7160.", "scores": {"P1": "Conditional", "P2": "Fail", "P3": "N/A", "P4": "N/A", "P5": "Fail", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Same findings as MID 97. The 'all barangay officials' framing is broad and makes P6 coordination with COMELEC election calendars more critical. Without a recall mechanism or mandatory barangay-level performance audit built into the bill, P5 remains a hard Fail. Revision should introduce participatory accountability tools to offset the reduced electoral frequency."}, {"mid": 100, "rep_title": "AN ACT CHANGING THE TERM OF OFFICE OF BARANGAY OFFICIALS, AMENDING FOR THE PURPOSE SECTION 43 OF REPUBLIC ACT NO. 7160,", "n_bills": 1, "archetype": "Lengthen term of office of barangay/SK officials (3->5 yrs)", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 19, "number": 10601, "title": "AN ACT CHANGING THE TERM OF OFFICE OF BARANGAY OFFICIALS, AMENDING FOR THE PURPOSE SECTION 43 OF REPUBLIC ACT NO. 7160,", "decision": "REVISE / CALIBRATE"}], "proposes": "Changes the term of office of barangay officials by amending Section 43 of RA 7160.", "scores": {"P1": "Conditional", "P2": "Fail", "P3": "N/A", "P4": "N/A", "P5": "Fail", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Functionally identical to MIDs 97 and 99. The title does not specify whether SK is included, leaving P6 ambiguity about synchronization. All core deficiencies remain: P5 Fails due to weakened voter recall frequency, P2 Fails due to absent community demand evidence. Calibration requires explicit accountability provisions and COMELEC schedule alignment."}, {"mid": 101, "rep_title": "AN ACT FIXING THE TERM OF OFFICE OF BARANGAY AND SANGGUNIANG KABATAAN OFFICIALS AND CHANGING THE PERM OF OFFICE FROM THR", "n_bills": 1, "archetype": "Lengthen term of office of barangay/SK officials (3->5 yrs)", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 19, "number": 11287, "title": "AN ACT FIXING THE TERM OF OFFICE OF BARANGAY AND SANGGUNIANG KABATAAN OFFICIALS AND CHANGING THE PERM OF OFFICE FROM THR", "decision": "REVISE / CALIBRATE"}], "proposes": "Fixes the term of barangay and SK officials, changing it from 3 to 5 years.", "scores": {"P1": "Conditional", "P2": "Fail", "P3": "N/A", "P4": "N/A", "P5": "Fail", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Covers both barangay and SK explicitly (same scope as MID 98). The P5 accountability gap is the binding constraint across all five term-extension bills. P2 Fails uniformly: a nationally imposed structural change without grassroots consultation does not reflect self-determination. P6 requires careful cross-referencing with the SK Reform Act and COMELEC scheduling rules. No bill in this cluster can advance without adding mid-term accountability mechanisms."}, {"mid": 102, "rep_title": "AN ACT STRENGTHENING THE PROCEDURE FOR REGISTRATION OF VOTERS DURING BARANGAY ELECTIONS, AMENDING FOR THE PURPOSE REPUBL", "n_bills": 1, "archetype": "Voter registration / electoral process for barangay", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 578, "title": "AN ACT STRENGTHENING THE PROCEDURE FOR REGISTRATION OF VOTERS DURING BARANGAY ELECTIONS, AMENDING FOR THE PURPOSE REPUBL", "decision": "REVISE / CALIBRATE"}], "proposes": "Strengthens voter registration procedures specifically for barangay elections by amending RA 7160.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Pass", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "The measure is sound in direction: tightening voter registration for barangay elections strengthens democratic participation (P1, P2), reinforces the most local electoral level (P3), and improves transparency and accountability (P5). It is coherent with COMELEC's mandate and existing electoral law (P6). P4 is Conditional because enhanced registration procedures may impose administrative and funding costs on LGUs or COMELEC without an explicit funding source or cost-sharing provision — this must be clarified to avoid an unfunded mandate. A budget/resource provision would allow ADOPT."}, {"mid": 103, "rep_title": "AN ACT WITHDRAWING THE INTERNAL REVENUE ALLOTMENT OF THE METROPOLITAN MANILA DEVELOPMENT AUTHORITY, AMENDING FOR THE PUR", "n_bills": 1, "archetype": "Increase / recompute LGU just share (IRA/NTA), incl. Mandanas codification", "theme": "Fiscal Transfers & PFM", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 413, "title": "AN ACT WITHDRAWING THE INTERNAL REVENUE ALLOTMENT OF THE METROPOLITAN MANILA DEVELOPMENT AUTHORITY, AMENDING FOR THE PUR", "decision": "REVISE / CALIBRATE"}], "proposes": "Withdraws MMDA's Internal Revenue Allotment share, redistributing it to LGUs, amending RA 7160.", "scores": {"P1": "Pass", "P2": "Conditional", "P3": "Conditional", "P4": "Conditional", "P5": "Conditional", "P6": "Fail"}, "decision": "REJECT / REFER", "rationale": "P6 is a hard Fail: MMDA is a national-government authority delivering metro-wide services (traffic, flood control, solid waste) across 17 LGUs; unilaterally withdrawing its IRA share without a replacement funding mechanism or devolution plan for its functions would destabilize metropolitan governance and create service gaps that individual LGUs cannot immediately absorb. P3 is Conditional — subsidiarity would support devolution of MMDA functions only if recipient LGUs demonstrably have the capacity. P4 is Conditional because the fiscal gain to LGUs is offset by unfunded metropolitan service obligations. The concept should be referred to a broader metropolitan governance reform framework, not handled as a standalone IRA amendment."}, {"mid": 104, "rep_title": "AN ACT INTENSIFYING LOCAL GOVERNMENT PARTICIPATION IN NATIONAL DEVELOPMENT BY INCREASING THE INTERNAL REVENUE ALLOTMENT", "n_bills": 1, "archetype": "Increase / recompute LGU just share (IRA/NTA), incl. Mandanas codification", "theme": "Fiscal Transfers & PFM", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 1247, "title": "AN ACT INTENSIFYING LOCAL GOVERNMENT PARTICIPATION IN NATIONAL DEVELOPMENT BY INCREASING THE INTERNAL REVENUE ALLOTMENT", "decision": "REVISE / CALIBRATE"}], "proposes": "Increases the IRA of LGUs to enhance local government participation in national development.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Pass", "P5": "Conditional", "P6": "Pass"}, "decision": "ADOPT", "rationale": "Increasing the LGU just share directly advances fiscal autonomy (P1), responds to longstanding LGU demand including the Mandanas SC ruling (P2), channels resources to the level responsible for devolved functions (P3), and addresses the structural underfunding of devolved mandates (P4). P6 is consistent with national development policy. P5 is Conditional only because the bill's title does not specify PFM/transparency safeguards accompanying the larger transfer — if the bill's body includes accountability provisions (which is typical of IRA reform bills in this cluster), the condition is easily met. Overall the measure is sound and aligns with ULAP's core fiscal justice advocacy."}, {"mid": 105, "rep_title": "AN ACT TO CLEARLY DEFINE THE NATIONAL TAXES REVENUE BASE AND ENHANCE THE JUST SHARE FROM THE NATIONAL TAXES OF LOCAL GOV", "n_bills": 1, "archetype": "Increase / recompute LGU just share (IRA/NTA), incl. Mandanas codification", "theme": "Fiscal Transfers & PFM", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 2619, "title": "AN ACT TO CLEARLY DEFINE THE NATIONAL TAXES REVENUE BASE AND ENHANCE THE JUST SHARE FROM THE NATIONAL TAXES OF LOCAL GOV", "decision": "REVISE / CALIBRATE"}], "proposes": "Clearly defines the national tax revenue base and enhances LGU just share from national taxes.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Pass", "P5": "Conditional", "P6": "Pass"}, "decision": "ADOPT", "rationale": "Defining the revenue base is the technical prerequisite for implementing the Mandanas ruling fully; it removes executive discretion in computing the just share and is thus a strong P1 and P4 measure. P2 Pass — codifying the SC ruling reflects the judicial and LGU consensus. P3 Pass — resources flow to the constitutionally assigned service-delivery level. P6 is coherent with the Constitution and SC jurisprudence. P5 is Conditional pending explicit audit/disclosure provisions in the bill body, but definitional clarity itself reduces information asymmetry. This is among the most technically sound bills in the cluster."}, {"mid": 106, "rep_title": "AN ACT PROVIDING FOR THE SHARE IN THE NATIONAL TAXES OF LOCAL GOVERNMENT UNITS, AMENDING FOR THIS PURPOSE REPUBLIC ACT N", "n_bills": 2, "archetype": "Increase / recompute LGU just share (IRA/NTA), incl. Mandanas codification", "theme": "Fiscal Transfers & PFM", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 3720, "title": "AN ACT PROVIDING FOR THE SHARE IN THE NATIONAL TAXES OF LOCAL GOVERNMENT UNITS, AMENDING FOR THIS PURPOSE REPUBLIC ACT N", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 4786, "title": "AN ACT PROVIDING FOR THE SHARE IN THE NATIONAL TAXES OF LOCAL GOVERNMENT UNITS, AMENDING FOR THIS PURPOSE REPUBLIC ACT N", "decision": "REVISE / CALIBRATE"}], "proposes": "Provides for LGU share in national taxes by amending RA 7160.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Pass", "P5": "Conditional", "P6": "Pass"}, "decision": "ADOPT", "rationale": "Broadly similar to MIDs 104 and 105 — restructuring the national tax share for LGUs advances all fiscal-autonomy principles. P5 is Conditional because the title alone does not reveal whether PFM safeguards or performance conditions attach to the increased share. If the bill body includes accountability mechanisms (budget disclosure, audit linkage), the condition resolves to Pass. Adopting with a recommendation to embed transparency provisions in the implementing rules."}, {"mid": 107, "rep_title": "AN ACT CREATING A MANDATORY FREE SOUP KITCHEN ALLOCATING 3% OF THE INTERNAL REVENUE ALLOTMENT FOR EVERY IMPOVERISHED BAR", "n_bills": 1, "archetype": "Increase / recompute LGU just share (IRA/NTA), incl. Mandanas codification", "theme": "Fiscal Transfers & PFM", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 5564, "title": "AN ACT CREATING A MANDATORY FREE SOUP KITCHEN ALLOCATING 3% OF THE INTERNAL REVENUE ALLOTMENT FOR EVERY IMPOVERISHED BAR", "decision": "REVISE / CALIBRATE"}], "proposes": "Creates a mandatory free soup kitchen program allocating 3% of IRA for impoverished barangays.", "scores": {"P1": "Fail", "P2": "Fail", "P3": "Conditional", "P4": "Fail", "P5": "Conditional", "P6": "Conditional"}, "decision": "REJECT / REFER", "rationale": "P4 is a hard Fail: earmarking 3% of IRA for a single nationally prescribed program is a textbook unfunded mandate — it reduces LGU discretionary funds without providing additional revenue, contradicting the just-share principle. P1 Fails because mandatory earmarking of a significant IRA fraction directly curtails fiscal autonomy. P2 Fails because the program is centrally mandated with no LGU or community choice in design or participation. P3 is Conditional at best — soup kitchens are appropriately local but the mandate removes LGU discretion to prioritize based on local context. The social welfare objective is legitimate but should be pursued through a national program with dedicated national appropriations or as an optional LGU program under the LGSF, not as an IRA earmark. Refer to the Committee on Social Services with instruction to use national budget appropriations instead."}, {"mid": 108, "rep_title": "AN ACT MANDATING LOCAL GOVERNMENT UNITS WITH INDIGENOUS CULTURAL COMMUNITIES OR INDIGENOUS PEOPLES TO APPROPRIATE ONE PE", "n_bills": 1, "archetype": "Increase / recompute LGU just share (IRA/NTA), incl. Mandanas codification", "theme": "Fiscal Transfers & PFM", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 6999, "title": "AN ACT MANDATING LOCAL GOVERNMENT UNITS WITH INDIGENOUS CULTURAL COMMUNITIES OR INDIGENOUS PEOPLES TO APPROPRIATE ONE PE", "decision": "REVISE / CALIBRATE"}], "proposes": "Mandates LGUs with ICC/IP communities to appropriate 1% of IRA for indigenous peoples' welfare.", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "Pass", "P4": "Conditional", "P5": "Conditional", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "The policy goal — ensuring LGUs serve ICC/IP communities — aligns with IPRA and the Constitution (P6 Pass, P3 Pass). However, P1 and P4 are Conditional: a mandatory 1% IRA earmark reduces discretionary fiscal space without a compensating national transfer, risking an unfunded mandate for LGUs that have large ICC/IP populations and correspondingly stretched budgets. P2 is Conditional because the earmark should be designed with genuine Free, Prior and Informed Consent (FPIC) mechanisms rather than a top-down allocation. P5 is Conditional pending requirements for ICC/IP participation in budget planning and expenditure reporting. Revision should: (a) scope the 1% as a floor matched by a national co-funding mechanism; (b) require FPIC-based participatory budgeting; and (c) mandate public disclosure of ICC/IP fund utilization."}, {"mid": 109, "rep_title": "AN ACT PROVIDING FOR A JUST AND EQUAL SHARE IN THE INTERNAL REVENUE ALLOTMENT FOR BARANGAYS CREATED BY LOCAL GOVERNMENT", "n_bills": 2, "archetype": "Increase / recompute LGU just share (IRA/NTA), incl. Mandanas codification", "theme": "Fiscal Transfers & PFM", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 9028, "title": "AN ACT PROVIDING FOR A JUST AND EQUAL SHARE IN THE INTERNAL REVENUE ALLOTMENT FOR BARANGAYS CREATED BY LOCAL GOVERNMENT", "decision": "REVISE / CALIBRATE"}, {"congress": 20, "number": 794, "title": "AN ACT PROVIDING FOR A JUST AND EQUAL SHARE IN THE INTERNAL REVENUE ALLOTMENT FOR BARANGAYS CREATED BY LOCAL GOVERNMENT", "decision": "REVISE / CALIBRATE"}], "proposes": "Grants newly-created barangays a just and equal share in the IRA/NTA.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "The equity goal (P1, P2, P3) is sound — newly-created barangays are currently underserved — but adding new barangay recipients without expanding the total IRA pool redistributes shares away from existing LGUs, creating a fiscal zero-sum problem (P4). The bill needs a revenue-neutral mechanism (e.g., incremental NTA growth or a separate allocation window) and transparent eligibility criteria for 'newly-created' status (P5, P6) before adoption."}, {"mid": 110, "rep_title": "AN ACT MANDATING LOCAL GOVERNMENT UNITS TO SET ASIDE AT LEAST FIFTEEN PERCENT OF THEIR ANNUAL INTERNAL REVENUE ALLOTMENT", "n_bills": 1, "archetype": "Increase / recompute LGU just share (IRA/NTA), incl. Mandanas codification", "theme": "Fiscal Transfers & PFM", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 9204, "title": "AN ACT MANDATING LOCAL GOVERNMENT UNITS TO SET ASIDE AT LEAST FIFTEEN PERCENT OF THEIR ANNUAL INTERNAL REVENUE ALLOTMENT", "decision": "REVISE / CALIBRATE"}], "proposes": "Mandates LGUs to set aside at least 15% of their annual IRA for a specified purpose.", "scores": {"P1": "Fail", "P2": "Fail", "P3": "Conditional", "P4": "Conditional", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Earmarking 15% of the IRA contradicts P1 and P2 by reducing LGU budget discretion and overriding locally-determined priorities — the core tension of mandated set-asides. While the accountability intent is plausible (P5), the measure creates a de facto unfunded constraint on general operations (P4). Revision should convert the mandate into an incentive-based or floor-guarantee mechanism, with LGU flexibility on deployment and strong reporting requirements."}, {"mid": 111, "rep_title": "AN ACT STRENGTHENING LOCAL GOVERNMENT PARTICIPATION IN AGRICULTURE DEVELOPMENT BY INSTITUTIONALIZING A TEN PERCENT (10%)", "n_bills": 1, "archetype": "Increase / recompute LGU just share (IRA/NTA), incl. Mandanas codification", "theme": "Fiscal Transfers & PFM", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 9844, "title": "AN ACT STRENGTHENING LOCAL GOVERNMENT PARTICIPATION IN AGRICULTURE DEVELOPMENT BY INSTITUTIONALIZING A TEN PERCENT (10%)", "decision": "REVISE / CALIBRATE"}], "proposes": "Institutionalizes a 10% IRA set-aside for LGU participation in agriculture development.", "scores": {"P1": "Fail", "P2": "Fail", "P3": "Pass", "P4": "Conditional", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Agriculture is appropriately local (P3), but a statutory 10% earmark overrides local budget authority (P1) and ignores that non-agricultural LGUs (urban, island, industrial) have no legitimate demand for this set-aside (P2). Unless the mandate is limited to LGUs with significant agricultural land and paired with performance indicators and national co-financing, it imposes an unfunded operational constraint (P4). Recommend sector-targeted incentive matching rather than a blanket earmark."}, {"mid": 112, "rep_title": "AN ACT REQUIRING LOCAL GOVERNMENT UNITS TO EARMARK AT LEAST FIFTEEN PERCENT (15%) OF THEIR NATIONAL TAX ALLOTMENT SHARE", "n_bills": 6, "archetype": "Increase / recompute LGU just share (IRA/NTA), incl. Mandanas codification", "theme": "Fiscal Transfers & PFM", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 19, "number": 286, "title": "AN ACT REQUIRING LOCAL GOVERNMENT UNITS TO EARMARK AT LEAST FIFTEEN PERCENT (15%) OF THEIR NATIONAL TAX ALLOTMENT SHARE", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 1667, "title": "AN ACT REQUIRING LOCAL GOVERNMENT UNITS TO EARMARK AT LEAST FIFTEEN PERCENT (15%) OF THEIR NATIONAL TAX ALLOTMENT SHARE", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 3069, "title": "AN ACT REQUIRING LOCAL GOVERNMENT UNITS TO EARMARK AT LEAST FIFTEEN PERCENT (15%) OF THEIR NATIONAL TAX ALLOTMENT SHARE", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 4833, "title": "AN ACT REQUIRING LOCAL GOVERNMENT UNITS TO EARMARK AT LEAST FIFTEEN PERCENT (15%) OF THEIR NATIONAL TAX ALLOTMENT SHARE", "decision": "REVISE / CALIBRATE"}, {"congress": 20, "number": 1527, "title": "AN ACT REQUIRING LOCAL GOVERNMENT UNITS TO EARMARK AT LEAST FIFTEEN PERCENT (15%) OF THEIR NATIONAL TAX ALLOTMENT SHARE", "decision": "REVISE / CALIBRATE"}, {"congress": 20, "number": 3953, "title": "AN ACT REQUIRING LOCAL GOVERNMENT UNITS TO EARMARK AT LEAST FIFTEEN PERCENT (15%) OF THEIR NATIONAL TAX ALLOTMENT SHARE", "decision": "REVISE / CALIBRATE"}], "proposes": "Requires LGUs to earmark at least 15% of their NTA share for a designated purpose.", "scores": {"P1": "Fail", "P2": "Fail", "P3": "Conditional", "P4": "Conditional", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Substantively identical in form to mid 110 — a national statutory earmark on NTA undermines fiscal autonomy (P1) and local prioritization (P2). The 15% level is high enough to meaningfully constrain budgets of smaller LGUs, risking an unfunded squeeze on other mandated services (P4). Revision must introduce flexibility (priority-based targeting, matching grant design) and robust disclosure requirements (P5) to remain coherent with devolution goals (P6)."}, {"mid": 113, "rep_title": "AN ACT AMENDING SECTION 285 0F REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE \"LOCAL GOVERNMENT CODE OF 1991\", AS AMENDED", "n_bills": 5, "archetype": "Increase / recompute LGU just share (IRA/NTA), incl. Mandanas codification", "theme": "Fiscal Transfers & PFM", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 19, "number": 6102, "title": "AN ACT AMENDING SECTION 285 0F REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE \"LOCAL GOVERNMENT CODE OF 1991\", AS AMENDED", "decision": "REVISE / CALIBRATE"}, {"congress": 20, "number": 2847, "title": "AN ACT AMENDING SECTION 285 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE “LOCAL GOVERNMENT CODE OF 1991”, AS AMENDED", "decision": "REVISE / CALIBRATE"}, {"congress": 20, "number": 3779, "title": "AN ACT AMENDING SECTION 285 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE \"LOCAL GOVERNMENT CODE OF 1991\", AS AMENDED", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "number": 8428, "title": "AN ACT AMENDING SECTION 140 (A) OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS “THE LOCAL GOVERNMENT CODE OF 1991”, AS AME", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 6346, "title": "AN ACT AMENDING SECTION 482 OF REPUBLIC ACT NO. 7160, AS AMENDED, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991", "decision": "REVISE / CALIBRATE"}], "proposes": "Amends Section 285 of RA 7160 to revise the IRA allocation formula among LGU tiers.", "scores": {"P1": "Pass", "P2": "Conditional", "P3": "Conditional", "P4": "Conditional", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Amending the inter-tier allocation formula (provinces/cities/municipalities/barangays) is a legitimate exercise in fiscal justice (P1) but the specific redistributive effect depends entirely on how shares shift — winners and losers among LGU classes are unknown from the title alone. The measure must be accompanied by fiscal-impact modeling, a transition period for losing tiers (P4), consultation with all LGU leagues (P2), and a coherence check against Mandanas/NTA reforms already underway (P6). Conditional across most tests pending details."}, {"mid": 114, "rep_title": "AN ACT STRENGTHENING LOCAL GOVERNMENT PARTICIPATION IN AGRICULTURAL DEVELOPMENT BY INSTITUTIONALIZING A MINIMUM OF TEN P", "n_bills": 1, "archetype": "Increase / recompute LGU just share (IRA/NTA), incl. Mandanas codification", "theme": "Fiscal Transfers & PFM", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 19, "number": 7597, "title": "AN ACT STRENGTHENING LOCAL GOVERNMENT PARTICIPATION IN AGRICULTURAL DEVELOPMENT BY INSTITUTIONALIZING A MINIMUM OF TEN P", "decision": "REVISE / CALIBRATE"}], "proposes": "Institutionalizes a minimum 10% IRA/NTA set-aside for agricultural development at the LGU level.", "scores": {"P1": "Fail", "P2": "Fail", "P3": "Pass", "P4": "Conditional", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Near-identical to mid 111 with 'minimum' language added — the direction (LGU-led agriculture) supports subsidiarity (P3) but the blanket mandate overrides local budget authority (P1) and ignores context-specific demand, particularly for heavily urbanized LGUs (P2). The 'minimum' qualifier worsens fiscal risk for small LGUs already stretched thin (P4). Same revision path applies: replace with a conditional matching-grant or incentive framework tied to agricultural classification and performance metrics."}, {"mid": 115, "rep_title": "AN ACT REFORMING THE SHARE OF LOCAL GOVERNMENT UNITS IN THE INTERNAL REVENUE ALLOTMENT, AND FOR OTHER PURPOSES", "n_bills": 1, "archetype": "Increase / recompute LGU just share (IRA/NTA), incl. Mandanas codification", "theme": "Fiscal Transfers & PFM", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 19, "number": 11121, "title": "AN ACT REFORMING THE SHARE OF LOCAL GOVERNMENT UNITS IN THE INTERNAL REVENUE ALLOTMENT, AND FOR OTHER PURPOSES", "decision": "REVISE / CALIBRATE"}], "proposes": "Reforms the overall IRA share of LGUs, potentially increasing or restructuring the total allotment.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "A comprehensive IRA reform aligned with Mandanas-era NTA expansion is directionally sound for all autonomy and subsidiarity principles (P1–P3) and directly addresses fiscal justice (P4) if the total share increases. The main conditions are: fiscal sustainability at the national level must be demonstrated (P4); enhanced transparency in computation and release mechanics must be legislated (P5); and the reform must be coherent with pending NTA implementing rules and the DBM's transition framework (P6). Well-drafted, this is the strongest candidate in this cluster."}, {"mid": 116, "rep_title": "AN ACT PROVIDING FOR THE DIRECT REMITTANCE TO THE HOST LOCAL GOVERNMENT OF ITS FORTY PERCENT SHARE (40%) OF THE PROCEEDS", "n_bills": 4, "archetype": "Direct 40% national-wealth share remittance to host LGUs", "theme": "Fiscal Transfers & PFM", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 1613, "title": "AN ACT PROVIDING FOR THE DIRECT REMITTANCE TO THE HOST LOCAL GOVERNMENT OF ITS FORTY PERCENT SHARE (40%) OF THE PROCEEDS", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "number": 2768, "title": "AN ACT PROVIDING FOR THE DIRECT REMITTANCE TO THE HOST LOCAL GOVERNMENT OF ITS FORTY PERCENT (40%) SHARE OF THE PROCEEDS", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "number": 3420, "title": "AN ACT PROVIDING FOR THE DIRECT REMITTANCE TO THE HOST LOCAL GOVERNMENT OF ITS FORTY PERCENT (40%) SHARE OF THE PROCEEDS", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 5335, "title": "AN ACT PROVIDING FOR THE DIRECT REMITTANCE TO THE HOST LOCAL GOVERNMENT OF ITS FORTY PERCENT (40%) SHARE OF THE PROCEEDS", "decision": "REVISE / CALIBRATE"}], "proposes": "Provides for direct remittance to host LGUs of their 40% share of proceeds from national wealth exploitation.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Pass", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Direct remittance eliminates national-government intermediation and is strongly consistent with P1–P4: LGUs already own this 40% share by statute; routing it directly is a fiscal justice correction. The conditions are on P5 — audit, utilization reporting, and anti-capture safeguards must accompany direct release — and P6 — the remittance mechanism must dovetail with DENR/MGB/DOE regulatory frameworks to avoid conflicting claims. Minor revisions on accountability mechanics would lift this to ADOPT."}, {"mid": 117, "rep_title": "AN ACT PROVIDING THE DIRECT REMITTANCE TO THE HOST LOCAL GOVERNMENT UNITS OF THEIR FORTY PERCENT (40%) SHARE DERIVED FRO", "n_bills": 2, "archetype": "Direct 40% national-wealth share remittance to host LGUs", "theme": "Fiscal Transfers & PFM", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 4533, "title": "AN ACT PROVIDING THE DIRECT REMITTANCE TO THE HOST LOCAL GOVERNMENT UNITS OF THEIR FORTY PERCENT (40%) SHARE DERIVED FRO", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 3186, "title": "AN ACT PROVIDING THE DIRECT REMITTANCE TO THE HOST LOCAL GOVERNMENT UNITS OF THEIR FORTY PERCENT (40%) SHARE DERIVED FRO", "decision": "REVISE / CALIBRATE"}], "proposes": "Provides direct remittance to host LGUs of their 40% share derived from national wealth (broader natural resource scope).", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Pass", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Substantially the same as mid 116 — the 40% direct-remittance principle is sound across P1–P4. The broader scope ('derived from' language) may cover a wider range of national wealth streams, which strengthens P4 but raises potential definitional ambiguity (P6) about which revenue types are covered. Same conditions apply: robust utilization and disclosure requirements (P5), and clarity on which extractive/energy revenues are covered to ensure coherence with sector laws (P6)."}, {"mid": 118, "rep_title": "AN ACT TO ENHANCE THE USE OF NATIONAL WEALTH FOR LOCAL DEVELOPMENT BY AMENDING CERTAIN PROVISIONS IN BOOK II OF REPUBLIC", "n_bills": 2, "archetype": "Direct 40% national-wealth share remittance to host LGUs", "theme": "Fiscal Transfers & PFM", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 6784, "title": "AN ACT TO ENHANCE THE USE OF NATIONAL WEALTH FOR LOCAL DEVELOPMENT BY AMENDING CERTAIN PROVISIONS IN BOOK II OF REPUBLIC", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "number": 6883, "title": "AN ACT TO ENHANCE THE USE OF NATIONAL WEALTH FOR LOCAL DEVELOPMENT BY AMENDING CERTAIN PROVISIONS IN BOOK II OF REPUBLIC", "decision": "REVISE / CALIBRATE"}], "proposes": "Amends Book II of RA 7160 to enhance use of national wealth proceeds for local development, revising relevant sections.", "scores": {"P1": "Pass", "P2": "Conditional", "P3": "Pass", "P4": "Conditional", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Amending Book II provisions (national wealth sharing) for local development is broadly aligned with autonomy and subsidiarity (P1, P3). However, revising 'certain provisions' without specificity raises risk of unintended changes to existing LGU entitlements or administrative mechanics (P4), potentially shifting costs or creating implementation gaps. Community and LGU league consultation is implied but not guaranteed (P2). Detailed fiscal-impact analysis and inter-agency coordination provisions (P5, P6) are required conditions before adoption."}, {"mid": 119, "rep_title": "AN ACT TO AMEND THE SECTION 294 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE, AS AMENDED, TO A", "n_bills": 1, "archetype": "Direct 40% national-wealth share remittance to host LGUs", "theme": "Fiscal Transfers & PFM", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 7035, "title": "AN ACT TO AMEND THE SECTION 294 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE, AS AMENDED, TO A", "decision": "REVISE / CALIBRATE"}], "proposes": "Amends Section 294 of RA 7160 to adjust the LGU share from national wealth (specific provision revision).", "scores": {"P1": "Pass", "P2": "Conditional", "P3": "Pass", "P4": "Conditional", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Amending Section 294 (which governs the share of LGUs in national wealth) is the most surgical of the national-wealth cluster, which is a point in its favor (P1, P3). The adjustment's direction and magnitude are unknown from the title, so fiscal impact assessment is a prerequisite (P4). If the amendment increases the share or improves remittance mechanics, P4 improves; if it imposes new conditions, it risks regression. Consultation with host LGUs and affected industries (P2) and coherence with DENR/mining/energy frameworks (P6) are mandatory conditions."}, {"mid": 120, "rep_title": "AN ACT AMENDING SECTIONS 284 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS \\\"HEALTH ALLOCATION ACT OF 2019\\\".", "n_bills": 1, "archetype": "Revise NTA allocation formula / add equalization / development fund", "theme": "Fiscal Transfers & PFM", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 4411, "title": "AN ACT AMENDING SECTIONS 284 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS \\\"HEALTH ALLOCATION ACT OF 2019\\\".", "decision": "REVISE / CALIBRATE"}], "proposes": "Amends Section 284 of RA 7160 under a 'Health Allocation Act of 2019' framing, revising NTA base or health-earmark provisions.", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "Pass", "P4": "Conditional", "P5": "Conditional", "P6": "Fail"}, "decision": "REVISE / CALIBRATE", "rationale": "The title references the 'Health Allocation Act of 2019' while amending Section 284 of RA 7160 (IRA base computation) — a coherence problem (P6 Fail) because the bill appears to conflate two distinct legal regimes. Health devolution is a legitimate local function (P3), but constraining Section 284 through a health-specific lens risks distorting the general IRA formula in ways that disadvantage non-health-priority LGUs (P1 Conditional, P4 Conditional). The bill must be disentangled: health-earmark provisions belong in a separate health financing law, not an amendment to the base NTA computation section."}, {"mid": 121, "rep_title": "AN ACT REVERTING TO THE NATIONAL GOVERNMENT THE DISCHARGE OF BASIC HEALTH SERVICES DEVOLVED TO LOCAL GOVERNMENT UNITS (L", "n_bills": 4, "archetype": "Revert devolved (agriculture/other) functions to national government", "theme": "Service Delivery & Devolution", "sheet_decision": "REJECT / REFER", "member_bills": [{"congress": 18, "number": 627, "title": "AN ACT REVERTING TO THE NATIONAL GOVERNMENT THE DISCHARGE OF BASIC HEALTH SERVICES DEVOLVED TO LOCAL GOVERNMENT UNITS (L", "decision": "REJECT / REFER"}, {"congress": 18, "number": 3236, "title": "AN ACT REVERTING TO THE NATIONAL GOVERNMENT THE DISCHARGE OF BASIC HEALTH SERVICES DEVOLVED TO LOCAL GOVERNMENT UNITS (L", "decision": "REJECT / REFER"}, {"congress": 18, "number": 3522, "title": "AN ACT REVERTING TO THE NATIONAL GOVERNMENT THE DISCHARGE OF BASIC HEALTH SERVICES DEVOLVED TO LOCAL GOVERNMENT UNITS (L", "decision": "REJECT / REFER"}, {"congress": 19, "number": 3649, "title": "AN ACT REVERTING TO THE NATIONAL GOVERNMENT THE DISCHARGE OF BASIC HEALTH SERVICES DEVOLVED TO LOCAL GOVERNMENT UNITS, A", "decision": "REJECT / REFER"}], "proposes": "Reverts devolved basic health services from LGUs back to the national government.", "scores": {"P1": "Fail", "P2": "Fail", "P3": "Fail", "P4": "Conditional", "P5": "Conditional", "P6": "Conditional"}, "decision": "REJECT / REFER", "rationale": "Directly contradicts P1 (strips autonomy), P2 (unilateral national recentralization without LGU consent), and P3 (removes health function from the local level where it is deliverable). Even if national financing is clarified, the structural rollback of devolution is irreconcilable with the LGC's core architecture and belongs in a separate health-sector law, not an LGC amendment."}, {"mid": 122, "rep_title": "AN ACT REVERTING TO THE NATIONAL GOVERNMENT THE DISCHARGE OF BASIC AGRICULTURAL FUNCTIONS AND RESPONSIBILITIES DEVOLVED", "n_bills": 6, "archetype": "Revert devolved (agriculture/other) functions to national government", "theme": "Service Delivery & Devolution", "sheet_decision": "REJECT / REFER", "member_bills": [{"congress": 18, "number": 3235, "title": "AN ACT REVERTING TO THE NATIONAL GOVERNMENT THE DISCHARGE OF BASIC AGRICULTURAL FUNCTIONS AND RESPONSIBILITIES DEVOLVED", "decision": "REJECT / REFER"}, {"congress": 18, "number": 3827, "title": "AN ACT REVERTING TO THE NATIONAL GOVERNMENT THE DISCHARGE OF BASIC AGRICULTURAL FUNCTIONS AND RESPONSIBILITIES DEVOLVED", "decision": "REJECT / REFER"}, {"congress": 18, "number": 4027, "title": "AN ACT REVERTING TO THE NATIONAL GOVERNMENT THE DISCHARGE OF BASIC AGRICULTURAL FUNCTIONS AND RESPONSIBILITIES DEVOLVED", "decision": "REJECT / REFER"}, {"congress": 19, "number": 2712, "title": "AN ACT REVERTING TO THE NATIONAL GOVERNMENT THE DISCHARGE OF BASIC AGRICULTURAL FUNCTIONS AND RESPONSIBILITIES DEVOLVED", "decision": "REJECT / REFER"}, {"congress": 19, "number": 7863, "title": "AN ACT REVERTING TO THE NATIONAL GOVERNMENT THE DISCHARGE OF BASIC AGRICULTURAL FUNCTIONS AND RESPONSIBILITIES DEVOLVED", "decision": "REJECT / REFER"}, {"congress": 20, "number": 2145, "title": "AN ACT REVERTING TO THE NATIONAL GOVERNMENT THE DISCHARGE OF BASIC AGRICULTURAL FUNCTIONS AND RESPONSIBILITIES DEVOLVED", "decision": "REJECT / REFER"}], "proposes": "Reverts devolved basic agricultural functions and responsibilities from LGUs back to the national government.", "scores": {"P1": "Fail", "P2": "Fail", "P3": "Fail", "P4": "Conditional", "P5": "Conditional", "P6": "Conditional"}, "decision": "REJECT / REFER", "rationale": "Mirrors mid 121: strips local autonomy (P1), overrides LGU and community self-determination (P2), and violates subsidiarity by pulling an inherently local function upward to the national level (P3). Fiscal relief does not offset the fundamental reversal of devolution; refer to agriculture-sector legislation instead."}, {"mid": 123, "rep_title": "AN ACT TO STRENGTHEN, MODERNIZE AND PROFESSIONALIZE THE AGRICULTURAL SERVICES OF THE LOCAL GOVERNMENT UNITS, AMENDING PR", "n_bills": 5, "archetype": "Strengthen/professionalize local sector services (health/agri/DRRM)", "theme": "Service Delivery & Devolution", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 4136, "title": "AN ACT TO STRENGTHEN, MODERNIZE AND PROFESSIONALIZE THE AGRICULTURAL SERVICES OF THE LOCAL GOVERNMENT UNITS, AMENDING PR", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "number": 4881, "title": "AN ACT TO STRENGTHEN, MODERNIZE AND PROFESSIONALIZE THE AGRICULTURAL SERVICES OF THE LOCAL GOVERNMENT UNITS, AMENDING FO", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 4495, "title": "AN ACT TO STRENGTHEN, MODERNIZE AND PROFESSIONALIZE THE AGRICULTURAL SERVICES OF LOCAL GOVERNMENT UNITS, AMENDING PROVIS", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 8851, "title": "AN ACT TO STRENGTHEN, MODERNIZE AND PROFESSIONALIZE THE AGRICULTURAL SERVICES OF THE LOCAL GOVERNMENT UNITS, AMENDING FO", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 8978, "title": "AN ACT TO STRENGTHEN, MODERNIZE AND PROFESSIONALIZE THE AGRICULTURAL SERVICES OF THE LOCAL GOVERNMENT UNITS, AMENDING FO", "decision": "REVISE / CALIBRATE"}], "proposes": "Strengthens, modernizes, and professionalizes agricultural services of LGUs by amending the LGC.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Pass", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "Sound in direction — keeps agriculture devolved while raising service quality, consistent with P1–P3, P5–P6. The critical fix needed is P4: the bill must pair professionalization mandates (training standards, personnel requirements) with dedicated national support funding or adjusted IRA shares to avoid creating an unfunded mandate on smaller LGUs."}, {"mid": 124, "rep_title": "AN ACT AUTHORIZING THE PUNONG BARANGAY AND THE CITY OR MUNICIPAL MAYOR TO REMOVE ILLEGAL DWELLING UNITS OR STRUCTURES FR", "n_bills": 1, "archetype": "Local housing boards / shelter governance", "theme": "Service Delivery & Devolution", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 2332, "title": "AN ACT AUTHORIZING THE PUNONG BARANGAY AND THE CITY OR MUNICIPAL MAYOR TO REMOVE ILLEGAL DWELLING UNITS OR STRUCTURES FR", "decision": "REVISE / CALIBRATE"}], "proposes": "Authorizes the Punong Barangay and City/Municipal Mayor to remove illegal dwelling units or structures.", "scores": {"P1": "Pass", "P2": "Conditional", "P3": "Pass", "P4": "Conditional", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Devolving enforcement power to local executives aligns with P1 and P3. However, P2 requires community consultation safeguards before demolition; P4 must address relocation costs which LGUs may not be able to fund alone; P5 needs due-process and disclosure requirements; and P6 must align with UDHA and NHA frameworks. Revise to embed procedural due process, relocation funding mechanisms, and consistency with national urban poor law."}, {"mid": 125, "rep_title": "AN ACT INSTITUTIONALIZING THE CREATION OF LOCAL HOUSING BOARDS IN ALL LOCAL GOVERNMENT UNITS, PROVIDING FOR ITS POWERS A", "n_bills": 1, "archetype": "Local housing boards / shelter governance", "theme": "Service Delivery & Devolution", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 19, "number": 5404, "title": "AN ACT INSTITUTIONALIZING THE CREATION OF LOCAL HOUSING BOARDS IN ALL LOCAL GOVERNMENT UNITS, PROVIDING FOR ITS POWERS A", "decision": "REVISE / CALIBRATE"}], "proposes": "Institutionalizes the creation of Local Housing Boards in all LGUs with defined powers and functions.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Pass", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Creating local housing governance structures is consistent with P1, P2, and P3, and the board model supports P5 accountability. P4 is conditional because mandatory board creation imposes operational costs without guaranteed funding for smaller LGUs. P6 needs alignment with HLURB/DHSUD mandates to avoid jurisdictional conflict. Revise to provide flexible capitalization options and harmonize with national housing agency functions."}, {"mid": 126, "rep_title": "AN ACT TO ENHANCE INTER-LGU COOPERATION BY AMENDING CERTAIN PROVISIONS IN BOOK I OF REPUBLIC ACT NO. 7160, OTHERWISE KNO", "n_bills": 1, "archetype": "Inter-LGU cooperation / alliances / metro arrangements", "theme": "Autonomy & Intergovernmental Relations", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 6880, "title": "AN ACT TO ENHANCE INTER-LGU COOPERATION BY AMENDING CERTAIN PROVISIONS IN BOOK I OF REPUBLIC ACT NO. 7160, OTHERWISE KNO", "decision": "REVISE / CALIBRATE"}], "proposes": "Enhances inter-LGU cooperation by amending Book I of RA 7160.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Pass", "P5": "Conditional", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "Strengthening inter-LGU cooperation is well-aligned with P1–P4 and P6 — it expands local capacity without recentralizing. P5 is conditional: joint arrangements must include clear accountability mechanisms (shared
