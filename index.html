 auditing, reporting, performance metrics) to prevent governance gaps in multi-LGU bodies. Revise to require transparency and accountability provisions for cooperative entities."}, {"mid": 127, "rep_title": "AN ACT RECLASSIFYING A CERTAIN PARCEL OF LAND IN BARANGAY TALALANG IN THE MUNICIPALITY OF BALBALAN, PROVINCE OF KALINGA", "n_bills": 1, "archetype": "Restrict/condition reclassification & conversion of agricultural land", "theme": "LGU Creation, Boundaries & Land", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 589, "title": "AN ACT RECLASSIFYING A CERTAIN PARCEL OF LAND IN BARANGAY TALALANG IN THE MUNICIPALITY OF BALBALAN, PROVINCE OF KALINGA", "decision": "REVISE / CALIBRATE"}], "proposes": "Reclassifies a specific parcel of land in Barangay Talalang, Balbalan, Kalinga.", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "Conditional", "P4": "N/A", "P5": "Conditional", "P6": "Conditional"}, "decision": "REJECT / REFER", "rationale": "A site-specific reclassification enacted by national Congress bypasses the LGU's own land-use planning authority (P1, P3), may not reflect community determination (P2), lacks transparent rationale on record (P5), and sets a precedent of congressional micromanagement of local land use inconsistent with the LGC framework (P6). This matter belongs in local zoning or HLURB/DHSUD processes, not national legislation."}, {"mid": 128, "rep_title": "AN ACT RECLASSIFYING AS AGRICULTURAL LAND OPEN TO DISPOSITION UNDER THE PROVISIONS OF THE PUBLIC LAND ACT, AS AMENDED, T", "n_bills": 1, "archetype": "Restrict/condition reclassification & conversion of agricultural land", "theme": "LGU Creation, Boundaries & Land", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 1063, "title": "AN ACT RECLASSIFYING AS AGRICULTURAL LAND OPEN TO DISPOSITION UNDER THE PROVISIONS OF THE PUBLIC LAND ACT, AS AMENDED, T", "decision": "REVISE / CALIBRATE"}], "proposes": "Reclassifies specific forestland parcels as agricultural land open to disposition under the Public Land Act.", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "Conditional", "P4": "N/A", "P5": "Conditional", "P6": "Fail"}, "decision": "REJECT / REFER", "rationale": "Opening forestland to agricultural disposition via a specific-parcel national act conflicts with P6 (inconsistent with NIPAS, forestry, and climate commitments) and raises serious P3 concerns (bypasses DENR and local land-use processes). Without documented community demand and environmental clearance, P2 and P5 are also unmet. Refer to DENR reclassification and local comprehensive land-use plan processes."}, {"mid": 129, "rep_title": "AN ACT PROHIBITING THE CONVERSION OF IRRIGATED AND IRRIGABLE AGRICULTURAL LANDS FOR NON-AGRICULTURAL USES, AMENDING FOR", "n_bills": 2, "archetype": "Restrict/condition reclassification & conversion of agricultural land", "theme": "LGU Creation, Boundaries & Land", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 4360, "title": "AN ACT PROHIBITING THE CONVERSION OF IRRIGATED AND IRRIGABLE AGRICULTURAL LANDS FOR NON-AGRICULTURAL USES, AMENDING FOR", "decision": "REVISE / CALIBRATE"}, {"congress": 20, "number": 3408, "title": "AN ACT PROHIBITING THE CONVERSION OF IRRIGATED AND IRRIGABLE AGRICULTURAL LANDS FOR NON-AGRICULTURAL USES, AMENDING FOR", "decision": "REVISE / CALIBRATE"}], "proposes": "Prohibits conversion of irrigated and irrigable agricultural lands for non-agricultural uses, amending existing law.", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "Conditional", "P4": "Pass", "P5": "Pass", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "The national policy goal (food security, farmland preservation) is coherent with P6 and P5. However, a blanket prohibition constrains LGU land-use authority (P1, P3) and may override legitimate local development decisions made through proper zoning processes (P2). Revise to allow exceptions through a rigorous, transparent local process with national concurrence, rather than an absolute ban that may stifle legitimate LGU planning."}, {"mid": 130, "rep_title": "AN ACT AMENDING PRESIDENTIAL DECREE NO. 464 OTHERWISE KNOWN AS \\\"THE REAL PROPERTY TAX CODE\\\" BY GRANTING PROPERTY TAX E", "n_bills": 1, "archetype": "Restrict/condition reclassification & conversion of agricultural land", "theme": "LGU Creation, Boundaries & Land", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 5183, "title": "AN ACT AMENDING PRESIDENTIAL DECREE NO. 464 OTHERWISE KNOWN AS \\\"THE REAL PROPERTY TAX CODE\\\" BY GRANTING PROPERTY TAX E", "decision": "REVISE / CALIBRATE"}], "proposes": "Amends the Real Property Tax Code (PD 464) to grant property tax exemptions (likely for agricultural land).", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "N/A", "P4": "Fail", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Property tax is a primary source of local own-source revenue; nationally mandated exemptions directly reduce LGU fiscal capacity (P4 Fail — unfunded mandate). P1 is weakened if exemptions are imposed without LGU discretion. P5 and P6 need safeguards to ensure exemptions are targeted and transparent. Revise to require national compensation to affected LGUs or to frame exemptions as optional local incentives rather than nationally mandated ones."}, {"mid": 131, "rep_title": "AN ACT DECLARING AS AGRICULTURAL LAND PORTIONS OF FORESTLAND LOCATED IN BARANGAY MANOC-MANOC, MUNICIPALITY OF MALAY, PRO", "n_bills": 1, "archetype": "Restrict/condition reclassification & conversion of agricultural land", "theme": "LGU Creation, Boundaries & Land", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 7748, "title": "AN ACT DECLARING AS AGRICULTURAL LAND PORTIONS OF FORESTLAND LOCATED IN BARANGAY MANOC-MANOC, MUNICIPALITY OF MALAY, PRO", "decision": "REVISE / CALIBRATE"}], "proposes": "Declares specific forestland portions in Barangay Manoc-Manoc, Malay, Aklan as agricultural land.", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "Conditional", "P4": "N/A", "P5": "Conditional", "P6": "Fail"}, "decision": "REJECT / REFER", "rationale": "Identical structural problems as mid 128: site-specific congressional reclassification of forestland bypasses DENR, NIPAS, and local land-use planning frameworks (P6 Fail, P3 Conditional). Malay is an ecotourism-sensitive area, heightening environmental coherence concerns. Refer to proper DENR administrative reclassification with LGU participation and environmental impact assessment."}, {"mid": 132, "rep_title": "AN ACT AMENDING REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991 BY PROVIDING AN EXEMPTION TO", "n_bills": 2, "archetype": "Restrict/condition reclassification & conversion of agricultural land", "theme": "LGU Creation, Boundaries & Land", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 19, "number": 5445, "title": "AN ACT AMENDING REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991 BY PROVIDING AN EXEMPTION TO", "decision": "REVISE / CALIBRATE"}, {"congress": 20, "number": 1270, "title": "AN ACT AMENDING REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991 BY PROVIDING AN EXEMPTION TO", "decision": "REVISE / CALIBRATE"}], "proposes": "Amends RA 7160 to provide an exemption to existing restrictions on agricultural land reclassification or conversion.", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "Conditional", "P4": "Conditional", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "An exemption mechanism within the LGC itself is more structurally appropriate than site-specific bills, but the design matters critically. If the exemption expands LGU discretion under clear criteria with national safeguards, it can satisfy P1–P3. However, poorly defined exemptions risk undermining food-security policy (P6), enabling fiscal manipulation (P4), and weakening accountability (P5). Revise to define strict, transparent criteria, require environmental and food-security impact review, and include LGU accountability reporting before exemptions are granted."}, {"mid": 133, "rep_title": "AN ACT MAKING THE POSITION OF A COOPERATIVES OFFICER MANDATORY IN THE MUNICIPAL, CITY AND PROVINCIAL LEVELS, AMENDING FO", "n_bills": 8, "archetype": "Mandatory Cooperatives Officer", "theme": "Personnel & Mandatory Officers", "sheet_decision": "REJECT / REFER", "member_bills": [{"congress": 18, "number": 287, "title": "AN ACT MAKING THE POSITION OF A COOPERATIVES OFFICER MANDATORY IN THE MUNICIPAL, CITY AND PROVINCIAL LEVELS, AMENDING FO", "decision": "REJECT / REFER"}, {"congress": 18, "number": 619, "title": "AN ACT MAKING THE POSITION OF A COOPERATIVE OFFICER MANDATORY IN THE MUNICIPAL, CITY AND PROVINCIAL LEVELS, AMENDING FOR", "decision": "REJECT / REFER"}, {"congress": 18, "number": 2436, "title": "AN ACT MAKING THE POSITION OF A COOPERATIVES OFFICER MANDATORY IN THE MUNICIPAL, CITY AND PROVINCIAL LEVELS, AMENDING FO", "decision": "REJECT / REFER"}, {"congress": 18, "number": 2851, "title": "AN ACT MAKING THE POSITION OF A COOPERATIVES OFFICER MANDATORY IN THE MUNICIPAL, CITY AND PROVINCIAL LEVELS, AMENDING FO", "decision": "REJECT / REFER"}, {"congress": 18, "number": 3024, "title": "AN ACT MAKING THE POSITION OF A COOPERATIVES OFFICER MANDATORY IN THE MUNICIPAL, CITY AND PROVINCIAL LEVELS, AMENDING FO", "decision": "REJECT / REFER"}, {"congress": 18, "number": 5925, "title": "AN ACT MAKING THE POSITION OF A COOPERATIVES OFFICER MANDATORY IN THE MUNICIPAL, CITY AND PROVINCIAL LEVELS, AMENDING FO", "decision": "REJECT / REFER"}, {"congress": 18, "number": 7706, "title": "AN ACT MAKING THE POSITION OF A COOPERATIVES OFFICER MANDATORY IN THE MUNICIPAL, CITY AND PROVINCIAL LEVELS, AMENDING FO", "decision": "REJECT / REFER"}, {"congress": 19, "number": 4046, "title": "AN ACT MAKING THE POSITION OF A COOPERATIVES OFFICER MANDATORY AT THE MUNICIPAL, CITY, AND PROVINCIAL LEVELS, AMENDING F", "decision": "REJECT / REFER"}], "proposes": "Makes the position of Cooperatives Officer mandatory at municipal, city, and provincial levels.", "scores": {"P1": "Fail", "P2": "Fail", "P3": "Conditional", "P4": "Fail", "P5": "Conditional", "P6": "Conditional"}, "decision": "REJECT / REFER", "rationale": "Mandating a specific officer position strips LGUs of staffing autonomy (P1), overrides local demand and resource context (P2), and creates an unfunded personnel mandate without guaranteed national cost-sharing (P4). The cooperative development function may be legitimately local but the mandate mechanism is the wrong vehicle; refer to CDA or rationalize via DBM-DILG joint issuance."}, {"mid": 134, "rep_title": "AN ACT MAKING THE APPOINTMENT OF COOPERATIVES OFFICER IN ALL LOCAL GOVERNMENT UNITS MANDATORY, AMENDING FOR THE PURPOSE", "n_bills": 1, "archetype": "Mandatory Cooperatives Officer", "theme": "Personnel & Mandatory Officers", "sheet_decision": "REJECT / REFER", "member_bills": [{"congress": 18, "number": 1058, "title": "AN ACT MAKING THE APPOINTMENT OF COOPERATIVES OFFICER IN ALL LOCAL GOVERNMENT UNITS MANDATORY, AMENDING FOR THE PURPOSE", "decision": "REJECT / REFER"}], "proposes": "Makes appointment of a Cooperatives Officer mandatory in all LGUs.", "scores": {"P1": "Fail", "P2": "Fail", "P3": "Conditional", "P4": "Fail", "P5": "Conditional", "P6": "Conditional"}, "decision": "REJECT / REFER", "rationale": "Substantively identical to mid 133: national imposition of a mandatory personnel position undermines autonomy (P1) and self-determination (P2), and constitutes an unfunded mandate (P4) absent IRA augmentation. Refer to CDA framework or address via DILG-DBM staffing standards."}, {"mid": 135, "rep_title": "AN ACT MAKING THE APPOINTMENT OF AN ENVIRONMENT AND NATURAL RESOURCES OFFICER MANDATORY IN ALL PROVINCES, CITIES AND MUN", "n_bills": 5, "archetype": "Mandatory Environment & Natural Resources Officer (ENRO)", "theme": "Personnel & Mandatory Officers", "sheet_decision": "REJECT / REFER", "member_bills": [{"congress": 18, "number": 1059, "title": "AN ACT MAKING THE APPOINTMENT OF AN ENVIRONMENT AND NATURAL RESOURCES OFFICER MANDATORY IN ALL PROVINCES, CITIES AND MUN", "decision": "REJECT / REFER"}, {"congress": 19, "number": 113, "title": "AN ACT MAKING THE APPOINTMENT OF AN ENVIRONMENT AND NATURAL RESOURCES OFFICER MANDATORY IN ALL PROVINCES, CITIES AND MUN", "decision": "REJECT / REFER"}, {"congress": 19, "number": 3618, "title": "AN ACT MAKING THE APPOINTMENT OF AN ENVIRONMENT AND NATURAL RESOURCES OFFICER MANDATORY IN ALL PROVINCES, CITIES AND MUN", "decision": "REJECT / REFER"}, {"congress": 20, "number": 1574, "title": "AN ACT MAKING THE APPOINTMENT OF AN ENVIRONMENT AND NATURAL RESOURCES OFFICER MANDATORY IN ALL PROVINCES, CITIES AND MUN", "decision": "REJECT / REFER"}, {"congress": 19, "number": 9003, "title": "AN ACT MAKING THE APPOINTMENT OF AN ENVIRONMENT AND NATURAL RESOURCES OFFICE MANDATORY IN ALL PROVINCES, CITIES AND MUNI", "decision": "REVISE / CALIBRATE"}], "proposes": "Makes appointment of an Environment and Natural Resources Officer (ENRO) mandatory in all provinces, cities, and municipalities.", "scores": {"P1": "Fail", "P2": "Conditional", "P3": "Pass", "P4": "Fail", "P5": "Pass", "P6": "Pass"}, "decision": "REJECT / REFER", "rationale": "While ENRO functions align well with subsidiarity (P3) and national environmental policy (P6), mandating the position without dedicated funding or IRA uplift constitutes an unfunded mandate (P4) and curtails LGU staffing discretion (P1). Revise to provide funding mechanism or make mandatory only for LGUs above a fiscal capacity threshold."}, {"mid": 136, "rep_title": "AN ACT PROVIDING FOR THE MANDATORY APPOINTMENT OF PROVINCIAL, CITY AND MUNICIPAL ENVIRONMENT AND NATURAL RESOURCES OFFIC", "n_bills": 1, "archetype": "Mandatory Environment & Natural Resources Officer (ENRO)", "theme": "Personnel & Mandatory Officers", "sheet_decision": "REJECT / REFER", "member_bills": [{"congress": 19, "number": 5985, "title": "AN ACT PROVIDING FOR THE MANDATORY APPOINTMENT OF PROVINCIAL, CITY AND MUNICIPAL ENVIRONMENT AND NATURAL RESOURCES OFFIC", "decision": "REJECT / REFER"}], "proposes": "Provides for mandatory appointment of Provincial, City, and Municipal ENROs.", "scores": {"P1": "Fail", "P2": "Conditional", "P3": "Pass", "P4": "Fail", "P5": "Pass", "P6": "Pass"}, "decision": "REJECT / REFER", "rationale": "Same structural defects as mid 135: the environmental function is appropriately local (P3) and coherent with DENR mandates (P6), but the unfunded personnel mandate (P4) and overriding of local staffing autonomy (P1) are unresolved. Needs a fiscal cover mechanism to pass."}, {"mid": 137, "rep_title": "AN ACT MANDATING THE PERMANENT APPOINTMENT OF PROVINCIAL/CITY/MUNICIPAL ENVIRONMENT AND NATURAL RESOURCES OFFICER AMENDI", "n_bills": 1, "archetype": "Mandatory Environment & Natural Resources Officer (ENRO)", "theme": "Personnel & Mandatory Officers", "sheet_decision": "REJECT / REFER", "member_bills": [{"congress": 20, "number": 4284, "title": "AN ACT MANDATING THE PERMANENT APPOINTMENT OF PROVINCIAL/CITY/MUNICIPAL ENVIRONMENT AND NATURAL RESOURCES OFFICER AMENDI", "decision": "REJECT / REFER"}], "proposes": "Mandates permanent appointment of Provincial/City/Municipal ENROs.", "scores": {"P1": "Fail", "P2": "Conditional", "P3": "Pass", "P4": "Fail", "P5": "Pass", "P6": "Pass"}, "decision": "REJECT / REFER", "rationale": "The 'permanent appointment' specification adds rigidity beyond mids 135–136, further constraining LGU HR discretion (P1). Fiscal mandate concern (P4) remains. Stronger accountability provisions (P5) are implied by permanency but do not outweigh the autonomy and funding failures."}, {"mid": 138, "rep_title": "AN ACT CREATING A MANDATORY POSITION FOR A HUMAN RESOURCE MANAGEMENT OFFICER IN LOCAL GOVERNMENT UNITS, AMENDING FOR THE", "n_bills": 7, "archetype": "Mandatory HR Management Officer", "theme": "Personnel & Mandatory Officers", "sheet_decision": "REJECT / REFER", "member_bills": [{"congress": 18, "number": 8820, "title": "AN ACT CREATING A MANDATORY POSITION FOR A HUMAN RESOURCE MANAGEMENT OFFICER IN LOCAL GOVERNMENT UNITS, AMENDING FOR THE", "decision": "REJECT / REFER"}, {"congress": 19, "number": 1729, "title": "AN ACT CREATING A MANDATORY POSITION FOR A HUMAN RESOURCE MANAGEMENT OFFICER IN LOCAL GOVERNMENT UNITS, AMENDING FOR THE", "decision": "REJECT / REFER"}, {"congress": 19, "number": 4507, "title": "AN ACT CREATING A MANDATORY POSITION FOR A HUMAN RESOURCE MANAGEMENT OFFICER IN LOCAL GOVERNMENT UNITS, AMENDING FOR THE", "decision": "REJECT / REFER"}, {"congress": 19, "number": 6150, "title": "AN ACT CREATING A MANDATORY DEPARTMENT HEAD POSITION OF HUMAN RESOURCE MANAGEMENT OFFICER IN THE LOCAL GOVERNMENT UNITS", "decision": "REJECT / REFER"}, {"congress": 19, "number": 7282, "title": "AN ACT CREATING A MANDATORY POSITION OF HUMAN RESOURCE MANAGEMENT OFFICER IN THE LOCAL GOVERNMENT UNITS AND DEFINING ITS", "decision": "REJECT / REFER"}, {"congress": 19, "number": 7378, "title": "AN ACT CREATING A MANDATORY DEPARTMENT HEAD POSITION OF HUMAN RESOURCE MANAGEMENT OFFICER IN THE LOCAL GOVERNMENT UNITS", "decision": "REJECT / REFER"}, {"congress": 20, "number": 2117, "title": "AN ACT CREATING A MANDATORY DEPARTMENT HEAD POSITION OF HUMAN RESOURCE MANAGEMENT OFFICER IN THE LOCAL GOVERNMENT UNITS", "decision": "REJECT / REFER"}], "proposes": "Creates a mandatory Human Resource Management Officer (HRMO) position in all LGUs.", "scores": {"P1": "Fail", "P2": "Fail", "P3": "Pass", "P4": "Fail", "P5": "Pass", "P6": "Pass"}, "decision": "REJECT / REFER", "rationale": "HRMO functions are inherently organizational and local (P3), and professionalized HR management improves accountability (P5). However, national imposition removes LGU staffing discretion (P1, P2) and creates an unfunded mandate (P4) for smaller LGUs. Should be addressed via CSC-DILG joint issuance tied to staffing pattern reforms, not a standalone LGC amendment."}, {"mid": 139, "rep_title": "AN ACT CREATING A MANDATORY POSITION FOR A HUMAN RESOURCE MANAGEMENT OFFICER IN EACH MUNICIPALITY, CITY AND PROVINCE DEF", "n_bills": 3, "archetype": "Mandatory HR Management Officer", "theme": "Personnel & Mandatory Officers", "sheet_decision": "REJECT / REFER", "member_bills": [{"congress": 19, "number": 4296, "title": "AN ACT CREATING A MANDATORY POSITION FOR A HUMAN RESOURCE MANAGEMENT OFFICER IN EACH MUNICIPALITY, CITY AND PROVINCE DEF", "decision": "REJECT / REFER"}, {"congress": 19, "number": 8520, "title": "AN ACT CREATING MANDATORY POSITIONS FOR A HUMAN RESOURCE MANAGEMENT OFFICER FOR MUNICIPALITIES, CITIES, AND PROVINCES, A", "decision": "REJECT / REFER"}, {"congress": 20, "number": 2508, "title": "AN ACT CREATING MANDATORY POSITIONS FOR A HUMAN RESOURCE MANAGEMENT OFFICER FOR MUNICIPALITIES, CITIES, AND PROVINCES, A", "decision": "REJECT / REFER"}], "proposes": "Creates a mandatory HRMO position in each municipality, city, and province.", "scores": {"P1": "Fail", "P2": "Fail", "P3": "Pass", "P4": "Fail", "P5": "Pass", "P6": "Pass"}, "decision": "REJECT / REFER", "rationale": "Substantively identical to mid 138. The explicit inclusion of municipalities amplifies the unfunded mandate concern (P4) for lower-income LGUs. Refer to CSC staffing pattern rationalization process."}, {"mid": 140, "rep_title": "AN ACT INSTITUTIONALIZING THE POSITION OF ECONOMIC DEVELOPMENT AND INVESTMENT PROMOTIONS OFFICER IN LOCAL GOVERNMENT UNI", "n_bills": 4, "archetype": "Mandatory Economic & Investment Promotion Officer", "theme": "Personnel & Mandatory Officers", "sheet_decision": "REJECT / REFER", "member_bills": [{"congress": 18, "number": 392, "title": "AN ACT INSTITUTIONALIZING THE POSITION OF ECONOMIC AND INVESTMENT PROMOTION OFFICER IN LOCAL GOVERNMENT UNITS, AMENDING", "decision": "REJECT / REFER"}, {"congress": 19, "number": 7592, "title": "AN ACT INSTITUTIONALIZING THE POSITION OF ECONOMIC AND INVESTMENT PROMOTION OFFICER IN LOCAL GOVERNMENT UNITS, AMENDING", "decision": "REJECT / REFER"}, {"congress": 19, "number": 7748, "title": "AN ACT INSTITUTIONALIZING THE POSITION OF ECONOMIC AND INVESTMENT PROMOTION OFFICER IN LOCAL GOVERNMENT UNITS, AMENDING", "decision": "REJECT / REFER"}, {"congress": 20, "number": 602, "title": "AN ACT INSTITUTIONALIZING THE POSITION OF ECONOMIC DEVELOPMENT AND INVESTMENT PROMOTIONS OFFICER IN LOCAL GOVERNMENT UNI", "decision": "REJECT / REFER"}], "proposes": "Institutionalizes the position of Economic Development and Investment Promotions Officer in all LGUs.", "scores": {"P1": "Fail", "P2": "Fail", "P3": "Conditional", "P4": "Fail", "P5": "Conditional", "P6": "Conditional"}, "decision": "REJECT / REFER", "rationale": "Economic promotion is a legitimate LGU function but the relevance and capacity vary enormously across LGU types and income classes (P3 Conditional). Mandating the officer regardless of LGU size or economic base fails P1, P2, and P4. Consider making it mandatory only for cities and provinces, with municipalities having the option, to reduce autonomy and fiscal concerns."}, {"mid": 141, "rep_title": "AN ACT INSTITUTIONALIZING THE CREATION OF ECONOMIC AND INVESTMENT PROMOTION OFFICER IN LOCAL GOVERNMENT UNITS, AMENDING", "n_bills": 1, "archetype": "Mandatory Economic & Investment Promotion Officer", "theme": "Personnel & Mandatory Officers", "sheet_decision": "REJECT / REFER", "member_bills": [{"congress": 19, "number": 5727, "title": "AN ACT INSTITUTIONALIZING THE CREATION OF ECONOMIC AND INVESTMENT PROMOTION OFFICER IN LOCAL GOVERNMENT UNITS, AMENDING", "decision": "REJECT / REFER"}], "proposes": "Institutionalizes creation of an Economic and Investment Promotion Officer in all LGUs.", "scores": {"P1": "Fail", "P2": "Fail", "P3": "Conditional", "P4": "Fail", "P5": "Conditional", "P6": "Conditional"}, "decision": "REJECT / REFER", "rationale": "Substantively equivalent to mid 140. Universal mandate regardless of LGU economic profile fails autonomy (P1), self-determination (P2), and fiscal justice (P4) tests. Refer for calibration to differentiate by LGU income class."}, {"mid": 142, "rep_title": "AN ACT PROVIDING FOR MANDATORY APPOINTMENT OF TOURISM OFFICERS IN PROVINCES AND CITIES AND OPTIONAL APPOINTMENT IN MUNIC", "n_bills": 1, "archetype": "Mandatory Tourism Officer", "theme": "Personnel & Mandatory Officers", "sheet_decision": "REJECT / REFER", "member_bills": [{"congress": 18, "number": 1374, "title": "AN ACT PROVIDING FOR MANDATORY APPOINTMENT OF TOURISM OFFICERS IN PROVINCES AND CITIES AND OPTIONAL APPOINTMENT IN MUNIC", "decision": "REJECT / REFER"}], "proposes": "Mandates Tourism Officers in provinces and cities; makes appointment optional in municipalities.", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "Pass", "P4": "Conditional", "P5": "Pass", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "The tiered approach — mandatory at province/city, optional at municipality — meaningfully reduces the autonomy and fiscal concerns compared to a blanket mandate. Tourism is appropriately local (P3) and aligned with national tourism policy (P6). P1 and P4 are Conditional because even provinces/cities may lack tourism-based revenue to justify the position; adding an income-class or tourism-receipts threshold would suffice to adopt."}, {"mid": 143, "rep_title": "AN ACT PROVIDING FOR MANDATORY APPOINTMENT OF TOURISM OFFICERS IN PROVINCES, CITIES, AND MUNICIPALITIES, AMENDING FOR TH", "n_bills": 2, "archetype": "Mandatory Tourism Officer", "theme": "Personnel & Mandatory Officers", "sheet_decision": "REJECT / REFER", "member_bills": [{"congress": 18, "number": 5318, "title": "AN ACT PROVIDING FOR MANDATORY APPOINTMENT OF TOURISM OFFICERS IN PROVINCES, CITIES AND MUNICIPALITIES WHERE TOURISM IS", "decision": "REJECT / REFER"}, {"congress": 19, "number": 4255, "title": "AN ACT PROVIDING FOR MANDATORY APPOINTMENT OF TOURISM OFFICERS IN PROVINCES, CITIES, AND MUNICIPALITIES, AMENDING FOR TH", "decision": "REJECT / REFER"}], "proposes": "Mandates Tourism Officers in provinces, cities, AND municipalities.", "scores": {"P1": "Fail", "P2": "Fail", "P3": "Conditional", "P4": "Fail", "P5": "Pass", "P6": "Pass"}, "decision": "REJECT / REFER", "rationale": "Extending the mandate universally to all municipalities — including those with negligible tourism — fails P1, P2, and P4. Unlike mid 142's tiered model, no differentiation is made for LGU capacity or relevance. Refer back for amendment to replicate the tiered approach of mid 142 or restrict to LGUs with identified tourism assets."}, {"mid": 144, "rep_title": "AN ACT MAKING THE POSITION OF TOURISM OFFICER MANDATORY IN THE MUNICIPAL, CITY AND PROVINCIAL LEVELS, AMENDING FOR THE P", "n_bills": 5, "archetype": "Mandatory Tourism Officer", "theme": "Personnel & Mandatory Officers", "sheet_decision": "REJECT / REFER", "member_bills": [{"congress": 18, "number": 9241, "title": "AN ACT MAKING THE POSITION OF TOURISM OFFICER MANDATORY IN THE MUNICIPAL, CITY AND PROVINCIAL LEVELS, AMENDING FOR THE P", "decision": "REJECT / REFER"}, {"congress": 19, "number": 1727, "title": "AN ACT MAKING THE POSITION OF TOURISM OFFICER MANDATORY IN THE MUNICIPAL, CITY AND PROVINCIAL LEVELS, AMENDING FOR THE P", "decision": "REJECT / REFER"}, {"congress": 19, "number": 3900, "title": "AN ACT MAKING THE POSITION OF A TOURISM OFFICER MANDATORY IN THE MUNICIPAL, CITY, AND PROVINCIAL LEVELS, AMENDING FOR TH", "decision": "REJECT / REFER"}, {"congress": 20, "number": 410, "title": "AN ACT MAKING THE POSITION OF A TOURISM OFFICER MANDATORY IN THE MUNICIPAL, CITY, AND PROVINCIAL LEVELS, AMENDING FOR TH", "decision": "REJECT / REFER"}, {"congress": 20, "number": 2509, "title": "AN ACT MAKING THE POSITION OF TOURISM OFFICER MANDATORY IN THE MUNICIPAL, CITY AND PROVINCIAL LEVELS, AMENDING FOR THE P", "decision": "REJECT / REFER"}], "proposes": "Makes the position of Tourism Officer mandatory at municipal, city, and provincial levels.", "scores": {"P1": "Fail", "P2": "Fail", "P3": "Conditional", "P4": "Fail", "P5": "Pass", "P6": "Pass"}, "decision": "REJECT / REFER", "rationale": "Same universal scope failure as mid 143. Imposing the Tourism Officer position on all municipalities without regard to tourism relevance or fiscal capacity violates P1, P2, and P4. Refer for revision along the lines of mid 142's tiered structure."}, {"mid": 145, "rep_title": "AN ACT PROVIDING FOR MANDATORY APPOINTMENT OF CULTURE AND TOURISM OFFICERS IN PROVINCES AND CITIES AND OPTIONAL APPOINTM", "n_bills": 1, "archetype": "Mandatory Tourism Officer", "theme": "Personnel & Mandatory Officers", "sheet_decision": "REJECT / REFER", "member_bills": [{"congress": 19, "number": 2678, "title": "AN ACT PROVIDING FOR MANDATORY APPOINTMENT OF CULTURE AND TOURISM OFFICERS IN PROVINCES AND CITIES AND OPTIONAL APPOINTM", "decision": "REJECT / REFER"}], "proposes": "Mandates appointment of Culture and Tourism Officers in all provinces and cities, with optional appointment in municipalities.", "scores": {"P1": "Fail", "P2": "Fail", "P3": "Conditional", "P4": "Fail", "P5": "Pass", "P6": "Conditional"}, "decision": "REJECT / REFER", "rationale": "Fails P1 and P2 by removing provincial and city discretion over staffing structure and imposing a nationally determined organizational form with no demonstrated LGU demand. Fails P4 because no IRA adjustment or dedicated appropriation accompanies the personnel mandate. The tourism function itself is appropriately local (P3 Conditional), and sector-specific accountability may improve (P5 Pass), but the core defects on autonomy and fiscal justice are disqualifying."}, {"mid": 146, "rep_title": "AN ACT MANDATORILY CREATING THE POSITION OF THE MUNICIPAL GENERAL SERVICES OFFICER, AMENDING FOR THE PURPOSE BOOK III, T", "n_bills": 5, "archetype": "Mandatory Population/Nutrition/Social Welfare/other officer", "theme": "Personnel & Mandatory Officers", "sheet_decision": "REJECT / REFER", "member_bills": [{"congress": 18, "number": 382, "title": "AN ACT MANDATORILY CREATING THE POSITION OF THE MUNICIPAL GENERAL SERVICES OFFICER, AMENDING FOR THE PURPOSE BOOK III, T", "decision": "REJECT / REFER"}, {"congress": 18, "number": 4746, "title": "AN ACT MANDATORILY CREATING THE POSITION OF THE MUNICIPAL GENERAL SERVICES OFFICER, AMENDING FOR THE PURPOSE BOOK III, T", "decision": "REJECT / REFER"}, {"congress": 19, "number": 632, "title": "AN ACT MANDATORILY CREATING THE POSITION OF THE MUNICIPAL GENERAL SERVICES OFFICER, AMENDING FOR THE PURPOSE BOOK III, T", "decision": "REJECT / REFER"}, {"congress": 19, "number": 6604, "title": "AN ACT MANDATORILY CREATING THE POSITION OF THE MUNICIPAL GENERAL SERVICES OFFICER, AMENDING FOR THE PURPOSE BOOK III, T", "decision": "REJECT / REFER"}, {"congress": 20, "number": 1126, "title": "AN ACT MANDATORILY CREATING THE POSITION OF THE MUNICIPAL GENERAL SERVICES OFFICER, AMENDING FOR THE PURPOSE BOOK III, T", "decision": "REJECT / REFER"}], "proposes": "Mandatorily creates the position of Municipal General Services Officer in all municipal governments, amending Book III of RA 7160.", "scores": {"P1": "Fail", "P2": "Fail", "P3": "Conditional", "P4": "Fail", "P5": "Pass", "P6": "Conditional"}, "decision": "REJECT / REFER", "rationale": "Fails P1 and P2 by imposing a mandatory officer position on all municipalities regardless of size, capacity, or local preference, stripping organizational discretion. Fails P4 because it creates a recurring personnel cost with no funding mechanism; small and 4th-to-6th-class municipalities would bear an unfunded burden. The GSO function is local (P3 Conditional) and a dedicated officer can improve asset management accountability (P5 Pass), but fiscal and autonomy defects are disqualifying."}, {"mid": 147, "rep_title": "AN ACT MANDATING THE APPOINTMENT OF REGISTERED AND LICENSED ARCHITECTS OR CIVIL ENGINEERS OTHER THAN CITY/MUNICIPAL ENGI", "n_bills": 1, "archetype": "Mandatory Population/Nutrition/Social Welfare/other officer", "theme": "Personnel & Mandatory Officers", "sheet_decision": "REJECT / REFER", "member_bills": [{"congress": 18, "number": 849, "title": "AN ACT MANDATING THE APPOINTMENT OF REGISTERED AND LICENSED ARCHITECTS OR CIVIL ENGINEERS OTHER THAN CITY/MUNICIPAL ENGI", "decision": "REJECT / REFER"}], "proposes": "Mandates appointment of registered and licensed architects or civil engineers in LGUs beyond the existing city/municipal engineer.", "scores": {"P1": "Fail", "P2": "Fail", "P3": "Conditional", "P4": "Fail", "P5": "Conditional", "P6": "Conditional"}, "decision": "REJECT / REFER", "rationale": "Fails P1 and P2 by requiring PRC-licensed professionals at national mandate, removing local discretion on technical staffing. Fails P4 because licensed architect or engineer salaries create a significant unfunded mandate with no corresponding IRA or budget support specified. Building and planning functions are appropriately local (P3 Conditional), and professional licensing may raise design standards (P5 Conditional), but the mandate is top-down and fiscally unsupported."}, {"mid": 148, "rep_title": "AN ACT PROVIDING FOR THE MANDATORY APPOINTMENT OF A NUTRITION OFFICER IN ALL PROVINCES, CITIES AND MUNICIPALITIES OF THE", "n_bills": 4, "archetype": "Mandatory Population/Nutrition/Social Welfare/other officer", "theme": "Personnel & Mandatory Officers", "sheet_decision": "REJECT / REFER", "member_bills": [{"congress": 18, "number": 3048, "title": "AN ACT PROVIDING FOR THE MANDATORY APPOINTMENT OF A NUTRITION OFFICER IN ALL PROVINCES, CITIES AND MUNICIPALITIES OF THE", "decision": "REJECT / REFER"}, {"congress": 19, "number": 1105, "title": "AN ACT PROVIDING FOR THE MANDATORY APPOINTMENT OF A NUTRITION OFFICER IN ALL PROVINCES, CITIES AND MUNICIPALITIES OF THE", "decision": "REJECT / REFER"}, {"congress": 19, "number": 1549, "title": "AN ACT PROVIDING FOR THE MANDATORY APPOINTMENT OF NUTRITION OFFICER IN ALL PROVINCES, CITIES AND MUNICIPALITIES IN THE C", "decision": "REJECT / REFER"}, {"congress": 19, "number": 1728, "title": "AN ACT PROVIDING FOR THE MANDATORY APPOINTMENT OF A NUTRITION OFFICER IN ALL PROVINCES, CITIES AND MUNICIPALITIES IN THE", "decision": "REJECT / REFER"}], "proposes": "Mandates appointment of a Nutrition Officer in all provinces, cities, and municipalities across the country.", "scores": {"P1": "Fail", "P2": "Fail", "P3": "Conditional", "P4": "Fail", "P5": "Pass", "P6": "Conditional"}, "decision": "REJECT / REFER", "rationale": "Fails P1 and P2 by imposing a uniform personnel requirement on all LGUs regardless of nutritional situation, fiscal capacity, or local priority-setting. Fails P4 because creating mandatory positions in thousands of LGUs simultaneously generates a large unfunded mandate not covered by existing IRA shares. Nutrition monitoring is appropriately local (P3 Conditional) and a dedicated officer improves program tracking (P5 Pass), but fiscal and autonomy failures are disqualifying. Better addressed through NNC program funding with LGU option to comply."}, {"mid": 149, "rep_title": "AN ACT AMENDING REPUBLIC ACT NO. 7160, ALSO KNOWN AS THE LOCAL GOVERNMENT CODE, ON THE LEVEL OF THE POSITION OF SECRETAR", "n_bills": 2, "archetype": "Mandatory Population/Nutrition/Social Welfare/other officer", "theme": "Personnel & Mandatory Officers", "sheet_decision": "REJECT / REFER", "member_bills": [{"congress": 18, "number": 8356, "title": "AN ACT AMENDING REPUBLIC ACT NO. 7160, ALSO KNOWN AS THE LOCAL GOVERNMENT CODE, ON THE LEVEL OF THE POSITION OF SECRETAR", "decision": "REJECT / REFER"}, {"congress": 19, "number": 4703, "title": "AN ACT AMENDING REPUBLIC ACT NO. 7160, ALSO KNOWN AS THE LOCAL GOVERNMENT CODE, ON THE LEVEL OF THE POSITION OF SECRETAR", "decision": "REJECT / REFER"}], "proposes": "Upgrades the salary grade or position level of the Sanggunian Secretary under RA 7160.", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "Pass", "P4": "Fail", "P5": "Conditional", "P6": "Conditional"}, "decision": "REJECT / REFER", "rationale": "The Sanggunian Secretary position is inherently local (P3 Pass) and upgrading it may professionalize the legislative process (P5 Conditional), but the measure fails P4 because elevating a position's salary grade without a corresponding IRA uplift or DBM-backed appropriation imposes an unfunded cost on LGUs. P1 and P2 are conditional because the change could reflect legislative body interests rather than broad LGU/community demand. The measure should be referred to DBM-DILG joint order or accompanied by a specific funding provision."}, {"mid": 150, "rep_title": "AN ACT CREATING THE POSITION OF THE MUNICIPAL GENERAL SERVICES OFFICER IN MUNICIPAL GOVERNMENTS, AMENDING SECTION 443 (a", "n_bills": 4, "archetype": "Mandatory Population/Nutrition/Social Welfare/other officer", "theme": "Personnel & Mandatory Officers", "sheet_decision": "REJECT / REFER", "member_bills": [{"congress": 18, "number": 9136, "title": "AN ACT CREATING THE POSITION OF THE MUNICIPAL GENERAL SERVICES OFFICER IN MUNICIPAL GOVERNMENTS, AMENDING SECTION 443 (a", "decision": "REJECT / REFER"}, {"congress": 18, "number": 9449, "title": "AN ACT CREATING THE POSITION OF THE MUNICIPAL GENERAL SERVICES OFFICER IN MUNICIPAL GOVERNMENTS, AMENDING SECTION 443 (a", "decision": "REJECT / REFER"}, {"congress": 19, "number": 4461, "title": "AN ACT CREATING THE POSITION OF THE MUNICIPAL GENERAL SERVICES OFFICER IN MUNICIPAL GOVERNMENTS, AMENDING SECTION 443 (a", "decision": "REJECT / REFER"}, {"congress": 19, "number": 8757, "title": "AN ACT CREATING THE POSITION OF THE MUNICIPAL GENERAL SERVICES OFFICER IN MUNICIPAL GOVERNMENTS, AMENDING SECTION 443 (a", "decision": "REJECT / REFER"}], "proposes": "Creates the position of Municipal General Services Officer by amending Section 443(a) of RA 7160 for municipal governments.", "scores": {"P1": "Fail", "P2": "Fail", "P3": "Conditional", "P4": "Fail", "P5": "Pass", "P6": "Conditional"}, "decision": "REJECT / REFER", "rationale": "Substantively identical in effect to MID 146 but via a different amending section: mandating a GSO position removes municipal organizational discretion (P1 Fail, P2 Fail) and creates an unfunded personnel obligation across all municipalities (P4 Fail). The function is appropriately local (P3 Conditional) and a dedicated officer can strengthen asset management accountability (P5 Pass), but the core defects on autonomy and fiscal justice remain disqualifying. Multiple Congress filings reflect legislative interest, not LGU demand."}, {"mid": 151, "rep_title": "AN ACT MANDATING THE CREATION OF AN OFFICE OF ARCHITECTURAL PLANNING AND DESIGN IN MUNICIPALITIES, CITIES, AND PROVINCES", "n_bills": 1, "archetype": "Mandatory Population/Nutrition/Social Welfare/other officer", "theme": "Personnel & Mandatory Officers", "sheet_decision": "REJECT / REFER", "member_bills": [{"congress": 19, "number": 2679, "title": "AN ACT MANDATING THE CREATION OF AN OFFICE OF ARCHITECTURAL PLANNING AND DESIGN IN MUNICIPALITIES, CITIES, AND PROVINCES", "decision": "REJECT / REFER"}], "proposes": "Mandates creation of a standalone Office of Architectural Planning and Design in all municipalities, cities, and provinces.", "scores": {"P1": "Fail", "P2": "Fail", "P3": "Conditional", "P4": "Fail", "P5": "Conditional", "P6": "Conditional"}, "decision": "REJECT / REFER", "rationale": "Fails P1 and P2 by imposing an entirely new mandatory office with its own staffing and infrastructure on all LGU levels, eliminating local discretion over organizational structure. Fails P4 because establishing a full separate office — beyond merely appointing an officer — multiplies unfunded costs for personnel, space, and equipment. Planning and design functions are local in nature (P3 Conditional), and a dedicated office might improve design quality (P5 Conditional), but the mandate's scale and fiscal burden are disqualifying. Architecture planning can be integrated into existing engineering/planning offices."}, {"mid": 152, "rep_title": "AN ACT MAKING THE APPOINTMENT OF A LEGAL OFFICER MANDATORY IN MUNICIPAL GOVERNMENTS, AMENDING FOR THE PURPOSE AND 481 (A", "n_bills": 3, "archetype": "Mandatory Population/Nutrition/Social Welfare/other officer", "theme": "Personnel & Mandatory Officers", "sheet_decision": "REJECT / REFER", "member_bills": [{"congress": 19, "number": 9266, "title": "AN ACT MAKING THE APPOINTMENT OF A LEGAL OFFICER MANDATORY IN MUNICIPAL GOVERNMENTS, AMENDING FOR THE PURPOSE AND 481 (A", "decision": "REJECT / REFER"}, {"congress": 19, "number": 9276, "title": "AN ACT MAKING THE APPOINTMENT OF A LEGAL OFFICER MANDATORY IN MUNICIPAL GOVERNMENTS, AMENDING FOR THE PURPOSE AND 481 (A", "decision": "REJECT / REFER"}, {"congress": 19, "number": 9330, "title": "AN ACT MAKING THE APPOINTMENT OF A LEGAL OFFICER MANDATORY IN MUNICIPAL GOVERNMENTS, AMENDING FOR THE PURPOSE AND 481 (A", "decision": "REJECT / REFER"}], "proposes": "Makes appointment of a Legal Officer mandatory in all municipal governments, amending RA 7160 Sections related to municipal officers.", "scores": {"P1": "Fail", "P2": "Fail", "P3": "Conditional", "P4": "Fail", "P5": "Conditional", "P6": "Conditional"}, "decision": "REJECT / REFER", "rationale": "Fails P1 and P2 by mandating a legal officer position for all municipalities, including small and fiscally constrained ones, without LGU-driven demand. Fails P4 because qualified lawyers command significant salaries and no funding adjustment is provided; many municipalities currently rely on shared legal services or national agency support (DOJ, OSG). Legal functions are appropriately local (P3 Conditional) and a dedicated officer could improve compliance and contract review (P5 Conditional), but the fiscal and autonomy defects are disqualifying. Pooled or shared legal services across adjacent municipalities may be the better vehicle."}, {"mid": 153, "rep_title": "AN ACT AMENDING SECTION 488 (A) OF REPUBLIC ACT NO. 7160, \"THE LOCAL GOVERNMENT CODE OF 1991”, TO MANDATE THE APPOINTMEN", "n_bills": 1, "archetype": "Mandatory Population/Nutrition/Social Welfare/other officer", "theme": "Personnel & Mandatory Officers", "sheet_decision": "REJECT / REFER", "member_bills": [{"congress": 19, "number": 9420, "title": "AN ACT AMENDING SECTION 488 (A) OF REPUBLIC ACT NO. 7160, \"THE LOCAL GOVERNMENT CODE OF 1991”, TO MANDATE THE APPOINTMEN", "decision": "REJECT / REFER"}], "proposes": "Amends Section 488(a) of RA 7160 to mandate appointment of a specific officer in component cities (likely population or welfare officer).", "scores": {"P1": "Fail", "P2": "Fail", "P3": "Conditional", "P4": "Fail", "P5": "Conditional", "P6": "Conditional"}, "decision": "REJECT / REFER", "rationale": "Amending Sec 488(a) to mandate a specific officer in component cities follows the same pattern as the broader mandatory-officer archetype: it fails P1 and P2 by removing local discretion over staffing and imposing a nationally prescribed position without demonstrated component-city demand. Fails P4 by creating an unfunded personnel mandate. The function addressed (welfare, population, or similar) may be appropriately local (P3 Conditional) and a dedicated officer may improve service monitoring (P5 Conditional), but autonomy and fiscal failures are disqualifying."}, {"mid": 154, "rep_title": "AN ACT AMENDING SECTION 386 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991", "n_bills": 7, "archetype": "Other / residual — LGU creation", "theme": "LGU Creation, Boundaries & Land", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 1934, "title": "AN ACT AMENDING SECTION 61 OF REPUBLIC ACT 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 811, "title": "AN ACT AMENDING SECTION 61 OF REPUBLIC ACT 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "number": 6686, "title": "AN ACT AMENDING SECTION 386 OF REPUBLIC ACT NO. 7160 OR THE LOCAL GOVERNMENT CODE OF 1991", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "number": 6747, "title": "AN ACT AMENDING SECTION 386 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 1540, "title": "AN ACT AMENDING SECTION 386 OF REPUBLIC ACT NO. 7160 OR THE LOCAL GOVERNMENT CODE OF 1991", "decision": "REVISE / CALIBRATE"}, {"congress": 20, "number": 926, "title": "AN ACT AMENDING SECTION 386 OF REPUBLIC ACT NO. 7160 OR THE LOCAL GOVERNMENT CODE OF 1991", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "number": 452, "title": "AN ACT AMENDING SECTION 343 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991", "decision": "REVISE / CALIBRATE"}], "proposes": "Amends Section 386 of RA 7160, which defines barangays and/or governs barangay creation criteria or administrative boundaries.", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "Pass", "P4": "Conditional", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Amending barangay creation or definition criteria is sound in direction — Section 386 standards are outdated relative to current population and territorial realities — and the barangay level is the appropriate locus (P3 Pass). However, multiple bills in the cluster take different approaches (lowering vs. tightening thresholds, administrative complaint procedures), so the specific criteria changes must be calibrated. P4 is Conditional because new barangays automatically access IRA shares and may strain existing LGU allocations without fiscal impact studies. P1, P2, P5, and P6 are all Conditional pending whether the revision expands or constrains community self-determination and whether DILG, COMELEC, and PSA coherence is addressed. Revise to specify threshold direction, require fiscal impact assessment, and align with DILG creation guidelines."}, {"mid": 155, "rep_title": "AN ACT PROVIDING COMPENSATION FOR BARANGAY OFFICIALS, AMENDING SECTION 393 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS", "n_bills": 1, "archetype": "Other / residual — Barangay governance", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 130, "title": "AN ACT PROVIDING COMPENSATION FOR BARANGAY OFFICIALS, AMENDING SECTION 393 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS", "decision": "REVISE / CALIBRATE"}], "proposes": "Provides compensation (honoraria or salary) for barangay officials by amending Section 393 of RA 7160.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Conditional", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "Compensating barangay officials strengthens the institution (P1 Pass), reflects consistent and documented demand from barangay governance stakeholders (P2 Pass), is properly assigned at the most local level (P3 Pass), and aligns with national policy direction recognizing barangay public service (P6 Pass). P4 is Conditional because the funding source — whether IRA-charged, LGSF-sourced, or nationally appropriated — must be explicitly specified to avoid an unfunded mandate on the parent LGU. P5 is Conditional because compensation improvements should be linked to performance or attendance standards to prevent moral hazard. Revise to specify funding mechanism and tie to existing DILG barangay governance performance frameworks."}, {"mid": 156, "rep_title": "AN ACT INCREASING THE MAXIMUM NUMBER OF BARANGAY PUBLIC SAFETY OFFICERS (BPSO) THEREBY AMENDING SECTION 393, PARAGRAPH (", "n_bills": 2, "archetype": "Other / residual — Barangay governance", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 710, "title": "AN ACT INCREASING THE MAXIMUM NUMBER OF BARANGAY PUBLIC SAFETY OFFICERS (BPSO) THEREBY AMENDING SECTION 393, PARAGRAPH (", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 4161, "title": "AN ACT INCREASING THE MAXIMUM NUMBER OF BARANGAY PUBLIC SAFETY OFFICERS (BPSO) THEREBY AMENDING SECTION 393, PARAGRAPH (", "decision": "REVISE / CALIBRATE"}], "proposes": "Increases the maximum number of Barangay Public Safety Officers (BPSOs) allowed per barangay, amending Section 393 of RA 7160.", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "Pass", "P4": "Conditional", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Raising the BPSO ceiling is sound in direction — it expands local flexibility rather than mandating a fixed number, which is better for autonomy (P1 Conditional: pass if it remains a ceiling, not a floor). Public safety at the barangay level is properly local (P3 Pass). P2 is Conditional because safety needs vary and demand evidence should accompany any cap change. P4 is Conditional because additional BPSOs draw honoraria from barangay budgets or parent LGU allocations with no identified supplemental funding. P5 and P6 are Conditional because the increase must align with PNP community policing standards (DILG-PNP BPSO Joint Guidelines) and include performance/accountability standards for expanded rosters. Revise to confirm ceiling-not-floor framing, identify funding, and harmonize with PNP guidelines."}, {"mid": 157, "rep_title": "AN ACT GRANTING TWENTY PERCENT (20%) DISCOUNT ON TRANSPORTATION FARE AND HOTEL ACCOMMODATION CHARGE, AMENDING FOR THE PU", "n_bills": 1, "archetype": "Other / residual — Barangay governance", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 1315, "title": "AN ACT GRANTING TWENTY PERCENT (20%) DISCOUNT ON TRANSPORTATION FARE AND HOTEL ACCOMMODATION CHARGE, AMENDING FOR THE PU", "decision": "REVISE / CALIBRATE"}], "proposes": "Grants barangay officials a 20% discount on transportation fares and hotel accommodation charges.", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "Pass", "P4": "Fail", "P5": "N/A", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "P4 Fails: the discount is mandated on private transport and hotel operators without clear compensation mechanism, constituting an unfunded mandate on the private sector and not sourced from any appropriation. The benefit is also narrow (transportation/lodging) rather than comprehensive compensation reform. Should be folded into a broader rationalized compensation package with identified funding."}, {"mid": 158, "rep_title": "AN ACT PRESCRIBING THE HONORARIA OR ALLOWANCES OF BARANGAY OFFICIALS AT MINIMUM WAGE LEVELS, AMENDING FOR THE PURPOSE SE", "n_bills": 3, "archetype": "Other / residual — Barangay governance", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 1503, "title": "AN ACT PRESCRIBING THE HONORARIA OR ALLOWANCES OF BARANGAY OFFICIALS AT MINIMUM WAGE LEVELS, AMENDING FOR THE PURPOSE SE", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "number": 4758, "title": "AN ACT PRESCRIBING THE HONORARIA OR ALLOWANCES OF BARANGAY OFFICIALS AT MINIMUM WAGE LEVELS, AMENDING FOR THE PURPOSE SE", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 3221, "title": "AN ACT PRESCRIBING THE HONORARIA OR ALLOWANCES OF BARANGAY OFFICIALS AT MINIMUM WAGE LEVELS, AMENDING FOR THE PURPOSE SE", "decision": "REVISE / CALIBRATE"}], "proposes": "Sets barangay officials' honoraria or allowances at minimum wage levels.", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "Pass", "P4": "Fail", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "P4 Fails: pegging honoraria to minimum wage without a dedicated national appropriation or IRA uplift creates a real risk of unfunded mandate on barangay funds, which vary widely across income classes. Measure's intent is sound but must identify the funding source and account for differentiated barangay fiscal capacities before adoption."}, {"mid": 159, "rep_title": "AN ACT PROVIDING FOR MONTHLY HONORARIUM FOR BARANGAY OFFICIALS AND APPROPRIATING FUNDS THEREFOR", "n_bills": 1, "archetype": "Other / residual — Barangay governance", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 1785, "title": "AN ACT PROVIDING FOR MONTHLY HONORARIUM FOR BARANGAY OFFICIALS AND APPROPRIATING FUNDS THEREFOR", "decision": "REVISE / CALIBRATE"}], "proposes": "Provides a fixed monthly honorarium for barangay officials with a specific appropriation.", "scores": {"P1": "Pass", "P2": "Conditional", "P3": "Pass", "P4": "Conditional", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "P4 is Conditional because the measure appropriates funds but the adequacy and sustainability of the appropriation across all ~42,000 barangays is unclear; without a continuing appropriation tied to an IRA share formula the mandate may still be underfunded. P2 and P6 are Conditional pending alignment with DBM/CSC compensation frameworks and local body consultations."}, {"mid": 160, "rep_title": "AN ACT DECLARING BARANGAY OFFICIALS AS REGULAR GOVERNMENT EMPLOYEES, ALLOCATING FUNDS THEREFOR, AND FOR OTHER PURPOSES", "n_bills": 1, "archetype": "Other / residual — Barangay governance", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 1811, "title": "AN ACT DECLARING BARANGAY OFFICIALS AS REGULAR GOVERNMENT EMPLOYEES, ALLOCATING FUNDS THEREFOR, AND FOR OTHER PURPOSES", "decision": "REVISE / CALIBRATE"}], "proposes": "Declares barangay officials regular government employees, with fund allocation.", "scores": {"P1": "Fail", "P2": "Conditional", "P3": "Fail", "P4": "Fail", "P5": "Conditional", "P6": "Fail"}, "decision": "REJECT / REFER", "rationale": "P1 Fails: classifying elected barangay officials as regular civil service employees fundamentally subordinates them to CSC and national employment rules, eroding their elected character and autonomy. P3 Fails: employment classification belongs under the Civil Service, not the LGC. P4 Fails: regularization triggers full GSIS/PhilHealth/leave/retirement entitlements with no credible costing or appropriation at scale. P6 Fails: incompatible with constitutional character of barangay as a political, not bureaucratic, unit. Should be referred to CSC/DBM or a standalone law with full fiscal study."}, {"mid": 161, "rep_title": "AN ACT PROVIDING FOR FINANCIAL ASSISTANCE TO BARANGAY OFFICIALS WHO HAVE SERVED FOR THREE (3) TERMS AND APPROPRIATING FU", "n_bills": 1, "archetype": "Other / residual — Barangay governance", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 2415, "title": "AN ACT PROVIDING FOR FINANCIAL ASSISTANCE TO BARANGAY OFFICIALS WHO HAVE SERVED FOR THREE (3) TERMS AND APPROPRIATING FU", "decision": "REVISE / CALIBRATE"}], "proposes": "Provides financial assistance (gratuity) to barangay officials who have completed three consecutive terms.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "The concept of a term-completion gratuity is defensible as a retention and service-recognition measure. P4 is Conditional because the appropriation must be sized to cover the universe of qualifying officials and sustained; a lump-sum without a rolling fund or IRA formula risks underfunding. P5 and P6 need performance-nexus conditions and alignment with existing retirement/gratuity schemes to avoid double-dipping."}, {"mid": 162, "rep_title": "AN ACT RATIONALIZING THE COMPENSATION AND OTHER BENEFITS OF BARANGAY OFFICIALS AND BARANGAY WORKERS, AND FOR OTHER PURPO", "n_bills": 1, "archetype": "Other / residual — Barangay governance", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 2576, "title": "AN ACT RATIONALIZING THE COMPENSATION AND OTHER BENEFITS OF BARANGAY OFFICIALS AND BARANGAY WORKERS, AND FOR OTHER PURPO", "decision": "REVISE / CALIBRATE"}], "proposes": "Rationalizes compensation and benefits of barangay officials and barangay workers comprehensively.", "scores": {"P1": "Pass", "P2": "Conditional", "P3": "Pass", "P4": "Conditional", "P5": "Pass", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "This is the most structurally sound of the cluster: a rationalization approach avoids piecemeal mandates and can tie compensation to barangay income class. P4 is Conditional because 'rationalization' must be backed by a funding formula (IRA share or national subsidy) with income-class differentiation or lower-income barangays will face an unfunded mandate. P2 is Conditional pending evidence of LGU/barangay federation consultation."}, {"mid": 163, "rep_title": "AN ACT GRANTING TWENTY PERCENT (20%) DISCOUNT ON TRANSPORTATION FARE, AMENDING FOR THE PURPOSE SECTION 393 OF REPUBLIC A", "n_bills": 1, "archetype": "Other / residual — Barangay governance", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 2701, "title": "AN ACT GRANTING TWENTY PERCENT (20%) DISCOUNT ON TRANSPORTATION FARE, AMENDING FOR THE PURPOSE SECTION 393 OF REPUBLIC A", "decision": "REVISE / CALIBRATE"}], "proposes": "Grants barangay officials a 20% discount on transportation fares only (narrower than mid 157).", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "Pass", "P4": "Fail", "P5": "N/A", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Substantively identical to mid 157 but limited to transport. P4 Fails for the same reason: imposes discount obligation on private carriers without compensation or appropriation. Piecemeal perks approach is inferior to comprehensive reform; should be consolidated into mid 162-type omnibus measure with proper funding."}, {"mid": 164, "rep_title": "AN ACT PROVIDING COMPENSATION TO BARANGAY OFFICIALS AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS T", "n_bills": 1, "archetype": "Other / residual — Barangay governance", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 2721, "title": "AN ACT PROVIDING COMPENSATION TO BARANGAY OFFICIALS AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS T", "decision": "REVISE / CALIBRATE"}], "proposes": "Provides compensation (unspecified amount/structure) to barangay officials, amending RA 7160.", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "Pass", "P4": "Fail", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Insufficient title detail to assess the compensation structure; the open-ended framing without stated funding source or amount triggers a P4 Fail for potential unfunded mandate. The measure must specify compensation levels, income-class differentiation, and a funding mechanism before it can be recommended for adoption."}, {"mid": 165, "rep_title": "AN ACT PROVIDING FIXED COMPENSATION TO ELECTIVE BARANGAY OFFICIALS AMENDING FOR THIS PURPOSE REPUBLIC ACT 7160 AND APPRO", "n_bills": 1, "archetype": "Other / residual — Barangay governance", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 3016, "title": "AN ACT PROVIDING FIXED COMPENSATION TO ELECTIVE BARANGAY OFFICIALS AMENDING FOR THIS PURPOSE REPUBLIC ACT 7160 AND APPRO", "decision": "REVISE / CALIBRATE"}], "proposes": "Provides fixed (flat) compensation to elective barangay officials, amending RA 7160, with appropriation.", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "Pass", "P4": "Conditional", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "A flat fixed compensation ignores the vast income-class disparity among barangays; P4 is Conditional because small/low-income barangays may not be able to sustain uniform amounts even with an appropriation. P1 and P6 are Conditional as a one-size-fits-all figure may distort local fiscal priorities. Revision should introduce income-class-graduated rates tied to an adequate IRA formula."}, {"mid": 166, "rep_title": "AN ACT PROVIDING SOCIAL SECURITY BENEFITS FOR BARANGAY OFFICIALS AND VOLUNTEER WORKERS, APPROPRIATING FUNDS THEREFOR AND", "n_bills": 3, "archetype": "Other / residual — Barangay governance", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 3443, "title": "AN ACT PROVIDING SOCIAL SECURITY BENEFITS FOR BARANGAY OFFICIALS AND VOLUNTEER WORKERS, APPROPRIATING FUNDS THEREFOR AND", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "number": 6641, "title": "AN ACT PROVIDING SOCIAL SECURITY BENEFITS FOR BARANGAY OFFICIALS AND VOLUNTEER WORKERS, APPROPRIATING FUNDS THEREFOR AND", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "number": 9163, "title": "AN ACT PROVIDING SOCIAL SECURITY BENEFITS FOR BARANGAY OFFICIALS AND VOLUNTEER WORKERS, APPROPRIATING FUNDS THEREFOR AND", "decision": "REVISE / CALIBRATE"}], "proposes": "Provides Social Security benefits for barangay officials and volunteer workers, with appropriation.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Pass", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Social security coverage for barangay volunteers is a widely-supported welfare measure that aligns with national social protection goals. P4 is Conditional: SSS/GSIS premium obligations must be fully costed and the appropriation sized to cover all ~42,000 barangays' volunteer corps sustainably. P6 is Conditional pending coordination with SSS/GSIS on coverage category to avoid duplicate or conflicting schemes."}, {"mid": 167, "rep_title": "AN ACT PROVIDING SOCIAL SECURITY AND NON-MONETARY BENEFITS TO ALL BARANGAY OFFICIALS, WORKERS AND VOLUNTEERS, APPROPRIAT", "n_bills": 1, "archetype": "Other / residual — Barangay governance", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 5429, "title": "AN ACT PROVIDING SOCIAL SECURITY AND NON-MONETARY BENEFITS TO ALL BARANGAY OFFICIALS, WORKERS AND VOLUNTEERS, APPROPRIAT", "decision": "REVISE / CALIBRATE"}], "proposes": "Provides both social security and non-monetary benefits to all barangay officials, workers, and volunteers, with appropriation.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Pass", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Broader than mid 166, covering non-monetary benefits as well; directionally sound and more comprehensive. P4 remains Conditional because 'non-monetary benefits' (health, housing, education) add fiscal complexity and must be individually costed and sourced. P6 is Conditional to ensure non-monetary benefits do not duplicate existing programs (PhilHealth, Pag-IBIG, DepEd scholarships). Consolidation with mid 166 is advisable."}, {"mid": 168, "rep_title": "AN ACT DECLARING BARANGAY OFFICIALS AS REGULAR GOVERNMENT EMPLOYEES, GRANTING THEM FIXED SALARIES AND OTHER BENEFITS AND", "n_bills": 1, "archetype": "Other / residual — Barangay governance", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 6283, "title": "AN ACT DECLARING BARANGAY OFFICIALS AS REGULAR GOVERNMENT EMPLOYEES, GRANTING THEM FIXED SALARIES AND OTHER BENEFITS AND", "decision": "REVISE / CALIBRATE"}], "proposes": "Declares barangay officials regular government employees, grants fixed salaries and other benefits.", "scores": {"P1": "Fail", "P2": "Conditional", "P3": "Fail", "P4": "Fail", "P5": "Conditional", "P6": "Fail"}, "decision": "REJECT / REFER", "rationale": "Functionally identical to mid 160 with the addition of fixed salaries. All the same core failures apply: P1 Fails because regularizing elected officials under CSC displaces their elected autonomous character; P3 Fails because employment classification belongs outside the LGC; P4 Fails because full salary plus benefits for ~42,000 barangays' full official rosters is fiscally uncostable without a massive dedicated appropriation; P6 Fails as incompatible with the constitutional status of barangays as political subdivisions. Must be referred to a joint CSC-DBM-DILG study with full constitutional review."}, {"mid": 169, "rep_title": "AN ACT PROVIDING FOR FIXED SALARIES OF BARANGAY OFFICIALS AND SUCH OTHER BENEFITS BEING RECEIVED BY REGULAR GOVERNMENT E", "n_bills": 1, "archetype": "Other / residual — Barangay governance", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 6751, "title": "AN ACT PROVIDING FOR FIXED SALARIES OF BARANGAY OFFICIALS AND SUCH OTHER BENEFITS BEING RECEIVED BY REGULAR GOVERNMENT E", "decision": "REVISE / CALIBRATE"}], "proposes": "Grants barangay officials fixed salaries and full government employee benefits in place of the current honoraria system.", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "Pass", "P4": "Fail", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "P4 Fail is binding: the bill imposes a nationally-mandated salary structure on barangay governments without identifying a clear, sufficient funding source, creating a classic unfunded mandate. P1 is only Conditional because a uniform national salary schedule also diminishes LGU discretion over internal compensation. Revision must link salary levels to a tiered NTA supplement or define a national subsidy mechanism, and tie benefit improvements to a performance/accountability framework (P5)."}, {"mid": 170, "rep_title": "AN ACT AMENDING SECTIONS 2 A, C, AND SECTIONS 3 A,B, AND C OF REPUBLIC ACT NO. 10955 OR THE ACT DIVIDING BARANGAY DUMALN", "n_bills": 1, "archetype": "Other / residual — Barangay governance", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 9335, "title": "AN ACT AMENDING SECTIONS 2 A, C, AND SECTIONS 3 A,B, AND C OF REPUBLIC ACT NO. 10955 OR THE ACT DIVIDING BARANGAY DUMALN", "decision": "REVISE / CALIBRATE"}], "proposes": "Amends RA 10955 to adjust the territorial boundaries and composition of Barangay Dumalnog following an earlier division.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Pass", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "The measure is locally specific and presumed community-initiated, clearing P1-P4. P6 is Conditional because boundary amendments must strictly follow the DILG/Sanggunian plebiscite and certification requirements under RA 7160; the bill should explicitly confirm compliance with those procedures. P5 is Conditional pending confirmation that the amended delineation includes updated cadastral data and a proper plebiscite result. These are fixable procedural gaps, not substantive failures."}, {"mid": 171, "rep_title": "AN ACT GRANTING BARANGAY OFFICIALS TWENTY PERCENT (20%) DISCOUNT ON TRANSPORTATION FARE, AMENDING FOR THE PURPOSE SECTIO", "n_bills": 1, "archetype": "Other / residual — Barangay governance", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 19, "number": 5237, "title": "AN ACT GRANTING BARANGAY OFFICIALS TWENTY PERCENT (20%) DISCOUNT ON TRANSPORTATION FARE, AMENDING FOR THE PURPOSE SECTIO", "decision": "REVISE / CALIBRATE"}], "proposes": "Grants barangay officials a 20% discount on transportation fares by amending the LGC.", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "Pass", "P4": "Fail", "P5": "N/A", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "P4 Fail is decisive: the discount shifts a fiscal burden to private transport operators without compensation, replicating a constitutionally contested mechanism that the Supreme Court has previously scrutinized. P2 is Conditional because the measure is legislatively driven rather than LGU- or community-initiated. P6 is Conditional given the proliferating landscape of mandated discounts; a holistic review of all operator-borne discount obligations is warranted. Revision should either appropriate government reimbursement for operators or limit the benefit to an LGU-funded transportation allowance."}, {"mid": 172, "rep_title": "AN ACT TO PROMOTE THE WELFARE OF BARANGAY OFFICIALS, AMENDING FOR THIS PURPOSE SECTION 393 OF REPUBLIC ACT NO. 7160 OTHE", "n_bills": 1, "archetype": "Other / residual — Barangay governance", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 19, "number": 7543, "title": "AN ACT TO PROMOTE THE WELFARE OF BARANGAY OFFICIALS, AMENDING FOR THIS PURPOSE SECTION 393 OF REPUBLIC ACT NO. 7160 OTHE", "decision": "REVISE / CALIBRATE"}], "proposes": "Amends Section 393 of RA 7160 to promote the welfare of barangay officials through enhanced benefits and allowances.", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "Pass", "P4": "Conditional", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "The direction is sound — improving barangay official welfare addresses a genuine gap — but multiple Conditionals converge on fiscal and performance concerns. P4 is Conditional because the source of enhanced benefits (LGU own-source, NTA, or national subsidy) is unspecified; for 5th/6th class barangays this risks an unfunded mandate. P5 is Conditional because enhanced benefits should be paired with clearer accountability and performance metrics. Revision should specify tiered benefit levels by barangay income class and link increases to an identified funding stream."}, {"mid": 173, "rep_title": "AN ACT REDEFINING THE COMPOSITION OF BARANGAY OFFICIALS AND PROVIDING FOR ADDITIONAL SUPPORT AND COMPENSATION FOR BARANG", "n_bills": 1, "archetype": "Other / residual — Barangay governance", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 20, "number": 963, "title": "AN ACT REDEFINING THE COMPOSITION OF BARANGAY OFFICIALS AND PROVIDING FOR ADDITIONAL SUPPORT AND COMPENSATION FOR BARANG", "decision": "REVISE / CALIBRATE"}], "proposes": "Redefines the composition of barangay officials and provides additional compensation and support for barangay governance.", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "Conditional", "P4": "Fail", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "P4 Fail is binding: expanding the roster of barangay officials and mandating additional compensation without a corresponding NTA supplement or national subsidy imposes an unfunded mandate on resource-constrained barangays. P3 is Conditional because redefining official composition at the national level risks overriding legitimate local organizational discretion. Revision must couple any composition change with a fiscal impact study and an explicit funding mechanism tied to barangay income classification."}, {"mid": 174, "rep_title": "AN ACT STRENGTHENING THE BARANGAY DAY CARE SYSTEM, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 6972 OTHERWISE KNOWN AS THE", "n_bills": 1, "archetype": "Other / residual — Basic services", "theme": "Service Delivery & Devolution", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 6028, "title": "AN ACT STRENGTHENING THE BARANGAY DAY CARE SYSTEM, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 6972 OTHERWISE KNOWN AS THE", "decision": "REVISE / CALIBRATE"}], "proposes": "Strengthens the Barangay Day Care System by amending RA 6972, raising standards for day care workers, facilities, and services devolved to barangays.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "The subsidiarity rationale is strong and community need is clear (P1-P3 Pass). P4 is Conditional because higher standards — better-paid day care workers, upgraded facilities — translate into higher recurrent costs for barangays whose NTA share has not been commensurately increased; a fiscal note and funding plan are required. P6 is Conditional because the measure must align with DSWD's Early Childhood Care and Development standards and the Implementing Rules of RA 11229. Revision should specify national co-funding or NTA supplementation to avoid a de facto unfunded mandate on smaller barangays."}, {"mid": 175, "rep_title": "AN ACT REPEALING ACT NO. 7160 ALSO KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991, SECTION 17 (B), PARAGRAPH 1(V), ON THE OB", "n_bills": 1, "archetype": "Other / residual — Basic services", "theme": "Service Delivery & Devolution", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 9120, "title": "AN ACT REPEALING ACT NO. 7160 ALSO KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991, SECTION 17 (B), PARAGRAPH 1(V), ON THE OB", "decision": "REVISE / CALIBRATE"}], "proposes": "Repeals Section 17(B)(1)(v) of RA 7160, removing a mandatory barangay basic-service obligation.", "scores": {"P1": "Fail", "P2": "Conditional", "P3": "Fail", "P4": "Conditional", "P5": "Fail", "P6": "Fail"}, "decision": "REJECT / REFER", "rationale": "Three core-principle Fails make this unredeemable as drafted. P3 Fail: removing a devolved function from the barangay level contradicts subsidiarity by pushing responsibility back to a higher tier or into a vacuum. P1 Fail: stripping a barangay of a statutory service function reduces, not strengthens, local autonomy and self-governance capacity. P5 Fail: eliminating a statutory obligation without a replacement accountability mechanism weakens the duty-of-service regime. P6 Fail: reversing a devolution commitment undermines national-local coherence and the Mandanas ruling trajectory toward deeper devolution. The measure should be referred for a full devolution-impact review; if the barangay obligation is truly unperformable, the appropriate remedy is enhanced resourcing, not repeal."}, {"mid": 176, "rep_title": "AN ACT AMENDING SECTION 16 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991, AND FOR OTHER", "n_bills": 1, "archetype": "Other / residual — Basic services", "theme": "Service Delivery & Devolution", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 19, "number": 5772, "title": "AN ACT AMENDING SECTION 16 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991, AND FOR OTHER", "decision": "REVISE / CALIBRATE"}], "proposes": "Amends Section 16 of RA 7160 (the General Welfare Clause) to expand or clarify the scope of LGU powers.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Amending the General Welfare Clause is high-leverage and directionally sound — a broader, clearer clause strengthens autonomy (P1), subsidiarity (P3), and reflects broad LGU advocacy (P2). P4 is Conditional because an expanded welfare mandate could generate additional service obligations without accompanying fiscal authority; revision must ensure any new scope is matched by enabling revenue powers or NTA adjustments. P6 is Conditional because expansions of Sec 16 must be harmonized with sector-specific national laws that set concurrent or exclusive national authority. Drafters should include a non-diminution clause and an enabling provision for local revenue generation to finance expanded welfare functions."}, {"mid": 177, "rep_title": "AN ACT AMENDING SECTION 17 OF REPUBLIC ACT NO. 8550 ENTITLED “AN ACT PROVIDING FOR THE DEVELOPMENT, MANAGEMENT AND CONSE", "n_bills": 1, "archetype": "Other / residual — Basic services", "theme": "Service Delivery & Devolution", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 20, "number": 2152, "title": "AN ACT AMENDING SECTION 17 OF REPUBLIC ACT NO. 8550 ENTITLED “AN ACT PROVIDING FOR THE DEVELOPMENT, MANAGEMENT AND CONSE", "decision": "REVISE / CALIBRATE"}], "proposes": "Amends Section 17 of RA 8550 (Philippine Fisheries Code) to adjust LGU roles in fisheries development, management, and conservation.", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "Pass", "P4": "Conditional", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Subsidiarity is served if the amendment devolves more fisheries management to LGUs (P3 Pass). However, P1 is Conditional because the amendment could also impose stricter national mandates on LGUs rather than grant autonomy. P4 is Conditional since fisheries enforcement and conservation carry recurrent costs (coast watch, licensing, habitat monitoring) that must be matched by identified funding. P6 is Conditional given the need to coordinate with BFAR, DA, and the fisheries sector; the bill primarily belongs in RA 8550 reform rather than the LGC, so DILG-DA inter-agency alignment should be confirmed. Revision should clarify whether the LGU role is discretionary or mandatory and identify a co-financing arrangement."}, {"mid": 178, "rep_title": "AN ACT INSTITUTIONALIZING AN INFORMATION AND COMMUNICATIONS TECHNOLOGY OFFICER IN ALL LOCAL GOVERNMENT UNITS, PROVIDING", "n_bills": 1, "archetype": "Other / residual — Digital governance & ICT capacity", "theme": "Service Delivery & Devolution", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 19, "number": 3594, "title": "AN ACT INSTITUTIONALIZING AN INFORMATION AND COMMUNICATIONS TECHNOLOGY OFFICER IN ALL LOCAL GOVERNMENT UNITS, PROVIDING", "decision": "REVISE / CALIBRATE"}], "proposes": "Mandates the creation of an ICT Officer position in every LGU to institutionalize digital governance capacity.", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "Pass", "P4": "Fail", "P5": "Pass", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "P4 Fail is binding: mandating a new plantilla item across all LGUs — including 5th and 6th class municipalities with severely constrained budgets — without a national subsidy or NTA supplement constitutes an unfunded mandate. P1 is Conditional because a nationally mandated organizational structure limits LGU discretion over their own offices. P2 is Conditional because while urban LGUs may demand this, many rural LGUs have not. P6 is Conditional because the position must align with CSC classification standards and DICT's e-Government framework. Revision should allow 5th/6th class LGUs to designate an existing officer as concurrent ICT focal point, reserve mandatory creation of a dedicated position for higher-income LGUs, and provide a capacity-building fund."}, {"mid": 179, "rep_title": "AN ACT MANDATING THE LOCAL GOVERNMENT UNITS TO APPROPRIATE NO LESS THAN FOUR PERCENT (4%) OF ITS NATIONAL TAX ALLOTMENT", "n_bills": 1, "archetype": "Other / residual — Digital governance & ICT capacity", "theme": "Service Delivery & Devolution", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 20, "number": 3807, "title": "AN ACT MANDATING THE LOCAL GOVERNMENT UNITS TO APPROPRIATE NO LESS THAN FOUR PERCENT (4%) OF ITS NATIONAL TAX ALLOTMENT", "decision": "REVISE / CALIBRATE"}], "proposes": "Mandates LGUs to appropriate at least 4% of their National Tax Allotment (NTA) for ICT infrastructure and digital services.", "scores": {"P1": "Fail", "P2": "Conditional", "P3": "Pass", "P4": "Fail", "P5": "Pass", "P6": "Conditional"}, "decision": "REJECT / REFER", "rationale": "Two Fail verdicts on core principles are disqualifying. P1 Fail: adding another NTA earmark compounds the existing regime of mandatory set-asides (20% development fund, Sagip Saka, etc.), materially narrowing LGU budget autonomy — the opposite of genuine self-governance. P4 Fail: a blanket 4% earmark ignores wide disparities in LGU fiscal capacity and service priorities; for lower-income LGUs already constrained by multiple earmarks, this could crowd out urgent basic services, functioning as a regressive unfunded obligation. The ICT goal is valid but the earmark instrument is wrong; the measure should be referred to a broader NTA earmark rationalization process, and ICT investment should instead be incentivized through a matching-grant program or a DICT co-financing window."}, {"mid": 180, "rep_title": "AN ACT FURTHER STRENGTHENING THE AUTONOMY OF LOCAL GOVERNMENT UNITS, AMENDING FOR THE PURPOSE SECTION 16 AND SECTION 41", "n_bills": 2, "archetype": "Other / residual — Elections", "theme": "Elections & Terms", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 5671, "title": "AN ACT FURTHER STRENGTHENING THE AUTONOMY OF LOCAL GOVERNMENT UNITS, AMENDING FOR THE PURPOSE SECTION 16 AND SECTION 41", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "number": 7248, "title": "AN ACT FURTHER STRENGTHENING THE AUTONOMY OF LOCAL GOVERNMENT UNITS, AMENDING FOR THE PURPOSE SECTION 16 AND SECTION 41", "decision": "REVISE / CALIBRATE"}], "proposes": "Amends Sections 16 and 41 of RA 7160 to further strengthen LGU autonomy, including adjusting qualifications for elective local officials.", "scores": {"P1": "Pass", "P2": "Conditional", "P3": "Pass", "P4": "Pass", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "The autonomy-strengthening intent is clear and aligned with
