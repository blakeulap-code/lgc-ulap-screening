tionale": "Pegging to minimum wage creates automatic escalation tied to RTWPB orders, generating an open-ended unfunded mandate that smaller barangays cannot absorb (P4 Fail). The regional differentiation is conceptually coherent (P6 Conditional) but the automatic escalation mechanism without a corresponding funding formula is the critical flaw. Revise with a dynamic funding formula that adjusts IRA/barangay share in step with minimum wage increases."}, {"mid": 10, "rep_title": "AN ACT INCREASING THE BENEFITS OF BARANGAY OFFICIALS AMENDING FOR THIS PURPOSE PARAGRAPH (A), SECTION 393, CHAPTER IV, B", "n_bills": 2, "archetype": "Increase honoraria / compensation / salaries of barangay officials", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 5695, "title": "AN ACT INCREASING THE BENEFITS OF BARANGAY OFFICIALS AMENDING FOR THIS PURPOSE PARAGRAPH (A), SECTION 393, CHAPTER IV, B", "decision": "REVISE / CALIBRATE"}, {"congress": 20, "number": 3505, "title": "AN ACT INCREASING THE BENEFITS OF BARANGAY OFFICIALS, AMENDING FOR THE PURPOSE PARAGRAPH (A), SECTION 393, CHAPTER IV, T", "decision": "REVISE / CALIBRATE"}], "proposes": "Increase benefits of barangay officials by amending Section 393(a) of RA 7160.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Fail", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Substantively identical to mid 3 — a straightforward honoraria increase amending the same provision without a funding clause. P4 Fails on the same unfunded mandate grounds. Revise to add appropriation or IRA adjustment mechanism before adoption."}, {"mid": 11, "rep_title": "AN ACT INCREASING THE BENEFITS OF BARANGAY OFFICIALS, AMENDING FOR THE PURPOSE SECTION 393 OF REPUBLIC ACT NO. 7160 OTHE", "n_bills": 1, "archetype": "Increase honoraria / compensation / salaries of barangay officials", "theme": "Barangay Governance", "sheet_decision": "REVISE y."}, {"mid": 13, "rep_title": "AN ACT STANDARDIZING THE COMPENSATION AND BENEFITS OF BARANGAY OFFICIALS, AMENDING FOR THE PURPOSE SECTION 393 OF THE LO", "n_bills": 1, "archetype": "Increase honoraria / compensation / salaries of barangay officials", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 19, "number": 1933, "title": "AN ACT STANDARDIZING THE COMPENSATION AND BENEFITS OF BARANGAY OFFICIALS, AMENDING FOR THE PURPOSE SECTION 393 OF THE LO", "decision": "REVISE / CALIBRATE"}], "proposes": "Standardize compensation and benefits of barangay officials by amending Section 393 of RA 7160.", "scores": {"P1": "Conditional", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Pass", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "Standardization is directionally sound and responds to longstanding equity gaps (P2, P6), but uniform national rates risk overriding wealthier LGUs' autonomy to pay more (P1 Conditional) and may create an unfunded mandate for fiscally constrained barangays unless a dedicated national subsidy or IRA adjustment is built in (P4 Conditional). Bill should specify funding source and allow LGUs to exceed the floor."}, {"mid": 14, "rep_title": "AN ACT INCREASING THE ALLOWANCES OF BARANGAY OFFICIALS, GRANTING HONORARIA AND OTHER BENEFITS TO THE BARANGAY WORKERS WH", "n_bills": 1, "archetype": "Increase honoraria / compensation / salaries of barangay officials", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 19, "number": 2349, "title": "AN ACT INCREASING THE ALLOWANCES OF BARANGAY OFFICIALS, GRANTING HONORARIA AND OTHER BENEFITS TO THE BARANGAY WORKERS WH", "decision": "REVISE / CALIBRATE"}], "proposes": "Increase allowances of barangay officials and grant honoraria and other benefits to barangay workers.", "scores": {"P1": "Conditional", "P2": "Pass", "P3": "Pass", "P4": "Fail", "P5": "Pass", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "The expansion to barangay workers beyond elected officials creates a broader fiscal exposure. Without an identified national appropriation or IRA uplift, this constitutes an unfunded mandate on barangays with thin revenue bases (P4 Fail). The coverage of 'barangay workers' also needs definitional clarity to ensure coherence across LGUs (P6 Conditional). Revise to include explicit funding mechanism and clear scope definition."}, {"mid": 15, "rep_title": "AN ACT STANDARDIZING THE SALARIES AND BENEFITS OF BARANGAY OFFICIALS, AMENDING SECTION 393(N) OF REPUBLIC ACT NO. 7160,", "n_bills": 4, "archetype": "Increase honoraria / compensation / salaries of barangay officials", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 19, "number": 4066, "title": "AN ACT STANDARDIZING THE SALARIES AND BENEFITS OF BARANGAY OFFICIALS, AMENDING SECTION 393(N) OF REPUBLIC ACT NO. 7160,", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 6114, "title": "AN ACT STANDARDIZING THE SALARIES AND BENEFITS OF BARANGAY OFFICIALS, AMENDING SECTION 393(N) OF REPUBLIC ACT NO. 7160,", "decision": "REVISE / CALIBRATE"}, {"congress": 20, "number": 383, "title": "AN ACT STANDARDIZING THE SALARIES AND BENEFITS OF BARANGAY OFFICIALS, AMENDING SECTION 393(N) OF REPUBLIC ACT NO. 7160,", "decision": "REVISE / CALIBRATE"}, {"congress": 20, "number": 4521, "title": "AN ACT STANDARDIZING THE SALARIES AND BENEFITS OF BARANGAY OFFICIALS, AMENDING SECTION 393(N) OF REPUBLIC ACT NO. 7160,", "decision": "REVISE / CALIBRATE"}], "proposes": "Standardize salaries and benefits of barangay officials by amending Section 393(n) of RA 7160.", "scores": {"P1": "Conditional", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Pass", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "Amending Section 393(n) specifically narrows the scope compared to mid 13, which is positive for coherence. However, the same tension applies: national salary standardization may cap wealthier barangays (P1 Conditional) and imposes costs on poor ones without guaranteed funding (P4 Conditional). Revise to treat the national rate as a floor and tie implementation to an IRA or GFFS supplement."}, {"mid": 16, "rep_title": "AN ACT AMENDING REPUBLIC ACT NO. 8291, ALSO KNOWN AS THE GOVERNMENT SERVICE INSURANCE SYSTEM ACT OF 1997, EXPANDING THE", "n_bills": 1, "archetype": "Insurance / hospitalization / death & burial benefits for barangay officials & workers", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 2298, "title": "AN ACT AMENDING REPUBLIC ACT NO. 8291, ALSO KNOWN AS THE GOVERNMENT SERVICE INSURANCE SYSTEM ACT OF 1997, EXPANDING THE", "decision": "REVISE / CALIBRATE"}], "proposes": "Amend the GSIS Act of 1997 to expand coverage to include barangay officials.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Pass", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "GSIS expansion is a recognized social protection measure with strong legitimacy (P2) and national coherence (P6). The main concern is actuarial sustainability and who shoulders premium contributions — if barangays must remit employer shares from their own budgets without augmentation, it creates fiscal stress (P4 Conditional). Revise to specify premium-sharing arrangement and actuarial study requirement."}, {"mid": 17, "rep_title": "AN ACT SEEKING TO INCLUDE BARANGAY OFFICIALS IN THE COMPULSORY MEMBERSHIP OF THE GOVERNMENT SERVICE INSURANCE SYSTEM (GS", "n_bills": 2, "archetype": "Insurance / hospitalization / death & burial benefits for barangay officials & workers", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 3017, "title": "AN ACT SEEKING TO INCLUDE BARANGAY OFFICIALS IN THE COMPULSORY MEMBERSHIP OF THE GOVERNMENT SERVICE INSURANCE SYSTEM (GS", ", "rationale": "Covering multiple categories of quasi-volunteer barangay workers under a retirement scheme is noble but creates substantial long-term fiscal liability with no identified funding mechanism (P4 Fail). Eligibility criteria and benefit computation must be defined consistently to avoid arbitrary variation across barangays (P5 Conditional, P6 Conditional). Revise to establish a national trust fund or actuarially sound pooled mechanism before mandating benefits."}, {"mid": 20, "rep_title": "AN ACT PROVIDING ALL BARANGAY OFFICIALS, INCLUDING BARANGAY TANODS, BARANGAY HEALTH WORKERS AND BARANGAY DAY CARE WORKER", "n_bills": 1, "archetype": "Retirement / lump-sum / pension / gratuity for barangay officials", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 1085, "title": "AN ACT PROVIDING ALL BARANGAY OFFICIALS, INCLUDING BARANGAY TANODS, BARANGAY HEALTH WORKERS AND BARANGAY DAY CARE WORKER", "decision": "REVISE / CALIBRATE"}], "proposes": "Provide retirement benefits to barangay officials, tanods, health workers, and day care workers.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Fail", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Virtually identical to mid 19 in scope and structure; the same fiscal sustainability concern governs (P4 Fail). The proliferation of near-identical bills (19-22) itself signals the need for a single consolidated, costed measure. Revise and consolidate with a defined financing vehicle and uniform eligibility rules."}, {"mid": 21, "rep_title": "AN ACT PROVIDING RETIREMENT BENEFIT TO BARANGAY OFFICIALS, BARANGAY TANODS, MEMBERS OF THE LUPON NG TAGAPAMAYAPA, BARANG", "n_bills": 1, "archetype": "Retirement / lump-sum / pension / gratuity for barangay officials", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 1161, "title": "AN ACT PROVIDING RETIREMENT BENEFIT TO BARANGAY OFFICIALS, BARANGAY TANODS, MEMBERS OF THE LUPON NG TAGAPAMAYAPA, BARANG", "decision": "REVISE / CALIBRATE"}], "proposes": "Provide retirement benefits to barangay officials, tanods, Lupon members, and barangay health workers.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Fail", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Same substantive analysis as mids 19-20. The coverage of Lupon ng Tagapamayapa members (who serve in a quasi-judicial volunteer capacity) alongside tanods and health workers raises definitional complexity for consistent benefit administration (P5 Conditional). Funding mechanism absent (P4 Fail). Should be folded into a single consolidated retirement bill with actuarial grounding."}, {"mid": 22, "rep_title": "AN ACT PROVIDING ALL BARANGAY OFFICIALS, INCLUDING BARANGAY TANODS AND MEMBERS OF THE LUPONG TAGAPAMAYAPA, A LUMP SUM GR", "n_bills": 1, "archetype": "Retirement / lump-sum / pension / gratuity for barangay officials", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 3039, "title": "AN ACT PROVIDING ALL BARANGAY OFFICIALS, INCLUDING BARANGAY TANODS AND MEMBERS OF THE LUPONG TAGAPAMAYAPA, A LUMP SUM GR", "decision": "REVISE / CALIBRATE"}], "proposes": "Provide barangay officials, tanods, and Lupong Tagapamayapa members a lump-sum gratuity.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Pass", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "A lump-sum gratuity (one-time payment) is fiscally less burdensome than an ongoing pension, improving P4 to Conditional rather than Fail. However, the source of funds — whether national appropriation or barangay budget — must be specified. The lump-sum model is more administratively transparent (P5 Pass) and easier to standardize (P6 Pass). Revise to identify a clear appropriation line and set objective eligibility thresholds."}, {"mid": 23, "rep_title": "AN ACT GRANTING RETIREMENT BENEFITS TO ALL BARANGAY OFFICIALS WHO HAVE RENDERED AT LEAST 3 (THREE) TERMS OF CONTINUOUS S", "n_bills": 1, "archetype": "Retirement / lump-sum / pension / gratuity for barangay officials", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 4396, "title": "AN ACT GRANTING RETIREMENT BENEFITS TO ALL BARANGAY OFFICIALS WHO HAVE RENDERED AT LEAST 3 (THREE) TERMS OF CONTINUOUS S", "decision": "REVISE / CALIBRATE"}], "proposes": "Grant retirement benefits to barangay officials who have rendered at least three consecutive terms of service.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Pass", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "The three-term minimum service requirement significantly narrows eligibility compared to mids 19-21, making the fiscal exposure more bounded and the benefit more defensible as earned entitlement (P4 improves to Conditional). Accountability is strengthened by the service threshold (P5 Pass). Revise primarily to identify a funding stream and ensure the three-term rule is counted consistently with the term-limit framework of RA 7160."}, {"mid": 24, "rep_title": "AN ACT GRANTING RETIREMENT BENEFITS TO ALL ELECTIVE OR APPOINTIVE BARANGAY OFFICIALS WHO HAVE RENDERED A CONSECUTIVE PER", "n_bills": 1, "archetype": "Retirement / lump-sum / pension / gratuity for barangay officials", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 9476, "title": "AN ACT GRANTING RETIREMENT BENEFITS TO ALL ELECTIVE OR APPOINTIVE BARANGAY OFFICIALS WHO HAVE RENDERED A CONSECUTIVE PER", "decision": "REVISE / CALIBRATE"}], "proposes": "Grant retirement benefits to elective or appointive barangay officials who have rendered a consecutive period of service.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Covering both elective and appointive officials is broad; the phrase 'consecutive period' without a specified minimum is vague and could be interpreted inconsistently across barangays (P5 Conditional, P6 Conditional). Fiscal exposure is open-ended without a defined service threshold (P4 Conditional). Revise to specify the minimum service period, cap benefit computation, and designate a funding mechanism."}, {"mid": 25, "rep_title": "AN ACT GRANTING RETIREMENT GRATUITY BENEFITS TO APPOINTIVE AND ELECTIVE BARANGAY OFFICIALS, AMENDING FOR THE PURPOSE REP", "n_bills": 1, "archetype": "Retirement / lump-sum / pension / gratuity for barangay officials", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 19, "number": 3599, "title": "AN ACT GRANTING RETIREMENT GRATUITY BENEFITS TO APPOINTIVE AND ELECTIVE BARANGAY OFFICIALS, AMENDING FOR THE PURPOSE REP", "decision": "REVISE / CALIBRATE"}], "proposes": "Grant retirement gratuity benefits to both appointive and elective barangay officials by amending RA 7160.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Gratuity benefits for barangay officials are a legitimate recognition of service and support autonomy (P1) and community-level governance (P3). However, the measure must specify a clear, sustainable funding source — whether from the national government or barangay funds — to avoid an unfunded mandate (P4). Eligibility conditions, audit requirements, and anti-double compensation safeguards must be built in (P5), and coverage of both appointive and elective officials must align with existing civil service frameworks (P6)."}, {"mid": 26, "rep_title": "AN ACT STRENGTHENING THE BARANGAY AS THE BASIC LOCAL GOVERNMENT UNIT BY INCREASING ITS CAPACITY TO DELIVER SERVICES, PRO", "n_bills": 5, "archetype": "Retirement / lump-sum / pension / gratuity for barangay officials", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 19, "number": 3701, "title": "AN ACT STRENGTHENING THE BARANGAY AS THE BASIC LOCAL GOVERNMENT UNIT BY INCREASING ITS CAPACITY TO DELIVER SERVICES, PRO", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 8493, "title": "AN ACT STRENGTHENING THE BARANGAY AS THE BASIC LOCAL GOVERNMENT UNIT BY INCREASING ITS CAPACITY TO DELIVER SERVICES, PRO", "decision": "REVISE / CALIBRATE"}, {"congress": 20, "number": 532, "title": "AN ACT STRENGTHENING THE BARANGAY AS THE BASIC LOCAL GOVERNMENT UNIT BY INCREASING ITS CAPACITY TO DELIVER SERVICES, PRO", "decision": "REVISE / CALIBRATE"}, {"congress": 20, "number": 583, "title": "AN ACT STRENGTHENING THE BARANGAY AS THE BASIC LOCAL GOVERNMENT UNIT BY INCREASING ITS CAPACITY TO DELIVER SERVICES, PRO", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 5309, "title": "AN ACT STRENGTHENING THE BARANGAY AS THE BASIC LOCAL GOVERNMENT UNIT BY INCREASING ITS CAPACITY TO DELIVER SERVICES, PRO", "decision": "REVISE / CALIBRATE"}], "proposes": "Strengthen the barangay as the basic LGU by increasing its service delivery capacity, which includes providing retirement or gratuity benefits to barangay officials.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Conditional", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "Framing this as a capacity-building measure for barangays is directionally aligned with all ULAP principles. The principal concern is fiscal: if benefits are mandated without an identified national appropriation or IRA supplement, smaller barangays will face an unfunded mandate (P4). Accountability mechanisms for disbursement of new benefit streams must also be specified (P5). Revise to include explicit funding and performance conditions."}, {"mid": 27, "rep_title": "AN ACT GRANTING RETIREMENT BENEFIT T0 ELECTED BARANGAY OFFICIALS, AMENDING FOR THE PURPOSE SECTION 393 (b) OF REPUBLIC A", "n_bills": 1, "archetype": "Retirement / lump-sum / pension / gratuity for barangay officials", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 19, "number": 5234, "title": "AN ACT GRANTING RETIREMENT BENEFIT T0 ELECTED BARANGAY OFFICIALS, AMENDING FOR THE PURPOSE SECTION 393 (b) OF REPUBLIC A", "decision": "REVISE / CALIBRATE"}], "proposes": "Grant retirement benefits exclusively to elected barangay officials by amending Section 393(b) of RA 7160.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Limiting coverage to elected officials is simpler and more defensible than broad coverage, but fiscal viability remains the binding constraint (P4) — the funding mechanism must be explicit. Restricting benefits to elected officials while excluding appointive staff may create equity anomalies that need coherence checks against other benefit laws (P6). Eligibility thresholds and anti-double-dipping rules are needed for accountability (P5)."}, {"mid": 28, "rep_title": "AN ACT PROVIDING ALL BARANGAY OFFICIALS, BARANGAY TANODS, MEMBERS OF THE LUPON NG TAGAPAMAYAPA, A LUMPSUM GRATUITY PAY A", "n_bills": 1, "archetype": "Retirement / lump-sum / pension / gratuity for barangay officials", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 19, "number": 7019, "title": "AN ACT PROVIDING ALL BARANGAY OFFICIALS, BARANGAY TANODS, MEMBERS OF THE LUPON NG TAGAPAMAYAPA, A LUMPSUM GRATUITY PAY A", "decision": "REVISE / CALIBRATE"}], "proposes": "Provide a lump-sum gratuity pay to all barangay officials, barangay tanods, and members of the Lupon ng Tagapamayapa.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Fail", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Extending lump-sum gratuity to tanods and lupon members — who are largely volunteer positions — significantly expands the fiscal exposure without a clear appropriation or means of financing across ~42,000 barangays, constituting a probable unfunded mandate (P4 Fail). The breadth of coverage also raises coherence issues with RA 7883 (BHW benefits) and other sector-specific laws (P6). The measure should be revised to identify a dedicated national fund or cap, stagger rollout, and specify eligibility criteria."}, {"mid": 29, "rep_title": "AN ACT PROVIDING FOR A LUMP SUM END-OF-TERM PAY TO ALL BARANGAY OFFICIALS INCLUDING BARANGAY TANODS, MEMBERS OF THE LUPO", "n_bills": 2, "archetype": "Retirement / lump-sum / pension / gratuity for barangay officials", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 19, "number": 10609, "title": "AN ACT PROVIDING FOR A LUMP SUM END-OF-TERM PAY TO ALL BARANGAY OFFICIALS INCLUDING BARANGAY TANODS, MEMBERS OF THE LUPO", "decision": "REVISE / CALIBRATE"}, {"congress": 20, "number": 1411, "title": "AN ACT PROVIDING FOR A LUMP SUM END-OF-TERM PAY TO ALL BARANGAY OFFICIALS INCLUDING BARANGAY TANODS, MEMBERS OF THE LUPO", "decision": "REVISE / CALIBRATE"}], "proposes": "Provide a lump-sum end-of-term pay to all barangay officials, barangay tanods, and Lupon ng Tagapamayapa members upon completion of each term.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Fail", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "An end-of-term pay triggered every barangay election cycle for a wide roster of officials and volunteers creates recurring, compounding fiscal liability across all barangays with no identified national funding line (P4 Fail). Tying payment to term completion rather than length of service also weakens incentives for accountability (P5). Revise to narrow coverage, establish a national subsidy mechanism, and tie amounts to verified service records."}, {"mid": 30, "rep_title": "AN ACT STRENGTHENING THE BARANGAY AS THE BASIC LOCAL GOVERNMENT UNIT BY PROVIDING BARANGAY OFFICIALS, INCLUDING BARANGAY", "n_bills": 1, "archetype": "Retirement / lump-sum / pension / gratuity for barangay officials", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 20, "number": 4087, "title": "AN ACT STRENGTHENING THE BARANGAY AS THE BASIC LOCAL GOVERNMENT UNIT BY PROVIDING BARANGAY OFFICIALS, INCLUDING BARANGAY", "decision": "REVISE / CALIBRATE"}], "proposes": "Strengthen the barangay by providing barangay officials (including tanods) with specified benefits, framed as a capacity and welfare measure.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Conditional", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "The capacity-strengthening framing aligns well with ULAP's subsidiarity and autonomy principles. The measure is distinguishable from mids 28–29 only if it includes a national appropriation or IRA top-up rather than leaving costs to the barangay (P4 Conditional). Accountability and audit provisions for benefit disbursement must be explicit (P5). With those fixes the measure is adoptable."}, {"mid": 31, "rep_title": "AN ACT EXTENDING THE BARANGAY OFFICIAL ELIGIBILITY (BOE) TO THE SANGGUNIANG KABATAAN (SK) OFFICIALS", "n_bills": 1, "archetype": "Civil Service eligibility / security of tenure for barangay officials", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 1030, "title": "AN ACT EXTENDING THE BARANGAY OFFICIAL ELIGIBILITY (BOE) TO THE SANGGUNIANG KABATAAN (SK) OFFICIALS", "decision": "REVISE / CALIBRATE"}], "proposes": "Extend the Barangay Official Eligibility (BOE) civil service credential to Sangguniang Kabataan (SK) officials.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Pass", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Extending BOE to SK officials recognizes youth governance service and supports career pathways without significant fiscal cost (P4 Pass). However, the CSC must concur on eligibility equivalence standards to ensure coherence with the civil service framework (P6 Conditional), and minimum service thresholds or performance conditions should be specified to maintain integrity of the eligibility system (P5 Conditional). A straightforward CSC consultation and minor calibration would render this adoptable."}, {"mid": 32, "rep_title": "AN ACT GRANTING THE APPROPRIATE CIVIL SERVICE ELIGIBILITY TO SANGGUNIANG KABATAAN OFFICIALS, AMENDING FOR THE PURPOSE RE", "n_bills": 1, "archetype": "Civil Service eligibility / security of tenure for barangay officials", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 3349, "title": "AN ACT GRANTING THE APPROPRIATE CIVIL SERVICE ELIGIBILITY TO SANGGUNIANG KABATAAN OFFICIALS, AMENDING FOR THE PURPOSE RE", "decision": "REVISE / CALIBRATE"}], "proposes": "Grant appropriate civil service eligibility to SK officials by amending the relevant provisions of RA 7160.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Pass", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Functionally identical to mid 31 — granting civil service eligibility to SK officials is low-cost and recognizes youth public service. The same conditions apply: eligibility standards must be validated by the CSC for coherence (P6 Conditional), and accountability safeguards (minimum terms served, no pending administrative cases) should be codified (P5 Conditional). Calibrate with CSC alignment and the measure is sound."}, {"mid": 33, "rep_title": "AN ACT STRENGTHENING THE BARANGAY UNIT BY PROVIDING ADDITIONAL BENEFITS TO BARANGAY SECURITY, HEALTH AND NUTRITION WORKE", "n_bills": 2, "archetype": "Benefits/recognition of barangay tanod, lupon, BHW, nutrition & day-care workers", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 109, "title": "AN ACT STRENGTHENING THE BARANGAY UNIT BY PROVIDING ADDITIONAL BENEFITS TO BARANGAY SECURITY, HEALTH AND NUTRITION WORKE", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 3749, "title": "AN ACT STRENGTHENING THE BARANGAY UNIT BY PROVIDING ADDITIONAL BENEFITS TO BARANGAY SECURITY, HEALTH AND NUTRITION WORKE", "decision": "REVISE / CALIBRATE"}], "proposes": "Strengthen the barangay by providing additional benefits to barangay security, health, and nutrition workers.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Bundling security (tanods), health (BHW), and nutrition workers in a single measure risks inconsistent benefit levels and overlap with RA 7883 and DOH/DSWD benefit programs (P6 Conditional). Fiscal exposure depends on benefit levels and funding source; without a national appropriation, smaller barangays face an unfunded mandate (P4 Conditional). Harmonize with existing sector-specific laws, specify funding, and the measure advances sound subsidiarity goals."}, {"mid": 34, "rep_title": "AN ACT GRANTING FIXED HONORARIA AND ADDITIONAL INCENTIVES AND BENEFITS TO BARANGAY HEALTH WORKERS, AMENDING FOR THE PURP", "n_bills": 1, "archetype": "Benefits/recognition of barangay tanod, lupon, BHW, nutrition & day-care workers", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 536, "title": "AN ACT GRANTING FIXED HONORARIA AND ADDITIONAL INCENTIVES AND BENEFITS TO BARANGAY HEALTH WORKERS, AMENDING FOR THE PURP", "decision": "REVISE / CALIBRATE"}], "proposes": "Grant fixed honoraria and additional incentives and benefits to barangay health workers by amending RA 7883.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Pass", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "Fixing BHW honoraria addresses a long-standing adequacy gap in RA 7883 and is directly coherent with national health policy and DOH programs (P6 Pass). Accountability is inherent in the honoraria structure (P5 Pass). The sole binding issue is ensuring the national government shoulders the mandated increase rather than passing it to barangay budgets (P4 Conditional). Specify a national appropriation line and this measure can be adopted."}, {"mid": 35, "rep_title": "AN ACT GRANTING ADDITIONAL INCENTIVES AND BENEFITS TO BARANGAY HEALTH WORKERS, AMENDING FOR THE PURPOSE REPUBLIC ACT 788", "n_bills": 1, "archetype": "Benefits/recognition of barangay tanod, lupon, BHW, nutrition & day-care workers", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 670, "title": "AN ACT GRANTING ADDITIONAL INCENTIVES AND BENEFITS TO BARANGAY HEALTH WORKERS, AMENDING FOR THE PURPOSE REPUBLIC ACT 788", "decision": "REVISE / CALIBRATE"}], "proposes": "Grant additional incentives and benefits to barangay health workers by amending RA 7883.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Pass", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "Substantively similar to mid 34 but potentially broader in benefit scope. Alignment with national health system policy is strong (P6 Pass). The critical revision needed is an explicit national funding appropriation through DOH or a dedicated BHW fund so barangays are not left to absorb costs (P4 Conditional). Incentive structures should be performance-linked to maintain accountability standards (P5 Pass with minor note)."}, {"mid": 36, "rep_title": "AN ACT GRANTING TRAVEL ALLOWANCES TO BARANGAY HEALTH WORKERS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7883, OTHERWISE", "n_bills": 1, "archetype": "Benefits/recognition of barangay tanod, lupon, BHW, nutrition & day-care workers", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 763, "title": "AN ACT GRANTING TRAVEL ALLOWANCES TO BARANGAY HEALTH WORKERS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7883, OTHERWISE", "decision": "REVISE / CALIBRATE"}], "proposes": "Grant travel allowances to barangay health workers by amending RA 7883.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Pass", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "Travel allowances are a targeted, operationally justified benefit for BHWs who conduct community outreach — well-aligned with subsidiarity and national health goals (P3, P6 Pass). The measure is narrower in scope than mids 34–35, reducing fiscal risk, but funding source must still be nationalized through DOH appropriations rather than charged to barangay funds (P4 Conditional). Allowance rates should be standardized for consistency and audited for legitimacy (P5 Pass)."}, {"mid": 37, "rep_title": "AN ACT MANDATING THE APPOINTMENT OF AT LEAST ONE (1) BARANGAY HEALTH WORKER IN EVERY BARANGAY, AMENDING FOR THE PURPOSE", "n_bills": 3, "archetype": "Benefits/recognition of barangay tanod, lupon, BHW, nutrition & day-care workers", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 1494, "title": "AN ACT MANDATING THE APPOINTMENT OF AT LEAST ONE (1) BARANGAY HEALTH WORKER IN EVERY BARANGAY, AMENDING FOR THE PURPOSE", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 1408, "title": "AN ACT MANDATING THE APPOINTMENT OF AT LEAST ONE (1) BARANGAY HEALTH WORKER IN EVERY BARANGAY, AMENDING FOR THE PURPOSE", "decision": "REVISE / CALIBRATE"}, {"congress": 20, "number": 1684, "title": "AN ACT MANDATING THE APPOINTMENT OF AT LEAST ONE (1) BARANGAY HEALTH WORKER IN EVERY BARANGAY, AMENDING FOR THE PURPOSE", "decision": "REVISE / CALIBRATE"}], "proposes": "Mandates appointment of at least one Barangay Health Worker in every barangay, amending the LGC.", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "Pass", "P4": "Fail", "P5": "Pass", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "Subsidiarity is well served placing BHW at barangay level, and national health coherence is sound, but a hard national mandate overrides barangay discretion (P1 Conditional, P2 Conditional) and creates an unfunded mandate unless the national government shoulders the cost (P4 Fail). Bill must specify funding source and allow flexibility for barangays that already meet the standard."}, {"mid": 38, "rep_title": "AN ACT MANDATING THE APPOINTMENT OF BARANGAY HEALTH WORKERS IN EVERY BARANGAY, AMENDING FOR THE PURPOSE REPUBLIC ACT 716", "n_bills": 7, "archetype": "Benefits/recognition of barangay tanod, lupon, BHW, nutrition & day-care workers", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 1557, "title": "AN ACT MANDATING THE APPOINTMENT OF BARANGAY HEALTH WORKERS IN EVERY BARANGAY, AMENDING FOR THE PURPOSE REPUBLIC ACT 716", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "number": 3291, "title": "AN ACT MANDATING THE APPOINTMENT OF BARANGAY HEALTH WORKERS IN EVERY BARANGAY, AMENDING FOR THE PURPOSE REPUBLIC ACT NO.", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "number": 3355, "title": "AN ACT MANDATING THE APPOINTMENT OF BARANGAY HEALTH WORKERS IN EVERY BARANGAY, AMENDING FOR THIS PURPOSE REPUBLIC ACT NO", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "number": 3511, "title": "AN ACT MANDATING THE APPOINTMENT OF BARANGAY HEALTH WORKERS IN EVERY BARANGAY, AMENDING FOR THE PURPOSE REPUBLIC ACT 716", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "number": 5496, "title": "AN ACT MANDATING THE APPOINTMENT OF BARANGAY HEALTH WORKERS IN EVERY BARANGAY, AMENDING FOR THE PURPOSE REPUBLIC ACT NO.", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "number": 6629, "title": "AN ACT MANDATING THE APPOINTMENT OF BARANGAY HEALTH WORKERS IN EVERY BARANGAY, AMENDING FOR THE PURPOSE REPUBLIC ACT 716", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 1438, "title": "AN ACT MANDATING THE APPOINTMENT OF BARANGAY HEALTH WORKERS IN EVERY BARANGAY, AMENDING FOR THE PURPOSE REPUBLIC ACT NO.", "decision": "REVISE / CALIBRATE"}], "proposes": "Mandates appointment of Barangay Health Workers in every barangay, amending RA 7160.", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "Pass", "P4": "Fail", "P5": "Pass", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "Substantively identical to mid 37; the mandate is subsidiarity-appropriate but imposes costs on barangays without a guaranteed national funding stream (P4 Fail) and bypasses local discretion on staffing (P1, P2 Conditional). Funding mechanism and minimum-floor flexibility must be added before adoption."}, {"mid": 39, "rep_title": "AN ACT PROVIDING INCENTIVES TO ALL BARANGAY OFFICIALS AND EMPLOYEES, INCLUDING BARANGAY TANODS AND MEMBERS OF THE LUPONG", "n_bills": 2, "archetype": "Benefits/recognition of barangay tanod, lupon, BHW, nutrition & day-care workers", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 2615, "title": "AN ACT PROVIDING INCENTIVES TO ALL BARANGAY OFFICIALS AND EMPLOYEES, INCLUDING BARANGAY TANODS AND MEMBERS OF THE LUPONG", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 11403, "title": "AN ACT PROVIDING INCENTIVES AND BENEFITS FOR ALL BARANGAY OFFICIALS, INCLUDING BARANGAY TANODS, MEMBERS OF THE LUPON NG", "decision": "REVISE / CALIBRATE"}], "proposes": "Provides incentives to all barangay officials, employees, barangay tanods, and Lupon members.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Pass", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "Recognizing and incentivizing barangay workers strengthens the base unit of governance and is broadly supported by LGUs (P1, P2, P3 Pass). Fiscal sustainability is the hinge: if incentives are mandated nationally without a clear appropriation or IRA-sharing formula, barangays bear an unfunded obligation (P4 Conditional). The bill should specify the funding source or allow LGUs to set rates within a national floor."}, {"mid": 40, "rep_title": "AN ACT PROVIDING COMPENSATION, MONETARY AND NON-MONETARY BENEFITS TO ALL BARANGAY OFFICIALS, INCLUDING BARANGAY TANODS,", "n_bills": 2, "archetype": "Benefits/recognition of barangay tanod, lupon, BHW, nutrition & day-care workers", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 3870, "title": "AN ACT PROVIDING COMPENSATION, MONETARY AND NON-MONETARY BENEFITS TO ALL BARANGAY OFFICIALS, INCLUDING BARANGAY TANODS,", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 3166, "title": "AN ACT PROVIDING COMPENSATION, MONETARY AND NON-MONETARY BENEFITS TO ALL BARANGAY OFFICIALS, INCLUDING BARANGAY TANODS,", "decision": "REVISE / CALIBRATE"}], "proposes": "Provides compensation and monetary/non-monetary benefits to barangay officials and tanods.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Pass", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "Compensation for volunteer barangay workers serves autonomy and community-level governance (P1–P3 Pass). Fiscal risk arises if national law mandates fixed benefit levels without corresponding IRA augmentation or appropriation, creating potential unfunded mandates especially for small, low-income barangays (P4 Conditional). Needs a tiered or income-sensitive funding formula."}, {"mid": 41, "rep_title": "AN ACT PROVIDING FOR THE MANDATORY PHILHEALTH COVERAGE FOR ALL BARANGAY OFFICIALS, EMPLOYEES, MEMBERS OF THE LUPON TAGAP", "n_bills": 1, "archetype": "Benefits/recognition of barangay tanod, lupon, BHW, nutrition & day-care workers", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 5655, "title": "AN ACT PROVIDING FOR THE MANDATORY PHILHEALTH COVERAGE FOR ALL BARANGAY OFFICIALS, EMPLOYEES, MEMBERS OF THE LUPON TAGAP", "decision": "REVISE / CALIBRATE"}], "proposes": "Mandates PhilHealth coverage for all barangay officials, employees, Lupon, and tanod members.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Pass", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "PhilHealth coverage for barangay workers is a reasonable national baseline (P6 Pass) and enhances the value of barangay service (P1, P2 Pass). The key fiscal question is who pays the premium contributions: if charged entirely to barangay funds without new appropriations, it is an unfunded mandate for resource-poor barangays (P4 Conditional). National government co-payment or explicit appropriation must be specified."}, {"mid": 42, "rep_title": "AN ACT INCREASING HONORARIUM AND CHRISTMAS INCENTIVES OF BARANGAY OFFICIALS, INCLUDING BARANGAY TANODS, MEMBERS OF THE L", "n_bills": 2, "archetype": "Benefits/recognition of barangay tanod, lupon, BHW, nutrition & day-care workers", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 5846, "title": "AN ACT INCREASING HONORARIUM AND CHRISTMAS INCENTIVES OF BARANGAY OFFICIALS, INCLUDING BARANGAY TANODS, MEMBERS OF THE L", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 1526, "title": "AN ACT INCREASING HONORARIUM AND CHRISTMAS INCENTIVES OF BARANGAY OFFICIALS, INCLUDING BARANGAY TANODS, MEMBERS OF THE L", "decision": "REVISE / CALIBRATE"}], "proposes": "Increases honoraria and Christmas incentives of barangay officials, tanods, and Lupon members.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Honorarium increases are legitimate recognition of barangay service. However, fixing specific amounts nationally without a corresponding funding source risks unfunded mandates for barangays dependent on limited IRA shares (P4 Conditional). Transparency on how increases are funded and uniform national rates may not fit diverse fiscal capacities across LGUs (P5, P6 Conditional). A minimum-floor-with-local-flexibility model is preferable."}, {"mid": 43, "rep_title": "AN ACT CREATING THE MAGNA CARTA FOR BARANGAY HEALTH WORKERS, AMENDING THE LOCAL GOVERNMENT CODE, INCREASING THEIR BENEFI", "n_bills": 1, "archetype": "Benefits/recognition of barangay tanod, lupon, BHW, nutrition & day-care workers", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 6263, "title": "AN ACT CREATING THE MAGNA CARTA FOR BARANGAY HEALTH WORKERS, AMENDING THE LOCAL GOVERNMENT CODE, INCREASING THEIR BENEFI", "decision": "REVISE / CALIBRATE"}], "proposes": "Creates a Magna Carta for Barangay Health Workers amending the LGC and increasing their benefits.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Pass", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "A Magna Carta elevates BHWs' legal standing and is well-placed at the barangay level (P1–P3, P5, P6 Pass). Fiscal sustainability is the recurring concern: expanded benefits require a clear appropriation mechanism — either through the DOH budget, IRA augmentation, or LGU cost-sharing — to avoid an unfunded mandate (P4 Conditional). Should align with existing RA 7883 (BHW Act) to avoid duplication."}, {"mid": 44, "rep_title": "AN ACT EXPANDING THE FUNCTION OF THE LUPONG TAGAPAMAYAPA, THEREBY AMENDING REPUBLIC ACT NO. 7160 OTHERWISE KNOWN AS THE", "n_bills": 2, "archetype": "Benefits/recognition of barangay tanod, lupon, BHW, nutrition & day-care workers", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 7518, "title": "AN ACT EXPANDING THE FUNCTION OF THE LUPONG TAGAPAMAYAPA, THEREBY AMENDING REPUBLIC ACT NO. 7160 OTHERWISE KNOWN AS THE", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 5631, "title": "AN ACT EXPANDING THE FUNCTION OF THE LUPONG TAGAPAMAYAPA, THEREBY AMENDING REPUBLIC ACT No. 7160 OTHERWISE KNOWN AS THE", "decision": "REVISE / CALIBRATE"}], "proposes": "Expands the functions of the Lupong Tagapamayapa, amending RA 7160.", "scores": {"P1": "Conditional", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Pass", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Expanding Lupon jurisdiction can strengthen barangay-level dispute resolution (P3, P5 Pass) and reflects community demand for accessible justice. However, broadening mandatory functions without training, resources, or operational budgets is an unfunded mandate (P4 Conditional). Expanded jurisdiction must be checked against court and quasi-judicial overlap to ensure national legal coherence (P6 Conditional) and must not override barangay discretion on case management (P1 Conditional)."}, {"mid": 45, "rep_title": "AN ACT UPGRADING THE BENEFITS AND INCENTIVES OF BARANGAY TANOD BRIGADES, AMENDING FOR THE PURPOSE SEC. 393 (d) OF REPUBL", "n_bills": 1, "archetype": "Benefits/recognition of barangay tanod, lupon, BHW, nutrition & day-care workers", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 19, "number": 4402, "title": "AN ACT UPGRADING THE BENEFITS AND INCENTIVES OF BARANGAY TANOD BRIGADES, AMENDING FOR THE PURPOSE SEC. 393 (d) OF REPUBL", "decision": "REVISE / CALIBRATE"}], "proposes": "Upgrades benefits and incentives of Barangay Tanod Brigades, amending Sec. 393(d) of RA 7160.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Pass", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "Upgrading tanod benefits recognizes their frontline peace-and-order role at the correct governance level. The amendment to Sec. 393(d) is targeted and LGC-coherent. Fiscal condition remains: increased benefit levels must be backed by an appropriation or IRA-share increase, not passed down as an unfunded mandate to barangays (P4 Conditional)."}, {"mid": 46, "rep_title": "AN ACT EXTENDING EDUCATIONAL BENEFITS TO LEGITIMATE DEPENDENT CHILDREN OF ACCREDITED BARANGAY HEALTH WORKERS, MEMBERS OF", "n_bills": 1, "archetype": "Benefits/recognition of barangay tanod, lupon, BHW, nutrition & day-care workers", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 19, "number": 5231, "title": "AN ACT EXTENDING EDUCATIONAL BENEFITS TO LEGITIMATE DEPENDENT CHILDREN OF ACCREDITED BARANGAY HEALTH WORKERS, MEMBERS OF", "decision": "REVISE / CALIBRATE"}], "proposes": "Extends educational benefits to dependent children of accredited BHWs and Lupon members.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Pass", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "Education benefits for dependents are a legitimate retention incentive for volunteer barangay workers (P1, P2, P3, P5 Pass) and align with national human-capital goals (P6 Pass). The program must specify a funding mechanism — whether through DepEd, CHED, TESDA, or barangay budgets — to avoid creating an unfunded obligation on LGUs or national scholarship agencies (P4 Conditional)."}, {"mid": 47, "rep_title": "AN ACT RIGHTSIZING THE NUMBER OF BARANGAY TANODS AMENDING FOR THE PURPOSE SECTION 393 OF REPUBLIC ACT NUMBER 7160, AS AM", "n_bills": 2, "archetype": "Benefits/recognition of barangay tanod, lupon, BHW, nutrition & day-care workers", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 19, "number": 9883, "title": "AN ACT RIGHTSIZING THE NUMBER OF BARANGAY TANODS AMENDING FOR THE PURPOSE SECTION 393 OF REPUBLIC ACT NUMBER 7160, AS AM", "decision": "REVISE / CALIBRATE"}, {"congress": 20, "number": 2306, "title": "AN ACT RIGHTSIZING THE NUMBER OF BARANGAY TANODS AMENDING FOR THE PURPOSE SECTION 393 OF REPUBLIC ACT NUMBER 7160, AS AM", "decision": "REVISE / CALIBRATE"}], "proposes": "Rightsizes the number of Barangay Tanods by amending Sec. 393 of RA 7160.", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "Pass", "P4": "Conditional", "P5": "Pass", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "Adjusting tanod numbers to match barangay needs is a sound subsidiarity principle (P3 Pass). However, if 'rightsizing' means imposing a national minimum or formula that overrides barangay judgment on local security needs, it constrains autonomy and self-determination (P1, P2 Conditional). Additional tanods without funding constitute an unfunded mandate (P4 Conditional). A formula that sets a floor with local-government flexibility above it, paired with commensurate IRA support, is needed."}, {"mid": 48, "rep_title": "AN ACT STRENGTHENING THE BARANGAY UNIT THROUGH SUPPORT FOR BARANGAY OFFICIALS AND BARANGAY VOLUNTEER WORKERS, AMENDING R", "n_bills": 8, "archetype": "Magna Carta for Barangays / strengthen the barangay as basic unit", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 835, "title": "AN ACT STRENGTHENING THE BARANGAY UNIT THROUGH SUPPORT FOR BARANGAY OFFICIALS AND BARANGAY VOLUNTEER WORKERS, AMENDING R", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "number": 1905, "title": "AN ACT STRENGTHENING THE BARANGAY UNIT THROUGH SUPPORT FOR THE BARANGAY OFFICIALS AND BARANGAY VOLUNTEER WORKERS, AMENDI", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "number": 2448, "title": "AN ACT STRENGTHENING THE BARANGAY UNIT THROUGH SUPPORT FOR BARANGAY OFFICIALS AND BARANGAY VOLUNTEER WORKERS, AMENDING R", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "number": 3912, "title": "AN ACT STRENGTHENING THE BARANGAY UNIT THROUGH SUPPORT FOR BARANGAY OFFICIALS AND BARANGAY VOLUNTEER WORKERS, AMENDING R", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 387, "title": "AN ACT STRENGTHENING THE BARANGAY UNIT THROUGH SUPPORT FOR BARANGAY OFFICIALS AND BARANGAY VOLUNTEER WORKERS, AMENDING R", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 4180, "title": "AN ACT STRENGTHENING THE BARANGAY UNIT THROUGH SUPPORT FOR BARANGAY OFFICIALS AND BARANGAY VOLUNTEER WORKERS, AMENDING R", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 4736, "title": "AN ACT STRENGTHENING THE BARANGAY UNIT THROUGH SUPPORT FOR BARANGAY OFFICIALS AND BARANGAY VOLUNTEER WORKERS, AMENDING R", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 5492, "title": "AN ACT STRENGTHENING THE BARANGAY UNIT THROUGH SUPPORT FOR BARANGAY OFFICIALS AND BARANGAY VOLUNTEER WORKERS, AMENDING R", "decision": "REVISE / CALIBRATE"}], "proposes": "Strengthens the barangay unit by supporting barangay officials and barangay volunteer workers, amending RA 7160.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Pass", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "Directly strengthening the barangay as the basic governance unit aligns with all autonomy, subsidiarity, and accountability principles (P1, P2, P3, P5, P6 Pass). As with the archetype, the fiscal condition is critical: support measures for officials and volunteers must carry explicit national appropriations or IRA augmentation to avoid passing unfunded obligations to resource-limited barangays (P4 Conditional). Conditioned on a clear, sustainable funding framework."}, {"mid": 49, "rep_title": "AN ACT ESTABLISHING THE MAGNA CARTA FOR BARANGAYS, PROVIDING FUNDS THEREFOR, AND FOR OTHER PURPOSES", "n_bills": 1, "archetype": "Magna Carta for Barangays / strengthen the barangay as basic unit", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 1452, "title": "AN ACT ESTABLISHING THE MAGNA CARTA FOR BARANGAYS, PROVIDING FUNDS THEREFOR, AND FOR OTHER PURPOSES", "decision": "REVISE / CALIBRATE"}], "proposes": "Establishes a comprehensive Magna Carta for Barangays with dedicated funding, consolidating rights, powers, and entitlements of barangays as the basic governance unit.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "The measure strongly advances P1, P2, and P3 by recognizing barangays as the foundational unit of governance. However, P4 is conditional because 'providing funds therefor' is a general clause that may not specify adequate, sustainable financing mechanisms — risk of unfunded mandates if appropriations are discretionary. P5 is conditional because accountability and reporting standards for barangays must be explicitly included. P6 is conditional because coherence with existing IRA framework and LGC provisions must be reconciled to avoid duplication or contradiction. Revision to specify funding sources, accountability mechanisms, and alignment with existing LGC chapters is needed before adoption."}, {"mid": 50, "rep_title": "AN ACT TO ESTABLISH THE MAGNA CARTA FOR BARANGAYS", "n_bills": 1, "archetype": "Magna Carta for Barangays / strengthen the barangay as basic unit", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 1560, "title": "AN ACT TO ESTABLISH THE MAGNA CARTA FOR BARANGAYS", "decision": "REVISE / CALIBRATE"}], "proposes": "Establishes a Magna Carta for Barangays in shorter, more basic form without explicit funding provision.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Fail", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Similar to mid 49 in direction but weaker in execution: the absence of any 'providing funds therefor' clause raises a clear P4 Fail — a comprehensive Magna Carta without a financing provision creates unfunded mandates for barangay obligations. P5 and P6 remain conditional for the same reasons as mid 49. The fiscal gap must be addressed before this can advance; revision to add explicit funding and accountability provisions is required."}, {"mid": 51, "rep_title": "MAGNA CARTA FOR BARANGAY OFFICIALS", "n_bills": 1, "archetype": "Magna Carta for Barangays / strengthen the barangay as basic unit", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 2726, "title": "MAGNA CARTA FOR BARANGAY OFFICIALS", "decision": "REVISE / CALIBRATE"}], "proposes": "Provides a Magna Carta specifically for barangay officials, covering their rights, benefits, and protections.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Narrower than mid 49/50 — focused on officials rather than the barangay institution as a whole, which limits P3 impact but avoids the broadest fiscal exposure. P4 is conditional because mandated benefits and entitlements for officials must be paired with a clear funding source (national subsidy vs. barangay fund allocation). P5 is conditional because a Magna Carta for officials should include performance standards and disclosure duties to balance rights with accountability. P6 is conditional on alignment with existing civil service rules and the LGC's compensation framework for elective officials."}, {"mid": 52, "rep_title": "AN ACT STRENGTHENING THE BARANGAYS THROUGH SUPPORT FOR BARANGAY OFFICIALS AND VOLUNTEER WORKERS", "n_bills": 1, "archetype": "Magna Carta for Barangays / strengthen the barangay as basic unit", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 3325, "title": "AN ACT STRENGTHENING THE BARANGAYS THROUGH SUPPORT FOR BARANGAY OFFICIALS AND VOLUNTEER WORKERS", "decision": "REVISE / CALIBRATE"}], "proposes": "Strengthens barangays by providing support specifically for barangay officials and volunteer workers.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Conditional", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "The inclusion of volunteer workers alongside officials is practically grounded and reflects genuine barangay-level demand (P2). P6 passes because framing is supportive rather than creating new structural mandates that conflict with existing law. P4 remains conditional because support measures must be tied to identifiable appropriations. P5 is conditional because volunteer worker support programs should include reporting and recognition standards. Revision to specify financing and add basic accountability provisions would clear remaining conditions."}, {"mid": 53, "rep_title": "AN ACT PROVIDING FOR A MAGNA CARTA FOR BARANGAY OFFICIALS, PERSONNEL AND VOLUNTEER WORKERS, AND FOR OTHER PURPOSES", "n_bills": 1, "archetype": "Magna Carta for Barangays / strengthen the barangay as basic unit", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 5402, "title": "AN ACT PROVIDING FOR A MAGNA CARTA FOR BARANGAY OFFICIALS, PERSONNEL AND VOLUNTEER WORKERS, AND FOR OTHER PURPOSES", "decision": "REVISE / CALIBRATE"}], "proposes": "Provides a Magna Carta covering barangay officials, personnel, and volunteer workers with comprehensive rights and entitlements.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "The broadest of the Magna Carta variants, covering officials, personnel, and volunteers — this comprehensiveness is its strength (P1, P2, P3) and its fiscal risk (P4). Mandating entitlements for three distinct categories without a clear, sustainable funding mechanism risks creating the largest unfunded mandate in this cluster. P5 is conditional because personnel and volunteers must be subject to defined performance and conduct standards. P6 is conditional because personnel classification must align with civil service and DBM rules. Revision must address the tiered funding model before adoption."}, {"mid": 54, "rep_title": "AN ACT PROVIDING FOR REMUNERATION, BENEFITS, ALLOWANCES, AND OTHER ENTITLEMENTS FOR FRONTLINE CIVIL SERVANTS AT THE BARA", "n_bills": 1, "archetype": "Magna Carta for Barangays / strengthen the barangay as basic unit", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 8940, "title": "AN ACT PROVIDING FOR REMUNERATION, BENEFITS, ALLOWANCES, AND OTHER ENTITLEMENTS FOR FRONTLINE CIVIL SERVANTS AT THE BARA", "decision": "REVISE / CALIBRATE"}], "proposes": "Provides remuneration, benefits, allowances, and entitlements specifically for frontline civil servants at the barangay level.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Fail", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "The focus on remuneration and benefits for frontline barangay civil servants directly addresses a longstanding equity gap (P1, P2, P3). However, P4 Fails: mandating specific remuneration and benefits for barangay-level personnel without a corresponding national appropriation or clear IRA adjustment is a textbook unfunded mandate — barangay funds are typically insufficient to absorb uniform salary mandates. P5 is conditional on tying compensation increases to performance metrics. P6 is conditional on alignment with Salary Standardization Law and DBM issuances. A fiscal cover provision is the minimum fix required."}, {"mid": 55, "rep_title": "AN ACT STRENGTHENING THE BARANGAY FISCAL ADMINISTRATION BY PROFESSIONALIZING THE POSITION OF BARANGAY TREASURERS AND CRE", "n_bills": 2, "archetype": "Magna Carta for Barangays / strengthen the barangay as basic unit", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 19, "number": 10065, "title": "AN ACT STRENGTHENING THE BARANGAY FISCAL ADMINISTRATION BY PROFESSIONALIZING THE POSITION OF BARANGAY TREASURERS AND CRE", "decision": "REVISE / CALIBRATE"}, {"congress": 20, "number": 2764, "title": "AN ACT STRENGTHENING THE BARANGAY FISCAL ADMINISTRATION BY PROFESSIONALIZING THE POSITION OF BARANGAY TREASURERS AND CRE", "decision": "REVISE / CALIBRATE"}], "proposes": "Strengthens barangay fiscal administration by professionalizing barangay treasurers and (likely) creating/upgrading related fiscal positions.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Pass", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "This measure is the most technically coherent in the Barangay Governance cluster: professionalizing fiscal officers directly advances P3 (right function at the right level), P5 (stronger financial accountability at the barangay), and P6 (aligns with DILG/DBM professionalization thrusts). P1 and P2 pass as enhanced fiscal capacity enables genuine self-governance. P4 is conditional because professionalization typically requires reclassification and salary adjustments — funding source must be specified (national vs. LGU) to avoid an unfunded mandate. With a fiscal cover provision added, this measure can be adopted."}, {"mid": 56, "rep_title": "AN ACT EXPANDING THE JURISDICTION OF THE KATARUNGANG PAMBARANGAY, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7160, OTHERW", "n_bills": 1, "archetype": "Katarungang Pambarangay (barangay justice) expansion", "theme": "Barangay Governance", "sheet_decision": "ADOPT", "member_bills": [{"congress": 18, "number": 2709, "title": "AN ACT EXPANDING THE JURISDICTION OF THE KATARUNGANG PAMBARANGAY, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7160, OTHERW", "decision": "ADOPT"}], "proposes": "Expands the jurisdiction of the Katarungang Pambarangay (barangay justice system) by amending RA 7160.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Pass", "P5": "Pass", "P6": "Pass"}, "decision": "ADOPT", "rationale": "Expanding KP jurisdiction strengthens all six principles: P1 (greater local justice authority), P2 (community-based dispute resolution reflects local preference), P3 (justice handled at the most local capable level), P4 (KP is a low-cost mechanism that reduces court burden without significant new spending), P5 (KP proceedings are recorded and subject to oversight), P6 (coherent with ADR policy and court decongestion mandates). Consistent with the archetype's prior ADOPT verdict; no principle-level objection found."}, {"mid": 57, "rep_title": "AN ACT EXPANDING THE CASES COVERED BY THE KATARUNGANG PAMBARANGAY THEREBY AMENDING SECTION 408(c) OF REPUBLIC ACT NO. 71", "n_bills": 2, "archetype": "Katarungang Pambarangay (barangay justice) expansion", "theme": "Barangay Governance", "sheet_decision": "ADOPT", "member_bills": [{"congress": 19, "number": 10685, "title": "AN ACT EXPANDING THE CASES COVERED BY THE KATARUNGANG PAMBARANGAY THEREBY AMENDING SECTION 408(c) OF REPUBLIC ACT NO. 71", "decision": "ADOPT"}, {"congress": 20, "number": 2288, "title": "AN ACT EXPANDING THE CASES COVERED BY THE KATARUNGANG PAMBARANGAY THEREBY AMENDING SECTION 408(c) OF REPUBLIC ACT NO. 71", "decision": "ADOPT"}], "proposes": "Expands the cases covered by the Katarungang Pambarangay by amending Section 408(c) of RA 7160 on case coverage.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Pass", "P5": "Pass", "P6": "Pass"}, "decision": "ADOPT", "rationale": "More targeted than mid 56 — amends the specific case-coverage provision of the KP, reducing the risk of jurisdictional overreach. All six principles pass for the same reasons as mid 56. The surgical amendment approach (amending Section 408(c) specifically) is preferable to a broad jurisdictional expansion and poses no coherence risk with existing court rules. ADOPT consistent with prior verdict."}, {"mid": 58, "rep_title": "AN ACT PROVIDING COMPENSATION TO SANGGUNIANG KABATAAN OFFICIALS FURTHER AMENDING REPUBLIC ACT 10742, ENTITLED `SANGGUNIA", "n_bills": 2, "archetype": "Sangguniang Kabataan reforms (powers, funds, qualifications)", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 397, "title": "AN ACT PROVIDING COMPENSATION TO SANGGUNIANG KABATAAN OFFICIALS FURTHER AMENDING REPUBLIC ACT 10742, ENTITLED `SANGGUNIA", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "number": 5217, "title": "AN ACT PROVIDING COMPENSATION TO SANGGUNIANG KABATAAN OFFICIALS, FURTHER AMENDING REPUBLIC ACT 10742, ENTITLED \\\"SANGGUN", "decision": "REVISE / CALIBRATE"}], "proposes": "Provides compensation to Sangguniang Kabataan officials, amending RA 10742.", "scores": {"P1": "Conditional", "P2": "Pass", "P3": "Conditional", "P4": "Fail", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Providing compensation to SK officials has democratic legitimacy (P2) but raises structural concerns. P1 is conditional because SK officials are youth representatives within barangays — compensation structures could inadvertently shift SK toward professionalization over volunteerism, altering the nature of the body. P3 is conditional because SK functions are youth-specific and compensation policy belongs partly within the national youth development framework (NYC Act), not solely the LGC. P4 Fails: mandating compensation for SK officials without identifying whether the barangay fund, IRA, or national appropriation covers this is an unfunded mandate — barangay funds are often already strained. P5 is conditional on tying compensation to attendance and program delivery. P6 is conditional on coherence with the SK Reform Law (RA 10742) amendments already in force. Revision must include a clear funding source."}, {"mid": 59, "rep_title": "AN ACT PROVIDING COMPENSATION TO SANGGUNIANG KABATAAN (SK) OFFICIALS, FURTHER AMENDING REPUBLIC ACT NO. 10742, OTHERWISE", "n_bills": 1, "archetype": "Sangguniang Kabataan reforms (powers, funds, qualifications)", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 1667, "title": "AN ACT PROVIDING COMPENSATION TO SANGGUNIANG KABATAAN (SK) OFFICIALS, FURTHER AMENDING REPUBLIC ACT NO. 10742, OTHERWISE", "decision": "REVISE / CALIBRATE"}], "proposes": "Provides compensation to Sangguniang Kabataan (SK) officials, further amending RA 10742 — a parallel bill to mid 58.", "scores": {"P1": "Conditional", "P2": "Pass", "P3": "Conditional", "P4": "Fail", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Substantively identical to mid 58 in purpose and legal vehicle. All the same principle-level findings apply: P4 Fails for the same unfunded mandate risk. The existence of two parallel bills (mid 58 and 59) also raises P6 concerns about legislative fragmentation — consolidation into a single well-funded measure is advisable. Revision needed on funding, accountability metrics, and SK Reform Law coherence before adoption."}, {"mid": 60, "rep_title": "AN ACT RESETTING THE BARANGAY AND SANGGUNIANG KABATAAN ELECTIONS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 9164, AS AME", "n_bills": 2, "archetype": "Sangguniang Kabataan reforms (powers, funds, qualifications)", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 2874, "title": "AN ACT RESETTING THE BARANGAY AND SANGGUNIANG KABATAAN ELECTIONS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 9164, AS AME", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "number": 4606, "title": "AN ACT RESETTING THE MAY 2020 BARANGAY AND SANGGUNIANG KABATAAN ELECTIONS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 916", "decision": "REVISE / CALIBRATE"}], "proposes": "Resets the dates of Barangay and Sangguniang Kabataan elections by amending RA 9164.", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "N/A", "P4": "Pass", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Election-date resets are a recurring legislative tool that extends incumbent terms or shifts electoral cycles. P1 is conditional because resetting elections without a compelling governance rationale can undermine rather than strengthen local autonomy — incumbent extension by legislative fiat is an autonomy concern. P2 is conditional because election timing should ideally reflect community and LGU input, not purely national legislative convenience. P3 is N/A — election timing is not a subsidiarity question. P4 passes as election date changes have minimal direct fiscal impact. P5 is conditional because postponement of elections delays democratic accountability and must include caretaker governance standards for the interim period. P6 is conditional on coherence with COMELEC scheduling, national election calendar, and constitutional constraints on term extensions. Requires clear justification and interim governance provisions before adoption."}, {"mid": 61, "rep_title": "AN ACT AMENDING CERTAIN PROVISIONS IN REPUBLIC ACT NO. 10742 OTHERWISE KNOWN AS THE SANGGUNIANG KABATAAN REFORM ACT OF 2", "n_bills": 1, "archetype": "Sangguniang Kabataan reforms (powers, funds, qualifications)", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 5169, "title": "AN ACT AMENDING CERTAIN PROVISIONS IN REPUBLIC ACT NO. 10742 OTHERWISE KNOWN AS THE SANGGUNIANG KABATAAN REFORM ACT OF 2", "decision": "REVISE / CALIBRATE"}], "proposes": "Amends RA 10742 (SK Reform Act of 2015) to revise certain provisions governing the Sangguniang Kabataan.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Direction is sound — refining SK's powers at the barangay level supports youth autonomy and subsidiarity — but without specifying the funding source for any expanded mandates, fiscal adequacy (P4) is uncertain against the fixed SK Fund. Transparency of SK fund use (P5) and alignment with NYCA and DepEd frameworks (P6) need explicit provisions."}, {"mid": 62, "rep_title": "AN ACT EMPOWERING THE MEMBERS OF THE SANGGUNIANG KABATAAN (SK) BY AMENDING CERTAIN PROVISIONS OF REPUBLIC ACT NO. 10742,", "n_bills": 3, "archetype": "Sangguniang Kabataan reforms (powers, funds, qualifications)", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 5284, "title": "AN ACT EMPOWERING THE MEMBERS OF THE SANGGUNIANG KABATAAN (SK) BY AMENDING CERTAIN PROVISIONS OF REPUBLIC ACT NO. 10742,", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "number": 9242, "title": "AN ACT TO FURTHER EMPOWER THE MEMBERS OF THE SANGGUNIANG KABATAAN (SK) BY AMENDING CERTAIN PROVISIONS IN REPUBLIC ACT NO", "decision": "REVISE / CALIBRATE"}, {"congress": 18, "number": 9450, "title": "AN ACT TO FURTHER EMPOWER THE MEMBERS OF THE SANGGUNIANG KABATAAN (SK) BY AMENDING CERTAIN PROVISIONS IN REPUBLIC ACT NO", "decision": "REVISE / CALIBRATE"}], "proposes": "Further empowers SK members by amending RA 10742, expanding SK authority and participation.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Expanding SK powers strengthens youth self-governance and subsidiarity (P1, P3), and reflects documented youth sector demand (P2), but broader powers without commensurate resources risk unfunded mandates against the SK Fund (P4). Accountability mechanisms for expanded authority and coherence with national youth policy bodies need to be spelled out (P5, P6)."}, {"mid": 63, "rep_title": "AN ACT GRANTING ALLOWANCES TO SANGGUNIANG KABATAAN (SK) COUNCILORS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 10742 ALSO", "n_bills": 1, "archetype": "Sangguniang Kabataan reforms (powers, funds, qualifications)", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 6189, "title": "AN ACT GRANTING ALLOWANCES TO SANGGUNIANG KABATAAN (SK) COUNCILORS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 10742 ALSO", "decision": "REVISE / CALIBRATE"}], "proposes": "Mandates the grant of allowances to Sangguniang Kabataan councilors by amending RA 10742.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Fail", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Granting allowances is a legitimate incentive for youth participation (P1, P2), but mandating a new recurring cash obligation on barangay budgets — beyond the existing SK Fund allocation — without an identified appropriation or ceiling is a textbook unfunded mandate (P4 Fail). The bill must specify the source, amount, and fiscal impact before it can pass; the direction is salvageable with an explicit funding provision."}, {"mid": 64, "rep_title": "AN ACT PROVIDING FOR THE ESTABLISHMENT OF SANGGUNIANG KABATAAN (SK) CENTERS IN EACH BARANGAY AND FOR THE CAPACITY-BUILDI", "n_bills": 1, "archetype": "Sangguniang Kabataan reforms (powers, funds, qualifications)", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 7327, "title": "AN ACT PROVIDING FOR THE ESTABLISHMENT OF SANGGUNIANG KABATAAN (SK) CENTERS IN EACH BARANGAY AND FOR THE CAPACITY-BUILDI", "decision": "REVISE / CALIBRATE"}], "proposes": "Requires establishment of an SK Center in every barangay and provides for capacity-building programs.", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "Pass", "P4": "Fail", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Mandating capital infrastructure in every barangay regardless of fiscal capacity is an unfunded mandate (P4 Fail) — barangay revenues vary by orders of magnitude and no appropriation is identified. The blanket national prescription also weakens autonomy (P1 Conditional) by removing flexibility on how to house SK activities. The measure's goal is valid; it needs a tiered or discretionary implementation model with national funding support."}, {"mid": 65, "rep_title": "AN ACT TO AMEND REPUBLIC ACT NO. 10742, OTHERWISE KNOWN AS “THE SANGGUNIANG KABATAAN REFORM ACT OF 2015,” AND FOR OTHER", "n_bills": 1, "archetype": "Sangguniang Kabataan reforms (powers, funds, qualifications)", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 7343, "title": "AN ACT TO AMEND REPUBLIC ACT NO. 10742, OTHERWISE KNOWN AS “THE SANGGUNIANG KABATAAN REFORM ACT OF 2015,” AND FOR OTHER", "decision": "REVISE / CALIBRATE"}], "proposes": "Omnibus amendment to RA 10742 (SK Reform Act of 2015) covering multiple aspects of SK governance.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "As an omnibus SK reform measure the direction is sound — rationalizing SK governance strengthens youth autonomy at the most local level (P1, P3) — but the breadth of the bill means fiscal and accountability implications span multiple untested provisions (P4, P5 Conditional). Coherence review against the existing RA 10742 framework and NYCA mandates is required before adoption (P6)."}, {"mid": 66, "rep_title": "AN ACT PROVIDING QUALIFICATIONS AND COMPENSATION TO SANGGUNIANG KABATAAN OFFICIALS FURTHER AMENDING REPUBLIC ACT 10742,", "n_bills": 1, "archetype": "Sangguniang Kabataan reforms (powers, funds, qualifications)", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 8585, "title": "AN ACT PROVIDING QUALIFICATIONS AND COMPENSATION TO SANGGUNIANG KABATAAN OFFICIALS FURTHER AMENDING REPUBLIC ACT 10742,", "decision": "REVISE / CALIBRATE"}], "proposes": "Sets qualifications and provides compensation for SK officials by amending RA 10742.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Fail", "P5": "Pass", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Tightening qualifications improves accountability and professionalizes the SK (P5 Pass), and locating these standards at the barangay tier is appropriate (P3). However, mandating compensation without a defined appropriation or funding ceiling creates an unfunded mandate on barangay and SK Fund resources (P4 Fail). Funding source and salary standardization must be aligned with DBM and LGC salary grade frameworks (P6) before adoption."}, {"mid": 67, "rep_title": "AN ACT COMPLYING WITH THE THREE-YEAR TERM OF INCUMBENT BARANGAY AND SK OFFICIALS AS MANDATED BY THE 1987 PHILIPPINE CONS", "n_bills": 1, "archetype": "Sangguniang Kabataan reforms (powers, funds, qualifications)", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 19, "number": 10344, "title": "AN ACT COMPLYING WITH THE THREE-YEAR TERM OF INCUMBENT BARANGAY AND SK OFFICIALS AS MANDATED BY THE 1987 PHILIPPINE CONS", "decision": "REVISE / CALIBRATE"}], "proposes": "Enforces the constitutionally mandated three-year term of incumbent barangay and SK officials.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Pass", "P5": "Pass", "P6": "Pass"}, "decision": "ADOPT", "rationale": "This measure simply operationalizes the 1987 Constitution's explicit three-year term guarantee for barangay and SK officials — no new mandate, no fiscal obligation, no coherence gap. All six principles are satisfied: it protects the autonomy of elected officials (P1), respects the communities' electoral mandate (P2), is properly situated at the barangay level (P3), carries no cost (P4), reinforces constitutional integrity (P5), and directly aligns national constitutional policy with LGC practice (P6)."}, {"mid": 68, "rep_title": "AN ACT RECOGNIZING THE EXISTENCE OF BARANGAY PUROKS, PROVIDING FOR THE MANNER OF ELECTIONS, TERM AND QUALIFICATIONS OF P", "n_bills": 1, "archetype": "Recognition of puroks / sitios as sub-barangay units", "theme": "Barangay Governance", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 9889, "title": "AN ACT RECOGNIZING THE EXISTENCE OF BARANGAY PUROKS, PROVIDING FOR THE MANNER OF ELECTIONS, TERM AND QUALIFICATIONS OF P", "decision": "REVISE / CALIBRATE"}], "proposes": "Formally recognizes barangay puroks as sub-barangay units with their own elected officials, terms, and qualifications.", "scores": {"P1": "Conditional", "P2": "Conditional", "P3": "Conditional", "P4": "Fail", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Recognition of puroks can deepen subsidiarity and community voice, but creating a mandatory elected layer nationwide without a fiscal framework imposes a new unfunded personnel/administrative burden on already-thin barangay budgets (P4 Fail). Whether communities actually demand formal purok elections versus the current appointed system is undemonstrated (P2 Conditional). The measure needs an opt-in or barangay-discretion model, a clear budget line, and alignment with the barangay administrative structure (P6) before it can pass."}, {"mid": 69, "rep_title": "AN ACT RATIONALIZING THE INCOME REQUIREMENTS FOR THE CREATION OF A MUNICIPALITY, THE DECLARATION OF HIGHLY URBANIZED STA", "n_bills": 4, "archetype": "Rationalize income/population/land requirements for creating/converting LGUs", "theme": "Other
