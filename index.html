 Revenue", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 6127, "title": "AN ACT INCREASING THE TAX ON IDLE LANDS, AMENDING FOR THE PURPOSE SECTION 236 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN", "decision": "REVISE / CALIBRATE"}], "proposes": "Increases the tax rate on idle lands by amending Section 236 of RA 7160.", "scores": {"P1": "Pass", "P2": "Conditional", "P3": "Pass", "P4": "Pass", "P5": "Pass", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "Broadly sound: increasing the idle land tax strengthens LGU revenue generation, incentivizes productive land use, and aligns with national land-use policy. P2 Conditional: a blanket national rate increase bypasses local council discretion to set rates appropriate to local land markets; setting a floor while allowing LGUs to go higher would respect self-determination. Minor calibration needed."}, {"mid": 298, "rep_title": "AN ACT INCREASING THE TAX ON IDLE LANDS, AMENDING FOR THE PURPOSE, SECTION 236 OF R. A. 7160, OTHERWISE KNOWN AS THE LOC", "n_bills": 1, "archetype": "Real property tax / idle land / valuation reform", "theme": "Local Taxation & Revenue", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 19, "number": 510, "title": "AN ACT INCREASING THE TAX ON IDLE LANDS, AMENDING FOR THE PURPOSE, SECTION 236 OF R. A. 7160, OTHERWISE KNOWN AS THE LOC", "decision": "REVISE / CALIBRATE"}], "proposes": "Increases the tax on idle lands by amending Section 236 of RA 7160 (companion/duplicate of mid 297).", "scores": {"P1": "Pass", "P2": "Conditional", "P3": "Pass", "P4": "Pass", "P5": "Pass", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "Same analysis as mid 297. Substantively identical measure; the same calibration applies — fix the rate structure to set a national floor while preserving LGU discretion to exceed it, and harmonize with mid 297 to avoid duplicate legislation."}, {"mid": 299, "rep_title": "AN ACT INCREASING THE AD VALOREM TAX ON IDLE LANDS AND ESTABLISHING A SPECIAL AGRICULTURAL DEVELOPMENT FUND FROM ITS PRO", "n_bills": 1, "archetype": "Real property tax / idle land / valuation reform", "theme": "Local Taxation & Revenue", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 19, "number": 2075, "title": "AN ACT INCREASING THE AD VALOREM TAX ON IDLE LANDS AND ESTABLISHING A SPECIAL AGRICULTURAL DEVELOPMENT FUND FROM ITS PRO", "decision": "REVISE / CALIBRATE"}], "proposes": "Increases the ad valorem tax on idle lands and establishes a Special Agricultural Development Fund from its proceeds.", "scores": {"P1": "Pass", "P2": "Conditional", "P3": "Pass", "P4": "Pass", "P5": "Pass", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "The dedicated Agricultural Development Fund adds productive purpose to idle-land taxation and aligns with agricultural and food-security policy. P2 Conditional: earmarking proceeds to a specific fund limits LGU budget flexibility; the fund should be administered locally with broad-purpose guidelines rather than national micromanagement. Revision should ensure fund governance rests with LGUs."}, {"mid": 300, "rep_title": "AN ACT TRANSFERRING THE AUTHORITY TO TAX AND TO ISSUE PERMITS TO EXTRACT SAND, GRAVEL AND OTHER QUARRY RESOURCES FROM TH", "n_bills": 1, "archetype": "Quarry / sand-and-gravel / extraction tax & permits", "theme": "Local Taxation & Revenue", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 748, "title": "AN ACT TRANSFERRING THE AUTHORITY TO TAX AND TO ISSUE PERMITS TO EXTRACT SAND, GRAVEL AND OTHER QUARRY RESOURCES FROM TH", "decision": "REVISE / CALIBRATE"}], "proposes": "Transfers authority to tax and issue permits for sand, gravel, and quarry resource extraction from the national government to LGUs.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Pass", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Devolution of quarry taxation and permitting to LGUs strongly advances autonomy, subsidiarity, and fiscal justice — LGUs bear the environmental and infrastructure costs of extraction and should control its revenue. P5 Conditional: transfer must include robust accountability and environmental compliance mechanisms to prevent rent-seeking. P6 Conditional: national environmental standards (DENR/MGB) must be preserved as a floor, with LGU authority exercised within that framework. Revision should explicitly retain national environmental oversight."}, {"mid": 301, "rep_title": "AN ACT TO RATIONALIZE THE COLLECTION OF THE TAX ON BUSINESS UNDER SECTION 143 OF THE LOCAL GOVERNMENT CODE, AND AMENDING", "n_bills": 2, "archetype": "Business tax / amusement tax / local revenue instruments", "theme": "Local Taxation & Revenue", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 207, "title": "AN ACT TO RATIONALIZE THE COLLECTION OF THE TAX ON BUSINESS UNDER SECTION 143 OF THE LOCAL GOVERNMENT CODE, AND AMENDING", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 1620, "title": "AN ACT TO RATIONALIZE THE COLLECTION OF THE TAX ON BUSINESS UNDER SECTION 143 OF THE LOCAL GOVERNMENT CODE, AND AMENDING", "decision": "REVISE / CALIBRATE"}], "proposes": "Rationalize the collection of business tax under Section 143 of the Local Government Code.", "scores": {"P1": "Conditional", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Pass", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Rationalization of business tax collection can improve LGU revenue certainty (P1, P4) but risks constraining LGU rate-setting discretion depending on how uniform rules are imposed (P1 Conditional). Cross-LGU consistency rules must avoid harmonization that erodes autonomy; revenue impact on smaller LGUs needs fiscal cushioning (P4 Conditional). Alignment with BIR and national tax architecture must be explicit (P6 Conditional). Revise to safeguard LGU rate discretion within a rationalized framework and provide transition support for revenue-dependent LGUs."}, {"mid": 302, "rep_title": "AN ACT AMENDING PRESIDENTIAL DECREE NO. 1445, OTHERWISE KNOWN AS THE GOVERNMENT AUDITING CODE OF THE PHILIPPINES, BY ALL", "n_bills": 1, "archetype": "Business tax / amusement tax / local revenue instruments", "theme": "Local Taxation & Revenue", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 1872, "title": "AN ACT AMENDING PRESIDENTIAL DECREE NO. 1445, OTHERWISE KNOWN AS THE GOVERNMENT AUDITING CODE OF THE PHILIPPINES, BY ALL", "decision": "REVISE / CALIBRATE"}], "proposes": "Amend the Government Auditing Code (PD 1445) as it applies to local government financial accountability.", "scores": {"P1": "Conditional", "P2": "N/A", "P3": "N/A", "P4": "Pass", "P5": "Pass", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "Amending the national auditing code to better cover LGUs strengthens accountability and transparency (P5 Pass) and national-local coherence (P6 Pass). However, COA-imposed procedural burdens on LGUs may constrain operational autonomy without commensurate support (P1 Conditional). Revise to ensure audit reforms expand LGU accountability without creating unfunded compliance mandates or undermining day-to-day administrative autonomy."}, {"mid": 303, "rep_title": "AN ACT ABOLISHING THE USE OF COMMUNITY TAX CERTIFICATE AND THE POWER TO LEVY COMMUNITY TAX REPEALING FOR THAT PURPOSE TH", "n_bills": 2, "archetype": "Business tax / amusement tax / local revenue instruments", "theme": "Local Taxation & Revenue", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 2356, "title": "AN ACT ABOLISHING THE USE OF COMMUNITY TAX CERTIFICATE AND THE POWER TO LEVY COMMUNITY TAX REPEALING FOR THAT PURPOSE TH", "decision": "REVISE / CALIBRATE"}, {"congress": 19, "number": 4420, "title": "ACT ABOLISHING THE USE OF COMMUNITY TAX CERTIFICATE AND THE POWER TO LEVY COMMUNITY TAX REPEALING FOR THAT PURPOSE THE P", "decision": "REVISE / CALIBRATE"}], "proposes": "Abolish the community tax certificate and the LGU power to levy community tax.", "scores": {"P1": "Fail", "P2": "Fail", "P3": "Fail", "P4": "Fail", "P5": "Conditional", "P6": "Conditional"}, "decision": "REJECT / REFER", "rationale": "Outright abolition of the community tax removes a constitutionally grounded own-source revenue instrument from LGUs (P1 Fail, P3 Fail), strips communities of a locally-levied fiscal tool without evidence of LGU demand for its removal (P2 Fail), and creates an unfunded gap with no identified replacement revenue (P4 Fail). If reform of the community tax is warranted, it belongs in a targeted revenue-rationalization measure with replacement financing, not outright abolition."}, {"mid": 304, "rep_title": "AN ACT AUTHORIZING LOCAL GOVERNMENTS TO GRANT FRANCHISES AND TO OPERATE SMALL TOWN LOTTERIES TO GENERATE LOCAL REVENUES", "n_bills": 1, "archetype": "Business tax / amusement tax / local revenue instruments", "theme": "Local Taxation & Revenue", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 7883, "title": "AN ACT AUTHORIZING LOCAL GOVERNMENTS TO GRANT FRANCHISES AND TO OPERATE SMALL TOWN LOTTERIES TO GENERATE LOCAL REVENUES", "decision": "REVISE / CALIBRATE"}], "proposes": "Authorize LGUs to grant franchises and operate small-town lotteries as a local revenue source.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Pass", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Expanding LGU authority to franchise and operate lotteries strengthens autonomy and own-source revenue (P1, P3, P4 Pass) and responds to demand for diversified local revenues (P2 Pass). However, lottery operations require robust anti-corruption and disclosure safeguards (P5 Conditional) and must be coherent with PCSO's national mandate and existing gaming regulation to avoid regulatory conflict (P6 Conditional). Revise to embed audit, transparency, and national-regulatory alignment provisions."}, {"mid": 305, "rep_title": "AN ACT TO RATIONALIZE CREDIT FINANCING FOR LOCAL GOVERNMENT UNITS BY AMENDING CERTAIN PROVISIONS IN BOOK II OF REPUBLIC", "n_bills": 1, "archetype": "Credit financing / public financial management", "theme": "Fiscal Transfers & PFM", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 6879, "title": "AN ACT TO RATIONALIZE CREDIT FINANCING FOR LOCAL GOVERNMENT UNITS BY AMENDING CERTAIN PROVISIONS IN BOOK II OF REPUBLIC", "decision": "REVISE / CALIBRATE"}], "proposes": "Rationalize credit financing for LGUs by amending Book II of RA 7160.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Conditional", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "Rationalizing LGU credit access expands fiscal space and capital financing options (P1, P3 Pass). Fiscal sustainability safeguards are essential — debt ceilings, borrowing capacity assessments, and disclosure requirements must accompany liberalization to protect LGUs from over-leveraging (P4, P5 Conditional). Revise to include debt-sustainability thresholds, mandatory disclosure of loan terms, and DBM/BSP alignment mechanisms."}, {"mid": 306, "rep_title": "AN ACT TO ENHANCE PUBLIC FINANCIAL MANAGEMENT BY AMENDING CERTAIN PROVISIONS IN BOOK II OF REPUBLIC ACT NO. 7160, OTHERW", "n_bills": 1, "archetype": "Credit financing / public financial management", "theme": "Fiscal Transfers & PFM", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 18, "number": 6881, "title": "AN ACT TO ENHANCE PUBLIC FINANCIAL MANAGEMENT BY AMENDING CERTAIN PROVISIONS IN BOOK II OF REPUBLIC ACT NO. 7160, OTHERW", "decision": "REVISE / CALIBRATE"}], "proposes": "Enhance public financial management at the LGU level by amending Book II of RA 7160.", "scores": {"P1": "Conditional", "P2": "Pass", "P3": "Pass", "P4": "Pass", "P5": "Pass", "P6": "Pass"}, "decision": "ADOPT", "rationale": "PFM enhancements — budgeting, accounting, reporting — strengthen transparency and accountability (P5 Pass) and are coherent with national PFM reforms (P6 Pass). The only risk is top-down system mandates that exceed LGU administrative capacity (P1 Conditional); this is addressable through phased implementation and capacity-building support rather than outright revision. Core principles are met and the measure is adoptable with implementation guidance."}, {"mid": 307, "rep_title": "AN ACT SIMPLIFYING THE PROCESS TO AVAIL OF CREDIT FINANCING FROM GOVERNMENT AND PRIVATE BANKS AND LENDING INSTITUTIONS B", "n_bills": 1, "archetype": "Credit financing / public financial management", "theme": "Fiscal Transfers & PFM", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 19, "number": 5303, "title": "AN ACT SIMPLIFYING THE PROCESS TO AVAIL OF CREDIT FINANCING FROM GOVERNMENT AND PRIVATE BANKS AND LENDING INSTITUTIONS B", "decision": "REVISE / CALIBRATE"}], "proposes": "Simplify the process for LGUs to avail of credit financing from government and private banks.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Conditional", "P6": "Pass"}, "decision": "REVISE / CALIBRATE", "rationale": "Simplifying credit access reduces administrative barriers and expands LGU capital financing options (P1, P2, P3 Pass). As with mid 305, procedural simplification without fiscal guardrails risks encouraging unsustainable debt, particularly for fiscally weak LGUs (P4 Conditional). Disclosure of loan terms and borrower-capacity screening must be retained (P5 Conditional). Revise to streamline procedures while preserving essential fiscal prudence and transparency requirements."}, {"mid": 308, "rep_title": "AN ACT EXPANDING THE POWERS OF LOCAL GOVERNMENT UNITS TO PROVIDE LOCAL MASS PUBLIC TRANSPORTATION SYSTEMS, AMENDING FOR", "n_bills": 1, "archetype": "LGU powers over local public/mass transport & franchising", "theme": "Service Delivery & Devolution", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 19, "number": 6205, "title": "AN ACT EXPANDING THE POWERS OF LOCAL GOVERNMENT UNITS TO PROVIDE LOCAL MASS PUBLIC TRANSPORTATION SYSTEMS, AMENDING FOR", "decision": "REVISE / CALIBRATE"}], "proposes": "Expand LGU powers to provide local mass public transportation systems, amending RA 7160.", "scores": {"P1": "Pass", "P2": "Pass", "P3": "Pass", "P4": "Conditional", "P5": "Conditional", "P6": "Conditional"}, "decision": "REVISE / CALIBRATE", "rationale": "Devolving mass transport authority to LGUs aligns functions with the most local capable level (P3 Pass) and reflects genuine LGU demand for transport autonomy (P1, P2 Pass). However, transport systems carry significant capital and operating costs — devolution without corresponding fiscal transfer or revenue authority creates unfunded mandates (P4 Conditional). Regulatory overlap with LTFRB and DOTC must be resolved (P6 Conditional), and performance/safety accountability frameworks are needed (P5 Conditional). Revise to include funding mechanisms and interagency delineation."}, {"mid": 309, "rep_title": "AN ACT AMENDING REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE \"LOCAL GOVERNMENT CODE OF 1991,\" BY EXPANDING THE SCOPE OF", "n_bills": 3, "archetype": "LGU powers over local public/mass transport & franchising", "theme": "Service Delivery & Devolution", "sheet_decision": "REVISE / CALIBRATE", "member_bills": [{"congress": 19, "number": 10326, "title": "AN ACT AMENDING REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE \"LOCAL GOVERNMENT CODE OF 1991,\" BY EXPANDING THE SCOPE OF", "decision": "REVISE / CALIBRATE"}, {"congress": 20, "number": 1450, "title": "AN ACT AMENDING REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE \"LOCAL GOVERNMENT CODE OF 1991,\" BY EXPANDING THE SCOPE OF", "decision": "REVISE / CALIBRATE"}, {"congress": 20, "number": 4295, "title": "AN ACT AMENDING REPUBLIC ACT NO. <script>
const DATA=JSON.parse(document.getElementById('data').textContent);
const P=DATA.principles.map(p=>p.key);
const PN=Object.fromEntries(DATA.principles.map(p=>[p.key,p.name]));
const M=DATA.measures;
const dclass=d=>(d||'').startsWith('ADOPT')?'ADOPT':(d||'').startsWith('REVISE')?'REVISE':'REJECT';
const themes=[...new Set(M.map(m=>m.theme))].sort();
let state={dec:'ALL',theme:'ALL',q:'',view:'table',sort:'bills',open:new Set()};

document.getElementById('subtitle').textContent =
 `${M.length} distinct measures (unbundled from ${DATA.summary.house_bills_total} House bills; refiles grouped only when ≥90% identical), each screened individually against ULAP's six guiding principles. Live discussion updates with your search. Generated ${DATA.generated}.`;

function decCounts(arr){const c={ADOPT:0,REVISE:0,REJECT:0};arr.forEach(m=>c[dclass(m.decision)]++);return c;}
const C=decCounts(M);
document.getElementById('dash').innerHTML=`
 <div class="stat"><div class="n">${M.length}</div><div class="l">Distinct measures</div></div>
 <div class="stat"><div class="n">${DATA.summary.house_bills_total}</div><div class="l">House bills</div></div>
 <div class="stat"><div class="n">${themes.length}</div><div class="l">Themes</div></div>
 <div class="stat g"><div class="n">${C.ADOPT}</div><div class="l">Adopt</div></div>
 <div class="stat a"><div class="n">${C.REVISE}</div><div class="l">Revise</div></div>
 <div class="stat r"><div class="n">${C.REJECT}</div><div class="l">Reject</div></div>`;

const S=DATA.summary;
document.getElementById('srcsum').innerHTML=[
 ['House bills',S.house_bills_total],['Distinct measures',S.distinct_measures_after_unbundling],
 ['Proposal archetypes',S.proposal_archetypes],['Senate bill records',S.senate_bill_records],
 ['Academe (papers)',S.academe_papers_openalex],['Published literature',S.published_literature_files],
 ['Working files',S.working_files],['ULAP–DILG surveys',S.ulap_dilg_surveys],
 ['Survey delineations',S.survey_delineation_entries],['Social-media posts',S.social_media_posts],
 ['News / press',S.news_press],['Web PDFs',S.web_pdfs],
].map(([l,n])=>`<div class="stat"><div class="n">${n}</div><div class="l">${l}</div></div>`).join('');

const tsel=document.getElementById('themeSel');
tsel.innerHTML=`<option value="ALL">All themes</option>`+themes.map(t=>`<option>${t}</option>`).join('');

function esc(s){return(s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
function qesc(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')}
function qre(q){return new RegExp('\\b'+qesc(q),'i')}   /* prefix-boundary: matches word starts so "NTA" != "environMENTAl", but "bara" still finds "barangay" */
function hl(s){if(!state.q)return esc(s);const r=new RegExp('(\\b'+qesc(state.q)+')','ig');return esc(s).replace(r,'<mark>$1</mark>')}
function pills(m){return '<span class="pp">'+P.map(k=>{const v=m.scores[k]||'N/A';const cl=v==='N/A'?'NA':v;
 return `<i class="${cl}" title="${PN[k]}: ${v}">${k[1]}</i>`}).join('')+'</span>'}

function filtered(){
 return M.filter(m=>{
  if(state.theme!=='ALL'&&m.theme!==state.theme)return false;
  if(state.dec!=='ALL'&&m.decision!==state.dec)return false;
  if(state.q){const h=m.rep_title+' '+m.proposes+' '+m.archetype+' '+m.theme+' '+m.rationale+' '+
    m.member_bills.map(b=>b.title).join(' ');
   if(!qre(state.q).test(h))return false;}
  return true;});
}

function discussion(arr){
 const host=document.getElementById('discussion');
 const q=state.q.trim();
 if(!q && state.theme==='ALL'){host.innerHTML='';return;}
 if(!arr.length){host.innerHTML=`<div class="disc"><h3>No measures match “${esc(q||state.theme)}”.</h3></div>`;return;}
 const c=decCounts(arr);
 const rejects=arr.filter(m=>dclass(m.decision)==='REJECT');
 const adopts=arr.filter(m=>dclass(m.decision)==='ADOPT');
 const topThemes=[...new Set(arr.map(m=>m.theme))];
 // survey evidence matching the query/topic
 const ql=q||state.theme;
 const svrx=qre(ql);
 const sv=DATA.survey.filter(e=>svrx.test(e.fsf+' '+e.ppa+' '+e.remarks+' '+e.topic)).slice(0,6);
 let html=`<div class="disc"><h3>Discussion — “${esc(q||state.theme)}” (${arr.length} measure${arr.length>1?'s':''})</h3>`;
 html+=`<p class="k">Across these measures: <span class="ok">${c.ADOPT} adopt</span> · <span class="mid">${c.REVISE} revise/calibrate</span> · <span class="no">${c.REJECT} reject/refer</span>. Themes touched: ${topThemes.map(esc).join(', ')}.</p>`;
 if(adopts.length)html+=`<p><b class="ok">Clearly OK (adopt):</b> ${adopts.slice(0,5).map(m=>esc(m.proposes||m.rep_title.slice(0,70))).join('; ')}.</p>`;
 if(rejects.length)html+=`<p><b class="no">Problematic (reject/refer):</b> ${rejects.slice(0,6).map(m=>esc((m.proposes||m.rep_title.slice(0,60)))+' — '+esc(m.rationale.slice(0,90))).join('; ')}.</p>`;
 const revs=arr.filter(m=>dclass(m.decision)==='REVISE').slice(0,4);
 if(revs.length)html+=`<p><b class="mid">Sound but needs calibration:</b> ${revs.map(m=>esc(m.proposes||m.rep_title.slice(0,60))).join('; ')}.</p>`;
 if(sv.length){html+=`<div class="survey"><b>LGU role-delineation inputs (2024 ULAP–DILG survey):</b>`;
  sv.forEach(e=>{const lv=Object.entries(e.roles).filter(([k,v])=>v).map(([k,v])=>`${k}: ${esc(v.slice(0,60))}`).join(' · ');
   html+=`<div class="se"><b>${esc(e.fsf||e.ppa)}</b>${lv?' — '+lv:''}${e.remarks?` <i>(${esc(e.remarks.slice(0,80))})</i>`:''}</div>`});
  html+=`</div>`;}
 html+=`</div>`;host.innerHTML=html;
}

function rowExp(m){
 const bills=m.member_bills.map(b=>`<div class="b"><span class="c">${b.congress}th · HB ${String(b.number).padStart(5,'0')}</span> ${hl(b.title)}</div>`).join('');
 const tests=P.map(k=>`<span class="tag">${k} ${PN[k]}: ${m.scores[k]}</span>`).join(' ');
 return `<tr class="exp"><td colspan="6">
   <div class="why"><b>What it proposes.</b> ${hl(m.proposes||'—')}<br>
   <b>Decision — ${esc(m.decision)}.</b> ${hl(m.rationale||'—')}</div>
   <div style="margin:6px 0">${tests}</div>
   <div class="k" style="color:var(--muted);font-size:12px;margin-bottom:4px">Archetype: ${esc(m.archetype)} · sheet decision: ${esc(m.sheet_decision)} · ${m.n_bills} member bill(s)</div>
   <div class="bills">${bills}</div></td></tr>`;
}

function renderTable(arr){
 const sorts={bills:(a,b)=>b.n_bills-a.n_bills,dec:(a,b)=>dclass(a.decision).localeCompare(dclass(b.decision)),
  theme:(a,b)=>a.theme.localeCompare(b.theme),title:(a,b)=>a.rep_title.localeCompare(b.rep_title)};
 arr=[...arr].sort(sorts[state.sort]||sorts.bills);
 let rows='';
 arr.forEach(m=>{
  rows+=`<tr class="m" data-mid="${m.mid}"><td>${hl(m.proposes||m.rep_title.slice(0,90))}<div class="k" style="color:var(--muted);font-size:11px">${hl(m.rep_title.slice(0,80))}</div></td>
   <td><span class="tag">${esc(m.theme)}</span></td><td>${pills(m)}</td>
   <td><span class="dec ${dclass(m.decision)}">${esc(m.decision)}</span></td>
   <td style="text-align:center">${m.n_bills}</td><td style="color:var(--muted)">▸</td></tr>`;
  if(state.open.has(m.mid))rows+=rowExp(m);
 });
 return `<table><thead><tr><th data-s="title">Measure (what it proposes)</th><th data-s="theme">Theme</th>
  <th>ULAP P1–P6</th><th data-s="dec">Decision</th><th data-s="bills"># bills</th><th></th></tr></thead><tbody>${rows}</tbody></table>`;
}
function renderCards(arr){
 return '<div class="cards">'+arr.map(m=>`<div class="card">
   <div><span class="dec ${dclass(m.decision)}">${esc(m.decision)}</span> <span class="tag">${esc(m.theme)}</span> <span class="tag">${m.n_bills} bill(s)</span></div>
   <div>${pills(m)}</div><div><b>${hl(m.proposes||m.rep_title.slice(0,80))}</b></div>
   <div class="k" style="color:var(--muted);font-size:12px">${hl(m.rep_title.slice(0,120))}</div>
   <div style="font-size:12.5px">${hl(m.rationale)}</div></div>`).join('')+'</div>';
}

function render(){
 const arr=filtered();
 discussion(arr);
 document.getElementById('view').innerHTML = state.view==='table'?renderTable(arr):renderCards(arr);
 document.getElementById('foot').textContent=`Showing ${arr.length} of ${M.length} measures. ULAP: `+
  DATA.principles.map(p=>p.key+' '+p.name).join(' · ')+'. Per-measure verdicts are an automated ULAP screen of each bill — decision-support, not a legal determination.';
 if(state.view==='table')document.querySelectorAll('tr.m').forEach(tr=>tr.onclick=()=>{
  const id=+tr.dataset.mid;state.open.has(id)?state.open.delete(id):state.open.add(id);render();});
 document.querySelectorAll('th[data-s]').forEach(th=>th.onclick=()=>{state.sort=th.dataset.s;render();});
}
document.getElementById('q').addEventListener('input',e=>{state.q=e.target.value;render()});
tsel.addEventListener('change',e=>{state.theme=e.target.value;render()});
document.querySelectorAll('.chip[data-dec]').forEach(c=>c.onclick=()=>{document.querySelectorAll('.chip[data-dec]').forEach(x=>x.classList.remove('on'));c.classList.add('on');state.dec=c.dataset.dec;render();});
document.querySelectorAll('.chip.view').forEach(c=>c.onclick=()=>{document.querySelectorAll('.chip.view').forEach(x=>x.classList.remove('on'));c.classList.add('on');state.view=c.dataset.view;render();});
render();
</script></body></html>
